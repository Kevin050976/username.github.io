<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聯網助理 (優化版)</title>
    <style>
        body { font-family: sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f0f2f5; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        input, textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        button { background: #007bff; color: white; border: none; padding: 12px; border-radius: 6px; cursor: pointer; width: 100%; font-weight: bold; }
        button.secondary { background: #6c757d; width: auto; margin-right: 5px; }
        #chatbox { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin: 15px 0; background: #fafafa; border-radius: 8px; white-space: pre-wrap; }
        .status { color: #007bff; font-size: 0.9em; height: 1.5em; }
    </style>
</head>
<body>

<div class="card">
    <h2>🤖 AI 聯網助理</h2>
    <div class="grid-2">
        <input type="password" id="groqKey" placeholder="Groq API Key (gsk_...)">
        <input type="password" id="tavilyKey" placeholder="Tavily API Key (tvly-...)">
    </div>
    <div class="btn-group">
        <button class="secondary" onclick="clearChat()">🧹 清除對話</button>
    </div>
    <div id="status" class="status"></div>
    <div id="chatbox"></div>
    <textarea id="userInput" rows="3" placeholder="請輸入問題..."></textarea>
    <button onclick="askAI()">🚀 送出問題</button>
</div>

<script>
    let conversationHistory = [{ role: "system", content: "你是助理，請用繁體中文回答。若需即時資訊請使用 web_search。" }];

    window.onload = () => {
        document.getElementById('groqKey').value = localStorage.getItem('groqKey') || '';
        document.getElementById('tavilyKey').value = localStorage.getItem('tavilyKey') || '';
    };

    function saveKeys() {
        localStorage.setItem('groqKey', document.getElementById('groqKey').value.trim());
        localStorage.setItem('tavilyKey', document.getElementById('tavilyKey').value.trim());
    }

    function updateChatbox(text) {
        const box = document.getElementById('chatbox');
        box.innerHTML += text;
        box.scrollTop = box.scrollHeight;
    }

    function updateStatus(text) { document.getElementById('status').innerText = text; }

    function clearChat() {
        conversationHistory = [conversationHistory[0]];
        document.getElementById('chatbox').innerHTML = "系統：對話已重置。\n";
    }

    async function askAI() {
        const groqKey = document.getElementById('groqKey').value.trim();
        const tavilyKey = document.getElementById('tavilyKey').value.trim();
        const inputField = document.getElementById('userInput');
        const userInput = inputField.value.trim();

        if (!groqKey || !userInput) return alert("請輸入 Key 與問題");
        saveKeys();

        updateChatbox(`\n👤 **你:** ${userInput}\n`);
        inputField.value = "";
        updateStatus("Groq 思考中...");
        conversationHistory.push({ role: "user", content: userInput });

        try {
            // 第一階段：判斷是否搜尋
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: conversationHistory,
                    tools: [{
                        type: "function",
                        function: {
                            name: "web_search",
                            description: "搜尋網路即時資訊",
                            parameters: { type: "object", properties: { query: { type: "string" } }, required: ["query"] }
                        }
                    }]
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || "Groq 請求失敗");
            const message = data.choices[0].message;

            if (message.tool_calls) {
                const toolCall = message.tool_calls[0];
                const query = JSON.parse(toolCall.function.arguments).query;
                updateStatus(`🔍 搜尋中：${query}...`);
                conversationHistory.push(message);

                // 第二階段：Tavily 搜尋 (限制 2 筆)
                const searchRes = await fetch("https://api.tavily.com/search", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ api_key: tavilyKey, query: query, max_results: 2 })
                });

                const searchData = await searchRes.json();
                // 限制內容長度至 600 字
                let contextStr = searchData.results.map(r => `標題: ${r.title}\n內容: ${r.content}`).join("\n\n");
                if (contextStr.length > 600) contextStr = contextStr.substring(0, 600) + "...(已截斷)";

                conversationHistory.push({ role: "tool", tool_call_id: toolCall.id, name: "web_search", content: contextStr });
                updateStatus("🧠 正在總結結果...");

                // 第三階段：總結回答
                const finalRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({ model: "llama-3.1-8b-instant", messages: conversationHistory })
                });

                const finalData = await finalRes.json();
                const finalAnswer = finalData.choices[0].message.content;
                updateChatbox(`🤖 **AI (連網):**\n${finalAnswer}\n`);
                conversationHistory.push({ role: "assistant", content: finalAnswer });
            } else {
                updateChatbox(`🤖 **AI:**\n${message.content}\n`);
                conversationHistory.push({ role: "assistant", content: message.content });
            }
        } catch (e) {
            updateChatbox(`\n❌ **錯誤:** ${e.message}\n`);
            conversationHistory.pop();
        }
        updateStatus("");
    }
</script>
</body>
</html>
