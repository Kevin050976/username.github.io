<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聯網助理 (Groq + Tavily)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85em; color: #666; margin-bottom: 5px; font-weight: bold; }
        input[type="password"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        input[type="password"]:focus, textarea:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.25); }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }
        button.secondary:hover { background: #5a6268; }
        #chatbox { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; background: #fafafa; border-radius: 8px; font-size: 0.95em; line-height: 1.5; white-space: pre-wrap; }
        .status { color: #007bff; font-size: 0.9em; font-weight: bold; margin-bottom: 10px; min-height: 1.2em; }
        .system-msg { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top: 0; display: flex; align-items: center; justify-content: space-between;">
        <span>🤖 AI 聯網助理</span>
    </h2>
    
    <div class="grid-2">
        <div class="input-group">
            <label for="groqKey">Groq API Key (大腦)</label>
            <input type="password" id="groqKey" placeholder="gsk_...">
        </div>
        <div class="input-group">
            <label for="tavilyKey">Tavily API Key (眼睛)</label>
            <input type="password" id="tavilyKey" placeholder="tvly-...">
        </div>
    </div>

    <div class="btn-group">
        <button class="secondary" onclick="checkTavilyUsage()">🔍 查詢 Tavily 剩餘額度</button>
        <button class="secondary" onclick="clearKeys()">🗑️ 清除記憶的金鑰</button>
    </div>

    <div id="status" class="status"></div>
    <div id="chatbox"><span class="system-msg">系統：請輸入 API Key 並開始對話。API Key 會安全地儲存在你的瀏覽器中。</span>\n</div>
    
    <textarea id="userInput" rows="3" placeholder="請輸入您的問題 (例如: 總結一下今天台灣的重要新聞)..."></textarea>
    <button onclick="askAI()" style="width: 100%; padding: 15px; font-size: 1.1em;">🚀 送出提問</button>
</div>

<script>
    // --- 頁面載入時：自動讀取儲存的 Keys ---
    window.onload = function() {
        const savedGroq = localStorage.getItem('groqKey');
        const savedTavily = localStorage.getItem('tavilyKey');
        if (savedGroq) document.getElementById('groqKey').value = savedGroq;
        if (savedTavily) document.getElementById('tavilyKey').value = savedTavily;
    };

    // --- 工具函數：儲存 Keys ---
    function saveKeys() {
        const groq = document.getElementById('groqKey').value.trim();
        const tavily = document.getElementById('tavilyKey').value.trim();
        if (groq) localStorage.setItem('groqKey', groq);
        if (tavily) localStorage.setItem('tavilyKey', tavily);
    }

    // --- 工具函數：清除 Keys ---
    function clearKeys() {
        localStorage.removeItem('groqKey');
        localStorage.removeItem('tavilyKey');
        document.getElementById('groqKey').value = '';
        document.getElementById('tavilyKey').value = '';
        updateStatus("API 金鑰已從瀏覽器清除。");
    }

    // --- 工具函數：更新狀態文字 ---
    function updateStatus(text) {
        document.getElementById('status').innerText = text;
    }

    // --- 功能一：查詢 Tavily 額度 ---
    async function checkTavilyUsage() {
        const tavilyKey = document.getElementById('tavilyKey').value.trim();
        if (!tavilyKey) return alert("請先輸入 Tavily API Key");

        updateStatus("查詢額度中...");
        try {
            // 注意：Tavily 的額度查詢沒有官方公開的 CORS 無阻擋端點，
            // 若遇到 CORS 問題，此端點可能會報錯，但正常情況下 GET 應該可行。
            // (根據Tavily文檔，不支援從純前端直接打usage api，若出錯，此功能可能無法在純HTML運行)
            const response = await fetch("https://api.tavily.com/usage", {
                method: "GET",
                headers: { 
                    "Authorization": `Bearer ${tavilyKey}`,
                    "Content-Type": "application/json"
                }
            });
            
            if (!response.ok) {
                // 如果官方未實作此 GET endpoint，則顯示提示
                 throw new Error(`HTTP Error: ${response.status} (可能是跨域限制或端點不存在)`);
            }

            const data = await response.json();
            // 假設回傳格式包含 usage 或剩餘額度
            alert(`Tavily 狀態查詢成功！\n詳細資訊已輸出至開發者控制台(F12)。\n(回傳資料: ${JSON.stringify(data)})`);
            console.log("Tavily Usage Data:", data);
            updateStatus("查詢完畢。");

        } catch (e) {
             alert("無法直接查詢額度：\n可能是因為 Tavily 的 /usage API 不允許從瀏覽器前端(CORS)直接呼叫，請登入官網查看。\n錯誤: " + e.message);
             updateStatus("");
        }
    }

    // --- 功能二：核心問答邏輯 ---
    async function askAI() {
        const groqKey = document.getElementById('groqKey').value.trim();
        const tavilyKey = document.getElementById('tavilyKey').value.trim();
        const userInputBox = document.getElementById('userInput');
        const userInput = userInputBox.value.trim();
        const chatbox = document.getElementById('chatbox');

        if (!groqKey) return alert("請至少填寫 Groq API Key");
        if (!userInput) return alert("請輸入問題");

        saveKeys(); // 送出時自動儲存

        chatbox.innerHTML += `\n👤 **你:** ${userInput}\n`;
        userInputBox.value = ""; // 清空輸入框
        updateStatus("Groq 思考中...");

        try {
            // 第一步：問 Groq (並提供搜尋工具)
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: [{ role: "user", content: userInput }],
                    // 只有當使用者輸入了 Tavily Key，才給模型這個工具
                    tools: tavilyKey ? [{
                        type: "function",
                        function: {
                            name: "web_search",
                            description: "當用戶詢問近期新聞、即時資訊或模型不知道的事情時，搜尋網際網路",
                            parameters: {
                                type: "object",
                                properties: { query: { type: "string", description: "搜尋關鍵字" } },
                                required: ["query"]
                            }
                        }
                    }] : undefined
                })
            });

            if (!response.ok) throw new Error("Groq API 呼叫失敗，請檢查 Key 是否正確");

            const data = await response.json();
            const message = data.choices[0].message;

            // 第二步：判斷 Groq 是否決定使用工具
            if (message.tool_calls && message.tool_calls.length > 0) {
                const toolCall = message.tool_calls[0];
                const query = JSON.parse(toolCall.function.arguments).query;
                
                updateStatus(`🔍 Groq 決定使用網路搜尋... 關鍵字：[${query}]`);

                // 第三步：呼叫 Tavily 進行搜尋
                const searchRes = await fetch("https://api.tavily.com/search", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        api_key: tavilyKey, 
                        query: query,
                        search_depth: "basic", // 可選: basic 或 advanced
                        include_answer: false
                    })
                });

                if (!searchRes.ok) throw new Error("Tavily 搜尋失敗，請檢查 Key 或額度");

                const searchData = await searchRes.json();
                
                // 將搜尋結果排版成文字
                let contextStr = "以下是來自網路的搜尋結果：\n";
                searchData.results.forEach((r, idx) => {
                    contextStr += `[${idx + 1}] 標題: ${r.title}\n內容: ${r.content}\n來源: ${r.url}\n\n`;
                });

                updateStatus(`🧠 搜尋完成，Groq 正在總結資料...`);

                // 第四步：將結果傳回給 Groq 進行總結
                const finalRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: [
                            { role: "user", content: userInput },
                            message, // 模型回傳要使用工具的訊息
                            { role: "tool", tool_call_id: toolCall.id, content: contextStr } // 工具執行的結果
                        ]
                    })
                });

                const finalData = await finalRes.json();
                chatbox.innerHTML += `🤖 **AI (已聯網):**\n${finalData.choices[0].message.content}\n`;
                chatbox.scrollTop = chatbox.scrollHeight;

            } else {
                // 模型認為不需要搜尋，直接回答
                chatbox.innerHTML += `🤖 **AI (直接回答):**\n${message.content}\n`;
                chatbox.scrollTop = chatbox.scrollHeight;
            }

        } catch (e) {
            chatbox.innerHTML += `\n❌ **[發生錯誤]:** ${e.message}\n`;
        }
        
        updateStatus(""); // 清空狀態
    }
</script>

</body>
</html>
