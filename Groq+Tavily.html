<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聯網助理 (Groq + Tavily)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85em; color: #666; margin-bottom: 5px; font-weight: bold; }
        input[type="password"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        input[type="password"]:focus, textarea:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.25); }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }
        button.secondary:hover { background: #5a6268; }
        #chatbox { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; background: #fafafa; border-radius: 8px; font-size: 0.95em; line-height: 1.5; white-space: pre-wrap; }
        .status { color: #007bff; font-size: 0.9em; font-weight: bold; margin-bottom: 10px; min-height: 1.2em; }
        .system-msg { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top: 0;">🤖 專屬 AI 聯網助理</h2>
    
    <div class="grid-2">
        <div class="input-group">
            <label for="groqKey">Groq API Key (輸入會變成 ***)</label>
            <input type="password" id="groqKey" placeholder="gsk_...">
        </div>
        <div class="input-group">
            <label for="tavilyKey">Tavily API Key (輸入會變成 ***)</label>
            <input type="password" id="tavilyKey" placeholder="tvly-...">
        </div>
    </div>

    <div class="btn-group">
        <button class="secondary" onclick="checkTavilyUsage()">🔍 查詢 Tavily 剩餘額度</button>
        <button class="secondary" onclick="clearKeys()">🗑️ 清除記憶的 Key</button>
    </div>

    <div id="status" class="status"></div>
    <div id="chatbox"><span class="system-msg">系統：請輸入 API Key 並開始對話。你的 Key 會安全地保存在此瀏覽器中。</span>\n</div>
    
    <textarea id="userInput" rows="3" placeholder="請輸入您的問題 (例如: 幫我找一下今天台灣的新聞)..."></textarea>
    <button onclick="askAI()" style="width: 100%; padding: 15px; font-size: 1.1em;">🚀 送出問題</button>
</div>

<script>
    // --- 網頁載入時：自動從 localStorage 讀取密碼 ---
    window.onload = function() {
        const savedGroq = localStorage.getItem('groqKey');
        const savedTavily = localStorage.getItem('tavilyKey');
        if (savedGroq) document.getElementById('groqKey').value = savedGroq;
        if (savedTavily) document.getElementById('tavilyKey').value = savedTavily;
    };

    // --- 自動儲存密碼 ---
    function saveKeys() {
        const groq = document.getElementById('groqKey').value.trim();
        const tavily = document.getElementById('tavilyKey').value.trim();
        if (groq) localStorage.setItem('groqKey', groq);
        if (tavily) localStorage.setItem('tavilyKey', tavily);
    }

    // --- 清除密碼 ---
    function clearKeys() {
        localStorage.removeItem('groqKey');
        localStorage.removeItem('tavilyKey');
        document.getElementById('groqKey').value = '';
        document.getElementById('tavilyKey').value = '';
        updateStatus("API 金鑰已從瀏覽器清除。");
    }

    function updateStatus(text) {
        document.getElementById('status').innerText = text;
    }

    function updateChatbox(htmlMessage) {
        const chatbox = document.getElementById('chatbox');
        chatbox.innerHTML += htmlMessage;
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // --- 功能一：查詢 Tavily 額度 ---
    async function checkTavilyUsage() {
        const tavilyKey = document.getElementById('tavilyKey').value.trim();
        if (!tavilyKey) return alert("請先輸入 Tavily API Key");

        updateStatus("查詢額度中...");
        try {
            const response = await fetch("https://api.tavily.com/usage", {
                method: "GET",
                headers: { 
                    "Authorization": `Bearer ${tavilyKey}`,
                    "Content-Type": "application/json"
                }
            });
            
            if (!response.ok) {
                const errText = await response.text();
                throw new Error(`HTTP ${response.status}: ${errText}`);
            }

            const data = await response.json();
            alert(`Tavily 狀態查詢成功！\n\n可用的額度詳情：\n${JSON.stringify(data, null, 2)}`);
            updateStatus("查詢完畢。");

        } catch (e) {
             alert("無法直接查詢額度。\n(註：Tavily 官方可能阻擋了網頁前端的直接查詢，這屬於 CORS 資安保護機制。請登入 Tavily 官網查看。)\n\n錯誤訊息: " + e.message);
             updateStatus("");
        }
    }

    // --- 功能二：核心問答邏輯 ---
    let conversationHistory = []; // 用來記憶上下文對話

    async function askAI() {
        const groqKey = document.getElementById('groqKey').value.trim();
        const tavilyKey = document.getElementById('tavilyKey').value.trim();
        const userInputBox = document.getElementById('userInput');
        const userInput = userInputBox.value.trim();

        if (!groqKey) return alert("請至少填寫 Groq API Key");
        if (!userInput) return alert("請輸入問題");

        saveKeys(); // 送出時自動儲存 Key

        updateChatbox(`\n👤 **你:** ${userInput}\n`);
        userInputBox.value = ""; 
        updateStatus("Groq 思考中...");

        // 將用戶新問題加入歷史紀錄
        conversationHistory.push({ role: "user", content: userInput });

        try {
            // 第一步：呼叫 Groq 模型
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile",
                    messages: conversationHistory,
                    // 如果有輸入 Tavily Key，才賦予連網工具
                    tools: tavilyKey ? [{
                        type: "function",
                        function: {
                            name: "web_search",
                            description: "當用戶詢問近期新聞、即時資訊或模型不知道的事情時，搜尋網際網路",
                            parameters: {
                                type: "object",
                                properties: { query: { type: "string", description: "用來 Google 搜尋的關鍵字" } },
                                required: ["query"]
                            }
                        }
                    }] : undefined
                })
            });

            // 更詳細的錯誤捕捉
            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || `狀態碼 ${response.status}`);
            }

            const data = await response.json();
            const message = data.choices[0].message;

            // 第二步：判斷是否需要連網搜尋
            if (message.tool_calls && message.tool_calls.length > 0) {
                const toolCall = message.tool_calls[0];
                const query = JSON.parse(toolCall.function.arguments).query;
                
                updateStatus(`🔍 啟動網路搜尋... 關鍵字：[${query}]`);
                conversationHistory.push(message); // 把模型呼叫工具的動作存起來

                // 第三步：呼叫 Tavily 搜尋
                const searchRes = await fetch("https://api.tavily.com/search", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        api_key: tavilyKey, 
                        query: query,
                        include_answer: false
                    })
                });

                if (!searchRes.ok) throw new Error("Tavily 搜尋失敗，請檢查 API Key 或是額度");

                const searchData = await searchRes.json();
                let contextStr = searchData.results.map(r => `標題: ${r.title}\n內容: ${r.content}`).join("\n\n");

                updateStatus(`🧠 搜尋完成，Groq 正在整理資料...`);

                // 將搜尋結果加進對話紀錄中 (身分為 tool)
                conversationHistory.push({ role: "tool", tool_call_id: toolCall.id, content: contextStr });

                // 第四步：拿著搜尋結果，再問一次 Groq
                const finalRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.3-70b-versatile",
                        messages: conversationHistory
                    })
                });

                const finalData = await finalRes.json();
                const finalAnswer = finalData.choices[0].message.content;
                
                updateChatbox(`🤖 **AI (已聯網):**\n${finalAnswer}\n`);
                conversationHistory.push({ role: "assistant", content: finalAnswer });

            } else {
                // 模型認為不需要搜尋，直接回答
                const answer = message.content;
                updateChatbox(`🤖 **AI:**\n${answer}\n`);
                conversationHistory.push({ role: "assistant", content: answer });
            }

        } catch (e) {
            updateChatbox(`\n❌ **[系統錯誤]:** 發生問題了！\n原因：${e.message}\n(請確認你的 API Key 是否輸入正確)\n`);
            // 若發生錯誤，把最後一筆發問移除，避免污染對話上下文
            conversationHistory.pop(); 
        }
        
        updateStatus(""); // 清空狀態
    }
</script>

</body>
</html>
