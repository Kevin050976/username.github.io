<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聯網助理 (Groq + Tavily)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85em; color: #666; margin-bottom: 5px; font-weight: bold; }
        input[type="password"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }
        #chatbox { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; background: #fafafa; border-radius: 8px; font-size: 0.95em; line-height: 1.5; white-space: pre-wrap; }
        .status { color: #007bff; font-size: 0.9em; font-weight: bold; margin-bottom: 10px; min-height: 1.2em; }
        .system-msg { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top: 0;">🤖 專屬 AI 聯網助理</h2>
    
    <div class="grid-2">
        <div class="input-group">
            <label for="groqKey">Groq API Key</label>
            <input type="password" id="groqKey" placeholder="gsk_...">
        </div>
        <div class="input-group">
            <label for="tavilyKey">Tavily API Key</label>
            <input type="password" id="tavilyKey" placeholder="tvly-...">
        </div>
    </div>

    <div class="btn-group">
        <button class="secondary" onclick="checkTavilyUsage()">🔍 查詢 Tavily 額度</button>
        <button class="secondary" onclick="clearChat()">🧹 清除對話</button>
    </div>

    <div id="status" class="status"></div>
    <div id="chatbox"><span class="system-msg">系統：請輸入 API Key 並開始對話。</span></div>
    
    <textarea id="userInput" rows="3" placeholder="請輸入您的問題..."></textarea>
    <button onclick="askAI()" style="width: 100%; padding: 15px; font-size: 1.1em; margin-top: 10px;">🚀 送出問題</button>
</div>

<script>
    // 初始化對話紀錄
    let conversationHistory = [{ 
        role: "system", 
        content: "你是助理，請用繁體中文回答。如果需要即時資訊，請使用 web_search 工具。" 
    }];

    // 頁面載入時讀取儲存的 Key
    window.onload = function() {
        if (localStorage.getItem('groqKey')) document.getElementById('groqKey').value = localStorage.getItem('groqKey');
        if (localStorage.getItem('tavilyKey')) document.getElementById('tavilyKey').value = localStorage.getItem('tavilyKey');
    };

    function saveKeys() {
        localStorage.setItem('groqKey', document.getElementById('groqKey').value.trim());
        localStorage.setItem('tavilyKey', document.getElementById('tavilyKey').value.trim());
    }

    function updateStatus(text) { document.getElementById('status').innerText = text; }

    function updateChatbox(text) {
        const chatbox = document.getElementById('chatbox');
        chatbox.innerHTML += text;
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    function clearChat() {
        conversationHistory = [{ role: "system", content: "你是助理，請用繁體中文回答。" }];
        document.getElementById('chatbox').innerHTML = '<span class="system-msg">系統：對話已重置。</span>\n';
    }

    async function checkTavilyUsage() {
        const key = document.getElementById('tavilyKey').value.trim();
        if (!key) return alert("請先輸入 Tavily Key");
        try {
            const res = await fetch("https://api.tavily.com/usage", {
                headers: { "Authorization": `Bearer ${key}` }
            });
            const data = await res.json();
            alert(`目前使用量：${data.usage} / ${data.limit}`);
        } catch (e) { alert("查詢失敗"); }
    }

    // 核心主程式
    async function askAI() {
        const groqKey = document.getElementById('groqKey').value.trim();
        const tavilyKey = document.getElementById('tavilyKey').value.trim();
        const userInputBox = document.getElementById('userInput');
        const userInput = userInputBox.value.trim();

        if (!groqKey || !userInput) return alert("請填寫 Groq API Key 與問題");
        saveKeys(); 

        updateChatbox(`\n👤 **你:** ${userInput}\n`);
        userInputBox.value = ""; 
        updateStatus("Groq 思考中...");
        conversationHistory.push({ role: "user", content: userInput });

        try {
            // 第一步：請求 Groq 並判斷是否需要搜尋
            const response = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                method: "POST",
                headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                body: JSON.stringify({
                    model: "llama-3.1-8b-instant",
                    messages: conversationHistory,
                    tools: [{
                        type: "function",
                        function: {
                            name: "web_search",
                            description: "搜尋網路即時資訊",
                            parameters: {
                                type: "object",
                                properties: { query: { type: "string" } },
                                required: ["query"]
                            }
                        }
                    }]
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || "Groq 請求失敗");
            const message = data.choices[0].message;

            if (message.tool_calls) {
                const toolCall = message.tool_calls[0];
                const query = JSON.parse(toolCall.function.arguments).query;
                
                updateStatus(`🔍 聯網搜尋中：${query}...`);
                conversationHistory.push(message); 

                // 第二步：執行 Tavily 搜尋
                const searchRes = await fetch("https://api.tavily.com/search", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        api_key: tavilyKey, 
                        query: query,
                        max_results: 3 
                    })
                });

                const searchData = await searchRes.json();
                
                // 限制內容長度防止 TPM 爆表
                let contextStr = searchData.results.map(r => {
                    let cleanContent = (r.content || "").substring(0, 400);
                    return `來源: ${r.title}\n內容: ${cleanContent}`;
                }).join("\n\n");

                conversationHistory.push({ 
                    role: "tool", 
                    tool_call_id: toolCall.id, 
                    name: "web_search", 
                    content: contextStr 
                });

                updateStatus(`🧠 搜尋完成，正在生成回答...`);

                // 第三步：回傳給 Groq 進行總結
                const finalRes = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                    body: JSON.stringify({
                        model: "llama-3.1-8b-instant",
                        messages: conversationHistory
                    })
                });

                const finalData = await finalRes.json();
                const finalAnswer = finalData.choices[0].message.content;
                updateChatbox(`🤖 **AI (已聯網):**\n${finalAnswer}\n`);
                conversationHistory.push({ role: "assistant", content: finalAnswer });

            } else {
                const answer = message.content;
                updateChatbox(`🤖 **AI:**\n${answer}\n`);
                conversationHistory.push({ role: "assistant", content: answer });
            }
        } catch (e) {
            updateChatbox(`\n❌ **[系統錯誤]:** ${e.message}\n`);
            if (conversationHistory.length > 1) conversationHistory.pop();
        }
        updateStatus(""); 
    }
</script>

</body>
</html>
