<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全螢幕倒數計時器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
            /* 使用 dvh 適應行動裝置導航列，避免底部被裁切 */
            min-height: 100vh;
            min-height: 100dvh; 
            width: 100vw;
            /* 允許在螢幕極度狹小的情況下滾動 */
            overflow-x: hidden;
            overflow-y: auto;
            touch-action: manipulation;
        }
        
        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* 主選單樣式 */
        #menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            flex: 1;
        }
        
        /* 用於垂直居中標題與按鈕的容器 */
        .menu-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 25px;
            text-align: center;
            color: #fff;
            font-weight: 600;
        }
        
        .button-grid {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }
        
        .time-btn {
            padding: 22px 10px;
            font-size: 2rem;
            background: linear-gradient(135deg, #007AFF, #0062CC);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .time-btn:active {
            transform: scale(0.96);
            background: linear-gradient(135deg, #0062CC, #0050A3);
        }
        
        .current-time {
            font-size: 1.2rem;
            color: #aaa;
            padding: 10px 0;
            text-align: center;
            width: 100%;
        }
        
        /* 橫式螢幕最佳化 (例如平板橫放) */
        @media (orientation: landscape) {
            .button-grid {
                /* 橫屏時改為 4 列，節省垂直空間 */
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 12px;
                max-width: 800px;
            }
            .title {
                margin-bottom: 15px;
                font-size: 2rem;
            }
            .time-btn {
                padding: 15px 5px;
                font-size: 1.6rem;
                border-radius: 15px;
            }
        }
        
        /* 倒數畫面樣式 */
        #countdown-screen {
            display: none;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: #000;
            z-index: 100;
            padding-top: env(safe-area-inset-top);
        }
        
        /* 讓倒數文字自動完美居中 */
        .countdown-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        
        .countdown-display {
            /* 使用 min(vw, vh) 確保不管直屏橫屏，文字都不會大到把按鈕擠出去 */
            font-size: min(32vw, 45vh);
            font-weight: 900;
            line-height: 1;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            width: 100%;
            padding: 0 10px;
        }
        
        .button-container {
            width: 100%;
            padding: 15px 20px;
            /* 確保底部安全距離 */
            padding-bottom: max(25px, env(safe-area-inset-bottom));
            display: flex;
            justify-content: center;
            gap: 12px;
        }
        
        .stop-btn, .pause-btn, .restart-btn {
            padding: 15px 10px;
            color: white;
            border: none;
            border-radius: 15px;
            font-size: 1.3rem;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
            max-width: 120px;
        }
        
        .stop-btn {
            background: linear-gradient(135deg, #FF3B30, #E60000);
            box-shadow: 0 5px 15px rgba(255, 59, 48, 0.4);
        }
        
        .pause-btn {
            background: linear-gradient(135deg, #FF9500, #FF8800);
            box-shadow: 0 5px 15px rgba(255, 149, 0, 0.4);
        }
        
        .restart-btn {
            background: linear-gradient(135deg, #34C759, #2CAE4B);
            box-shadow: 0 5px 15px rgba(52, 199, 89, 0.4);
        }
        
        .stop-btn:active {
            transform: scale(0.95);
            background: linear-gradient(135deg, #E60000, #CC0000);
        }
        
        .pause-btn:active {
            transform: scale(0.95);
            background: linear-gradient(135deg, #FF8800, #E67E00);
        }
        
        .restart-btn:active {
            transform: scale(0.95);
            background: linear-gradient(135deg, #2CAE4B, #259E41);
        }
        
        /* 閃爍動畫 */
        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
        
        .flashing {
            animation: flash 1s infinite;
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 主選單畫面 -->
        <div id="menu-screen">
            <div class="menu-content">
                <h1 class="title">請選擇倒數時間</h1>
                
                <div class="button-grid">
                    <button class="time-btn" data-time="180">3:00</button>
                    <button class="time-btn" data-time="150">2:30</button>
                    <button class="time-btn" data-time="120">2:00</button>
                    <button class="time-btn" data-time="90">1:30</button>
                    <button class="time-btn" data-time="60">1:00</button>
                    <button class="time-btn" data-time="30">0:30</button>
                    <button class="time-btn" data-time="20">0:20</button>
                    <button class="time-btn" data-time="1200">20:00</button>
                </div>
            </div>
            
            <div class="current-time" id="current-time"></div>
        </div>
        
        <!-- 倒數畫面 -->
        <div id="countdown-screen">
            <div class="countdown-wrapper">
                <div class="countdown-display" id="countdown-display"></div>
            </div>
            <div class="button-container">
                <button class="restart-btn" id="restart-btn">重新</button>
                <button class="pause-btn" id="pause-btn">暫停</button>
                <button class="stop-btn" id="stop-btn">停止</button>
            </div>
        </div>
    </div>

    <script>
        // DOM 元素
        const currentTimeEl = document.getElementById('current-time');
        const countdownDisplayEl = document.getElementById('countdown-display');
        const countdownScreenEl = document.getElementById('countdown-screen');
        const menuScreenEl = document.getElementById('menu-screen');
        const stopBtnEl = document.getElementById('stop-btn');
        const restartBtnEl = document.getElementById('restart-btn');
        const pauseBtnEl = document.getElementById('pause-btn');
        const timeButtons = document.querySelectorAll('.time-btn');
        
        // 變數
        let timer = null;
        let endTime = 0;
        let isCountdownFinished = false;
        let wakeLock = null;
        let originalDuration = 0;
        let isPaused = false;
        let pausedTimeRemaining = 0;
        
        // 初始化
        function init() {
            updateCurrentTime();
            setupEventListeners();
            setInterval(updateCurrentTime, 1000);
            // 移除了在初始化時直接呼叫 requestWakeLock() 的行為
            // 因為部分瀏覽器規定必須要有「使用者互動(例如點擊)」才能請求權限
        }
        
        // 請求保持屏幕喚醒
        async function requestWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    wakeLock.addEventListener('release', () => {
                        console.log('Screen Wake Lock was released');
                    });
                }
            } catch (err) {
                // 將 console.error 更改為 console.warn 以免觸發畫面中的紅字錯誤
                // 在預覽視窗(iframe)或特定權限政策下，這可能會被阻擋 (NotAllowedError)
                console.warn(`Wake Lock API 權限遭拒絕或不支援，但不影響核心計時功能: ${err.message}`);
            }
        }
        
        // 更新當前時間
        function updateCurrentTime() {
            const now = new Date();
            currentTimeEl.textContent = now.toLocaleTimeString('zh-TW', {
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
        }
        
        // 設置事件監聽
        function setupEventListeners() {
            // 時間按鈕點擊
            timeButtons.forEach(btn => {
                btn.addEventListener('click', () => {
                    const seconds = parseInt(btn.dataset.time);
                    originalDuration = seconds;
                    startCountdown(seconds);
                });
            });
            
            // 停止按鈕
            stopBtnEl.addEventListener('click', stopCountdown);
            
            // 重新倒數按鈕
            restartBtnEl.addEventListener('click', restartCountdown);
            
            // 暫停/繼續按鈕
            pauseBtnEl.addEventListener('click', togglePause);
            
            // 防止滾動 (僅在倒數畫面時阻止，確保主選單若超出版面仍可滾動)
            document.addEventListener('touchmove', (e) => {
                if (countdownScreenEl.style.display === 'flex') {
                    e.preventDefault();
                }
            }, { passive: false });
            
            // 當頁面可見性變化時重新請求喚醒鎖
            document.addEventListener('visibilitychange', async () => {
                if (document.visibilityState === 'visible' && countdownScreenEl.style.display === 'flex' && !isPaused) {
                    await requestWakeLock();
                }
            });
        }
        
        // 開始倒數
        function startCountdown(seconds) {
            // 重置狀態
            isCountdownFinished = false;
            isPaused = false;
            countdownDisplayEl.classList.remove('flashing');
            
            // 更新按鈕文字
            pauseBtnEl.textContent = "暫停";
            
            // 切換畫面
            menuScreenEl.style.display = 'none';
            countdownScreenEl.style.display = 'flex';
            
            // 請求保持屏幕喚醒 (因為是在點擊事件中觸發，更容易成功取得權限)
            requestWakeLock();
            
            // 清除舊計時器
            if (timer) clearInterval(timer);
            endTime = Date.now() + seconds * 1000;
            
            // 立即更新一次
            updateCountdown();
            
            // 設置定時器
            timer = setInterval(updateCountdown, 200);
        }
        
        // 重新倒數
        function restartCountdown() {
            if (originalDuration > 0) {
                startCountdown(originalDuration);
            }
        }
        
        // 切換暫停/繼續
        function togglePause() {
            if (isCountdownFinished) return;
            
            if (isPaused) {
                // 繼續倒數
                isPaused = false;
                pauseBtnEl.textContent = "暫停";
                endTime = Date.now() + pausedTimeRemaining;
                timer = setInterval(updateCountdown, 200);
                requestWakeLock();
            } else {
                // 暫停倒數
                isPaused = true;
                pauseBtnEl.textContent = "繼續";
                clearInterval(timer);
                pausedTimeRemaining = endTime - Date.now();
                
                // 釋放喚醒鎖
                if (wakeLock !== null) {
                    wakeLock.release().then(() => {
                        wakeLock = null;
                    }).catch(e => console.warn(e));
                }
            }
        }
        
        // 更新倒數顯示
        function updateCountdown() {
            if (isCountdownFinished || isPaused) return;
            
            const now = Date.now();
            const remaining = Math.max(0, endTime - now);
            const seconds = Math.ceil(remaining / 1000);
            
            if (seconds <= 0) {
                countdownFinished();
                return;
            }
            
            const mins = Math.floor(seconds / 60);
            const secs = seconds % 60;
            
            // 更新顯示
            countdownDisplayEl.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            
            // 更新樣式
            updateCountdownStyle(seconds);
        }
        
        // 倒數完成
        function countdownFinished() {
            clearInterval(timer);
            isCountdownFinished = true;
            
            // 顯示 0:00 並開始閃爍
            countdownDisplayEl.textContent = "0:00";
            countdownDisplayEl.style.color = '#FF3B30';
            countdownDisplayEl.classList.add('flashing');
            
            // 更新按鈕狀態
            pauseBtnEl.textContent = "暫停";
            isPaused = false;
            
            // 釋放喚醒鎖
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                }).catch(e => console.warn(e));
            }
        }
        
        // 更新倒數樣式
        function updateCountdownStyle(seconds) {
            if (seconds <= 10) {
                countdownDisplayEl.style.color = '#FF3B30';
                countdownDisplayEl.style.textShadow = '0 0 25px rgba(255, 59, 48, 0.6)';
            } else if (seconds <= 30) {
                countdownDisplayEl.style.color = '#FF9500';
                countdownDisplayEl.style.textShadow = '0 0 25px rgba(255, 149, 0, 0.6)';
            } else {
                countdownDisplayEl.style.color = '#FFFFFF';
                countdownDisplayEl.style.textShadow = '0 0 20px rgba(255, 255, 255, 0.3)';
            }
        }
        
        // 停止倒數
        function stopCountdown() {
            clearInterval(timer);
            returnToMenu();
            
            // 釋放喚醒鎖
            if (wakeLock !== null) {
                wakeLock.release().then(() => {
                    wakeLock = null;
                }).catch(e => console.warn(e));
            }
        }
        
        // 返回主選單
        function returnToMenu() {
            countdownScreenEl.style.display = 'none';
            menuScreenEl.style.display = 'flex';
            countdownDisplayEl.classList.remove('flashing');
            isCountdownFinished = false;
            isPaused = false;
            pauseBtnEl.textContent = "暫停";
        }
        
        // 初始化應用
        init();
    </script>
</body>
</html>
