<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNG AKIRA 校對播放器</title>
    <style>
        :root { --bg: #1c1c1e; --card: #2c2c2e; --primary: #30d158; --text: #ffffff; --accent: #0a84ff; --gemini: #d96570; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 0; display: flex; justify-content: center; height: 100vh; height: 100dvh; overflow: hidden; }
        .container { width: 100%; max-width: 500px; height: 100%; display: flex; flex-direction: column; background: var(--card); padding: 20px; box-sizing: border-box; }
        @media (min-width: 500px) { .container { height: 95vh; margin-top: 2.5vh; border-radius: 24px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); } }

        #setup-ui, #ai-ui, #gemini-ui { overflow-y: auto; flex: 1; display: flex; flex-direction: column; padding-bottom: 30px;}
        #player-ui { flex: 1; display: flex; flex-direction: column; overflow: hidden; padding-bottom: 25px; }

        #wall-time { font-family: "Menlo", monospace; font-size: 42px; text-align: center; color: var(--primary); margin: 5px 0; font-weight: bold; flex-shrink: 0; }
        #media-container { width: 100%; margin-top: 10px; background: #000; border-radius: 12px; overflow: hidden; flex-shrink: 0; }
        video, audio { width: 100%; max-height: 250px; display: block; }

        #marker-container::-webkit-scrollbar { display: none; }
        #marker-container { display:none; overflow-x:auto; gap:8px; margin-top:15px; padding-bottom:5px; -webkit-overflow-scrolling:touch; scrollbar-width:none; flex-shrink: 0; user-select: none; cursor: grab; }
        .marker-btn { background: #1c1c1e; color: var(--primary); padding: 8px 14px; border-radius: 10px; font-size: 14px; white-space: nowrap; border: 1px solid var(--primary); cursor: pointer; display: flex; align-items: center; gap: 5px; font-family: "Menlo", monospace; }

        .list-container { flex: 1; overflow-y: auto; border-radius: 12px; background: rgba(0,0,0,0.2); margin-top: 15px; border: 1px solid #3a3a3c; position: relative; scroll-behavior: smooth; margin-bottom: 10px; }
        .subtitle-item { display: flex; align-items: center; gap: 10px; padding: 12px; border-bottom: 1px solid #3a3a3c; font-size: 16px; cursor: pointer; transition: background 0.2s; }
        .highlight { background: rgba(48, 209, 88, 0.25) !important; color: #fff; border-left: 4px solid var(--primary); }

        .btn { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; flex-shrink: 0; transition: 0.2s;}
        .btn:active { opacity: 0.8; }
        .btn-main { background: var(--primary); color: #000; width: 100%; font-size: 24px; padding: 20px; border-radius: 15px; margin-top: 20px; margin-bottom: 60px; box-shadow: 0 4px 15px rgba(48,209,88,0.3); }
        .btn-back { background: none; color: var(--text); font-size: 16px; margin-bottom: 5px; padding: 0; text-align: left; cursor: pointer;}

        #edit-modal, #share-overlay { position: fixed; inset: 0; display: none; flex-direction: column; z-index: 1000; }
        #edit-modal { background: rgba(0,0,0,0.8); align-items: center; justify-content: center; }
        #share-overlay { background: var(--bg); padding: 20px; }
        .hidden { display: none !important; }

        .bottom-actions { display: flex; gap: 8px; margin-top: 5px; margin-bottom: 5px; flex-wrap: wrap; flex-shrink: 0;}
        .bottom-actions .btn { flex: 1; font-size: 16px; padding: 12px 5px; border-radius: 12px; text-align: center; }

        .mode-selector { display: flex; gap: 10px; margin-top: 10px; margin-bottom: 15px; padding: 10px; background: rgba(255,255,255,0.05); border-radius: 10px; flex-wrap: wrap;}
        .mode-selector label { margin: 0; color: #fff; cursor: pointer; font-size: 14px; display:flex; align-items:center; gap:5px;}
        .template-box { background: rgba(10,132,255,0.1); padding: 12px; border-left: 4px solid var(--accent); margin-bottom: 15px; font-size: 14px; color: #ddd; white-space: pre-wrap; border-radius: 4px; }

        .result-box { margin-top: 15px; padding: 15px; background: #000; border: 1px solid #3a3a3c; border-radius: 10px; min-height: 150px; white-space: pre-wrap; font-size: 15px; line-height: 1.6; overflow-y: auto; flex: 1;}
        .time-link { color: var(--primary); cursor: pointer; text-decoration: underline; font-weight: bold; padding: 2px 4px; background: rgba(48,209,88,0.1); border-radius: 4px;}

        input[type="text"], input[type="password"], textarea {
            display: block; width: 100%; max-width: none; padding: 12px; background: #3a3a3c; color: #fff; border: 1px solid #555; border-radius: 10px; font-size: 15px; margin-bottom: 15px; box-sizing: border-box;
        }
    </style>
</head>
<body>

<div class="container" id="setup-ui">
    <h3 style="text-align:center; margin-top:0;">SNG AKIRA 校對工具</h3>
    <label style="font-size:12px; color:#aaa">1. 選取影音 (M4A/MOV/MP4)</label>
    <input type="file" id="mediaFile" accept="video/*,audio/*,.m4a,.mov" style="margin-bottom:15px;">
    <label style="font-size:12px; color:#aaa">2. 選取字幕 (.srt)</label>
    <input type="file" id="srtFile" accept=".srt" style="margin-bottom:15px;">
    
    <div style="flex:1; min-height: 20px;"></div>
    <button class="btn btn-main" onclick="startApp()">開始播放 (Start)</button>
</div>

<div class="container hidden" id="player-ui">
    <div style="display:flex; justify-content:space-between; align-items:center;">
        <button class="btn-back" style="color:var(--text);" onclick="goBack()">〈 更換</button>
    </div>
    <div id="wall-time">00:00:00</div>
    <div id="media-container"></div>
    <div id="marker-container"></div>
    <div class="list-container" id="list-container"></div>
    <div class="bottom-actions">
        <button class="btn" style="background:#444; color:#fff;" onclick="toggleSelectAll()">☑️ 全選</button>
        <button class="btn" style="background:var(--accent); color:#fff;" onclick="openShare()">🔗 分享</button>
        <button class="btn" style="background:#ff9f0a; color:#000;" onclick="exportSelectedSRT()">💾 選擇匯出</button>
        <button class="btn" style="background:var(--primary); color:#000;" onclick="exportSRT()">💾 匯出SRT</button>
    </div>
</div>

<div class="container hidden" id="ai-ui">
    <button class="btn-back" onclick="closeAIUI()">〈 返回播放器</button>
    <h3 style="text-align:center; color:var(--primary); margin:5px 0 15px 0;">🧠 Groq 極速助手</h3>

    <label style="font-size:13px; color:#aaa;">Groq API Key：</label>
    <input type="password" id="groqApiKey" placeholder="gsk_...">

    <label style="font-size:13px; color:#aaa;">選擇功能模式：</label>
    <div class="mode-selector">
        <label><input type="radio" name="aiMode" value="A" checked onchange="switchAIMode()"> 🔍 搜尋</label>
        <label><input type="radio" name="aiMode" value="B" onchange="switchAIMode()"> 📝 整理</label>
        <label><input type="radio" name="aiMode" value="C" onchange="switchAIMode()"> 💬 提問</label>
    </div>

    <div id="querySection">
        <label id="queryLabel" style="font-size:13px; color:#aaa;">你的問題 / 模糊記憶：</label>
        <textarea id="userQuery" rows="3" placeholder="請輸入..."></textarea>
    </div>

    <div id="templateDescription" class="template-box">讀取中...</div>
    <button id="aiSearchBtn" class="btn" style="background:var(--primary); color:#000; font-size:18px; padding:15px; width:100%;" onclick="executeGroqTask()">🚀 執行任務</button>
    <div class="result-box" id="aiResultBox">Groq 的回答將顯示在這裡...</div>
</div>

<div class="container hidden" id="gemini-ui">
    <button class="btn-back" onclick="closeGeminiUI()">〈 返回播放器</button>
    <h3 style="text-align:center; color:var(--gemini); margin:5px 0 15px 0;">🌍 Gemini 萬能連網問答</h3>

    <label style="font-size:13px; color:#aaa;">Gemini API Key：</label>
    <input type="password" id="geminiApiKey" placeholder="AIzaSy...">

    <div class="template-box" style="border-left-color:var(--gemini); background:rgba(217,101,112,0.1);">
        目標：萬能問答 (內建 Google 搜尋)。<br>引擎：Google Gemini 2.5 Flash
    </div>

    <label style="font-size:13px; color:#aaa;">你想問什麼？(將自動結合字幕內容)：</label>
    <textarea id="geminiQuery" rows="4" placeholder="請輸入任何疑難雜症..."></textarea>

    <button id="geminiSearchBtn" class="btn" style="background:var(--gemini); color:#fff; font-size:18px; padding:15px; width:100%;" onclick="executeGeminiTask()">🚀 連網發問</button>
    <div class="result-box" id="geminiResultBox">Gemini 的回答將顯示在這裡...</div>
</div>

<div id="edit-modal">
    <div class="container" style="height:auto; max-height:80vh;">
        <h3 style="margin-top:0">修改內容</h3>
        <textarea id="edit-text"></textarea>
        <div style="display:flex; gap:10px; margin-top:15px">
            <button class="btn" style="flex:1; background:#444; color:#fff" onclick="closeEdit()">取消</button>
            <button class="btn" style="flex:1; background:var(--primary); color:#000" onclick="saveEdit()">儲存</button>
        </div>
    </div>
</div>

<div id="share-overlay">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
        <button onclick="closeShare()" style="background:none; border:none; color:var(--accent); font-size:16px">〈 返回</button>
        <b style="font-size:18px;">分享與翻譯</b>
        <button onclick="doShare()" style="background:none; border:none; color:var(--accent); font-size:16px; font-weight:bold">🔗 發送</button>
    </div>

    <div style="display:flex; gap:8px; margin-bottom:10px;">
        <button class="btn" style="flex:1; background:var(--accent); color:#fff; padding:8px;" onclick="translateShare()">🇹🇼 翻成中文</button>
        <button class="btn" style="flex:1; background:var(--primary); color:#000; padding:8px;" onclick="saveTranslatedShare()">💾 覆蓋回原字幕</button>
    </div>

    <textarea id="preview-box" style="flex:1; background:#000; padding:15px; border-radius:12px; color:#ccc; border:1px solid #3a3a3c; resize:none; font-size:15px; line-height:1.5;"></textarea>
</div>

<script>
    let transcript = [], editIdx = -1, isAllSelected = false, selectedIndices = [];

    function hmsToSec(t) {
        const p = t.split(':');
        return p.length === 3 ? parseInt(p[0]) * 3600 + parseInt(p[1]) * 60 + parseFloat(p[2] || 0) : parseFloat(p[0] || 0);
    }
    function secToHms(s) {
        const h = Math.floor(s/3600)%24, m = Math.floor((s%3600)/60), sec = Math.floor(s%60);
        return [h,m,sec].map(v=>v.toString().padStart(2,'0')).join(':');
    }
    function formatSrtTime(sec) {
        const h = Math.floor(sec / 3600), m = Math.floor((sec % 3600) / 60), s = Math.floor(sec % 60), ms = Math.floor((sec - Math.floor(sec)) * 1000);
        return h.toString().padStart(2,'0') + ':' + m.toString().padStart(2,'0') + ':' + s.toString().padStart(2,'0') + ',' + ms.toString().padStart(3,'0');
    }
    function goBack() {
        const v = document.getElementById('mainMedia');
        if (v) { v.pause(); v.src = ''; }
        document.getElementById('player-ui').classList.add('hidden');
        document.getElementById('setup-ui').classList.remove('hidden');
    }

    async function startApp() {
        const mFile = document.getElementById('mediaFile').files[0];
        const sFile = document.getElementById('srtFile').files[0];
        if (!mFile) return alert("請至少選取一個影音檔！");
        isAllSelected = false;

        const v = document.createElement(mFile.name.toLowerCase().endsWith('.m4a') ? 'audio' : 'video');
        v.id = 'mainMedia'; v.controls = true; v.playsInline = true; v.src = URL.createObjectURL(mFile);
        document.getElementById('media-container').innerHTML = '';
        document.getElementById('media-container').appendChild(v);

        const markerContainer = document.getElementById('marker-container');
        markerContainer.innerHTML = '';

        const list = document.getElementById('list-container');
        list.innerHTML = ''; transcript = [];
        if (sFile) {
            let srtText = await sFile.text();
            const reg = /(\d+)\n(\d{2}:\d{2}:\d{2},\d{3}) --> (\d{2}:\d{2}:\d{2},\d{3})\n([\s\S]*?)(?=\n{2}|\n*$)/g;
            let m;
            while ((m = reg.exec(srtText.replace(/\r\n/g, '\n'))) !== null) {
                const start = hmsToSec(m[2].replace(',', '.')), text = m[4].replace(/\n/g, ' ').trim();
                const wall = secToHms(start), idx = transcript.length;
                transcript.push({ start: start, end: hmsToSec(m[3].replace(',', '.')), text: text, wall: wall });
                const div = document.createElement('div');
                div.className = 'subtitle-item'; div.id = "sub-" + idx;
                div.onclick = (e) => { if(e.target.type !== 'checkbox') { v.currentTime = start; v.play(); } };
                div.innerHTML = `<input type='checkbox' id='chk-${idx}'><span style='flex:1' id='t-${idx}'><small style='color:var(--primary)'>[${wall}]</small> ${text}</span><span style='color:var(--accent);font-size:12px;padding:5px;' onclick='event.stopPropagation();openEdit(${idx})'>✍️ 編輯</span>`;
                list.appendChild(div);
            }
        }
        document.getElementById('setup-ui').classList.add('hidden');
        document.getElementById('player-ui').classList.remove('hidden');

        v.ontimeupdate = () => {
            const ct = v.currentTime;
            document.getElementById('wall-time').innerText = secToHms(ct);
            if(transcript.length > 0) {
                const idx = transcript.findIndex(t => ct >= t.start && ct <= t.end);
                if (idx !== -1) {
                    document.querySelectorAll('.subtitle-item').forEach((el, i) => {
                        if (i === idx) {
                            if (!el.classList.contains('highlight')) {
                                el.classList.add('highlight');
                                if (!v.paused) list.scrollTo({ top: el.offsetTop - (list.clientHeight / 2) + (el.clientHeight / 2), behavior: 'smooth' });
                            }
                        } else el.classList.remove('highlight');
                    });
                }
            }
        };
    }

    function openEdit(i) { document.getElementById('mainMedia').pause(); editIdx = i; document.getElementById('edit-text').value = transcript[i].text; document.getElementById('edit-modal').style.display = 'flex'; }
    function closeEdit() { document.getElementById('edit-modal').style.display = 'none'; }
    function saveEdit() {
        const val = document.getElementById('edit-text').value; transcript[editIdx].text = val;
        document.getElementById("t-" + editIdx).innerHTML = `<small style='color:var(--primary)'>[${transcript[editIdx].wall}]</small> ${val}`;
        closeEdit(); document.getElementById('mainMedia').play();
    }
    function toggleSelectAll() { isAllSelected = !isAllSelected; for (let i = 0; i < transcript.length; i++) { const chk = document.getElementById("chk-" + i); if (chk) chk.checked = isAllSelected; } }

    function openShare() {
        selectedIndices = [];
        transcript.forEach((t, i) => { if (document.getElementById("chk-" + i).checked) selectedIndices.push(i); });
        if (selectedIndices.length === 0) return alert("請先勾選你要操作的字幕喔！");

        const selText = selectedIndices.map(i => `[${transcript[i].wall}] ${transcript[i].text}`).join('\n');
        document.getElementById('preview-box').value = selText;
        document.getElementById('share-overlay').style.display = 'flex';
    }
    function closeShare() { document.getElementById('share-overlay').style.display = 'none'; }
    async function doShare() { const txt = document.getElementById('preview-box').value; if (navigator.share) await navigator.share({ text: txt }).catch(() => {}); else { navigator.clipboard.writeText(txt); alert("已複製"); } }

    async function translateShare() {
        const apiKey = localStorage.getItem('sngGroqKey') || document.getElementById('groqApiKey').value.trim();
        if (!apiKey) return alert("請先到「🧠 Groq 助手」頁面輸入 Groq API Key！");
        const box = document.getElementById('preview-box');
        const originalText = box.value;
        box.value = "🤖 Groq 翻譯中...";
        try {
            const res = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST', headers: { 'Authorization': `Bearer ${apiKey}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: `請翻譯成「台灣繁體中文」，並原封不動保留 [HH:MM:SS] 時間標籤：\n\n${originalText}` }], temperature: 0.3 })
            });
            if (!res.ok) throw new Error("API 請求失敗");
            box.value = (await res.json()).choices[0].message.content.trim();
        } catch (e) { box.value = originalText; alert("❌ 翻譯失敗: " + e.message); }
    }

    function saveTranslatedShare() {
        const lines = document.getElementById('preview-box').value.split('\n');
        let matchedCount = 0, indexMap = {};
        selectedIndices.forEach(idx => { indexMap[transcript[idx].wall] = idx; });

        lines.forEach(line => {
            const match = line.match(/\[(\d{1,2}:\d{2}:\d{2}(?:\.\d+)?)\]\s*(.*)/);
            if (match && indexMap[match[1]] !== undefined) {
                const idx = indexMap[match[1]], text = match[2];
                transcript[idx].text = text;
                document.getElementById("t-" + idx).innerHTML = `<small style='color:var(--primary)'>[${match[1]}]</small> ${text}`;
                matchedCount++;
            }
        });
        alert(`✅ 成功同步 ${matchedCount} 筆翻譯回時間軸！`);
        closeShare();
    }

    function exportSelectedSRT() {
        let sel = [];
        transcript.forEach((t, i) => { if (document.getElementById("chk-" + i).checked) sel.push(i); });
        if (sel.length === 0) return alert("請先勾選你要匯出的字幕喔！");
        
        let srtContent = "";
        sel.forEach((idx, count) => {
            const t = transcript[idx];
            srtContent += (count + 1) + "\n" + formatSrtTime(t.start) + " --> " + formatSrtTime(t.end) + "\n" + t.text + "\n\n";
        });
        
        const blob = new Blob([srtContent], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.style.display = "none";
        a.href = url;
        
        const d = new Date();
        const hh = d.getHours().toString().padStart(2, '0');
        const mm = d.getMinutes().toString().padStart(2, '0');
        a.download = "Selected_" + hh + mm + ".srt";
        
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }, 150);
    }

    function exportSRT() {
        if (transcript.length === 0) return alert("沒有可以匯出的字幕！");
        let srtContent = "";
        transcript.forEach((t, idx) => { srtContent += (idx + 1) + "\n" + formatSrtTime(t.start) + " --> " + formatSrtTime(t.end) + "\n" + t.text + "\n\n"; });
        
        const blob = new Blob([srtContent], { type: "text/plain;charset=utf-8" });
        const url = URL.createObjectURL(blob);
        const a = document.createElement("a");
        a.style.display = "none";
        a.href = url;
        
        const d = new Date();
        const hh = d.getHours().toString().padStart(2, '0');
        const mm = d.getMinutes().toString().padStart(2, '0');
        a.download = "Edited_" + hh + mm + ".srt";
        
        document.body.appendChild(a);
        a.click();
        
        setTimeout(() => {
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
        }, 150);
    }

    // AI 區塊保留，以維持其他依賴功能的完整性
    const aiTemplates = {
        A: { desc: "目標：從逐字稿中找回模糊記憶。\n任務：找出時間點、列出原話。", prompt: (ts, q) => `請扮演專業分析助理。逐字稿如下。我記得：「${q}」。請幫我找出最符合的區間並列出原汁原味內容。\n\n${ts}` },
        B: { desc: "目標：將冗長的逐字稿濃縮成精華。\n任務：整理重點，並標註時間碼。", prompt: (ts, q) => `請整理這段對話的核心重點。務必在每個重點最後標註對應的「時間碼」（如：[00:15:20]）。\n\n${ts}` },
        C: { desc: "目標：快速解答。\n引擎：Groq 高速運算", prompt: (ts, q) => `你是一位博學多聞的 AI。請針對提問解答，全程使用繁體中文。\n\n問題：${q}\n\n參考資料：\n${ts}` }
    };

    function openAIUI() {
        if (transcript.length === 0) return alert("請先載入 SRT！");
        document.getElementById('mainMedia').pause();
        document.getElementById('player-ui').classList.add('hidden');
        document.getElementById('ai-ui').classList.remove('hidden');
        document.getElementById('groqApiKey').value = localStorage.getItem('sngGroqKey') || '';
        switchAIMode();
    }
    function closeAIUI() { document.getElementById('ai-ui').classList.add('hidden'); document.getElementById('player-ui').classList.remove('hidden'); }

    function openGeminiUI() {
        if (transcript.length === 0) return alert("請先載入 SRT！");
        document.getElementById('mainMedia').pause();
        document.getElementById('player-ui').classList.add('hidden');
        document.getElementById('gemini-ui').classList.remove('hidden');
        document.getElementById('geminiApiKey').value = localStorage.getItem('sngGeminiKey') || '';
    }
    function closeGeminiUI() { document.getElementById('gemini-ui').classList.add('hidden'); document.getElementById('player-ui').classList.remove('hidden'); }

    function switchAIMode() {
        const mode = document.querySelector('input[name="aiMode"]:checked').value;
        const querySection = document.getElementById('querySection');
        document.getElementById('templateDescription').innerText = aiTemplates[mode].desc;
        if (mode === 'A') { querySection.classList.remove('hidden'); document.getElementById('queryLabel').innerText = '🧠 你的模糊記憶：'; }
        else if (mode === 'B') { querySection.classList.add('hidden'); }
        else { querySection.classList.remove('hidden'); document.getElementById('queryLabel').innerText = '🤔 你想問什麼？'; }
    }

    function formatTimecodesToLinks(text) {
        return text.replace(/\[?(\d{1,2}:\d{2}:\d{2}(?:\.\d+)?)\]?/g, (match, p1) => {
            const sec = hmsToSec(p1);
            return `<span class="time-link" onclick="jumpToTime(${sec})">${match}</span>`;
        });
    }

    function jumpToTime(sec) {
        document.getElementById('ai-ui').classList.add('hidden');
        document.getElementById('gemini-ui').classList.add('hidden');
        document.getElementById('player-ui').classList.remove('hidden');
        const v = document.getElementById('mainMedia'); v.currentTime = sec; v.play();
    }

    async function executeGroqTask() {
        const groqKey = document.getElementById('groqApiKey').value.trim();
        const mode = document.querySelector('input[name="aiMode"]:checked').value;
        const query = document.getElementById('userQuery').value.trim();
        const resultBox = document.getElementById('aiResultBox'), searchBtn = document.getElementById('aiSearchBtn');

        if (!groqKey) return alert('需輸入 Groq API Key！');
        if (mode !== 'B' && !query) return alert('請輸入您的問題！');

        localStorage.setItem('sngGroqKey', groqKey);
        const finalPrompt = aiTemplates[mode].prompt(transcript.map(t => `[${t.wall}] ${t.text}`).join('\n'), query);

        searchBtn.disabled = true; searchBtn.innerText = '🧠 AI 處理中...';
        resultBox.innerText = '正在發送請求，請稍候...';

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${groqKey}` },
                body: JSON.stringify({ model: "llama-3.3-70b-versatile", messages: [{ role: "user", content: finalPrompt }], temperature: mode === 'B' ? 0.3 : 0.5, max_tokens: 1500 })
            });
            if (!response.ok) throw new Error((await response.json()).error?.message || "HTTP Error");
            resultBox.innerHTML = formatTimecodesToLinks((await response.json()).choices[0].message.content);
        } catch (e) { resultBox.innerText = `❌ 錯誤：\n${e.message}`; }
        finally { searchBtn.disabled = false; searchBtn.innerText = '🚀 執行任務'; }
    }

    async function executeGeminiTask() {
        const geminiKey = document.getElementById('geminiApiKey').value.trim();
        const query = document.getElementById('geminiQuery').value.trim();
        const resultBox = document.getElementById('geminiResultBox'), searchBtn = document.getElementById('geminiSearchBtn');

        if (!geminiKey) return alert('需輸入 Gemini API Key！');
        if (!query) return alert('請輸入您的問題！');

        localStorage.setItem('sngGeminiKey', geminiKey);
        const ts = transcript.map(t => `[${t.wall}] ${t.text}`).join('\n');

        const now = new Date().toLocaleString('zh-TW');
        const finalPrompt = `你是一位博學多聞的 AI。現在的台灣時間是 ${now}。請針對提問解答，若有需要可結合外部知識與下方字幕內容，全程使用繁體中文。\n\n問題：${query}\n\n參考資料：\n${ts}`;

        searchBtn.disabled = true; searchBtn.innerText = '🌍 連網搜尋中...';
        resultBox.innerText = '正在發送請求至 Google Gemini，請稍候...';

        try {
            const requestBody = {
                contents: [{ role: "user", parts: [{ text: finalPrompt }] }],
                tools: [{ googleSearch: {} }] 
            };

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errData = await response.json();
                throw new Error(errData.error?.message || `狀態碼 ${response.status}`);
            }

            const data = await response.json();
            if (!data.candidates || data.candidates.length === 0) throw new Error("Gemini 回傳空白結果");

            const candidate = data.candidates[0];
            const rawOutput = candidate.content.parts[0].text;

            const usedSearch = candidate.groundingMetadata &&
                               candidate.groundingMetadata.groundingChunks &&
                               candidate.groundingMetadata.groundingChunks.length > 0;

            let prefix = usedSearch ? "🤖 **AI (已連網 Google):**\n\n" : "🤖 **AI:**\n\n";
            resultBox.innerHTML = prefix + formatTimecodesToLinks(rawOutput);

        } catch (e) {
            resultBox.innerText = `❌ 系統錯誤：\n${e.message}\n(請確認 API Key 是否正確且模型可用)`;
        } finally {
            searchBtn.disabled = false; searchBtn.innerText = '🚀 連網發問';
        }
    }
</script>
