<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNG AKIRA - 智能任務控制台</title>
    <style>
        :root {
            --primary: #2c3e50;
            --accent: #e67e22;
            --bg: #f4f7f6;
            --success: #27ae60;
            --danger: #e74c3c;
            --info: #3498db;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: var(--bg); margin: 0; padding: 20px; color: #333; }
        .app-header { max-width: 1200px; margin: 0 auto 20px auto; display: flex; justify-content: space-between; align-items: center; }
        h1 { color: var(--primary); margin: 0; font-size: 24px; }
        
        /* 頁籤切換按鈕 */
        .tab-nav { display: flex; gap: 10px; }
        .tab-btn { padding: 10px 20px; border: none; background: #ddd; color: #555; border-radius: 8px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        .tab-btn.active { background: var(--primary); color: white; }
        
        /* 區塊容器 */
        .view-section { display: none; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); max-width: 1200px; margin: auto; animation: fadeIn 0.3s; }
        .view-section.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 輸入區樣式 */
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; color: var(--primary); }
        input[type="password"] { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; }
        textarea.data-input { width: 100%; height: 200px; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; resize: vertical; font-family: inherit; line-height: 1.5; }
        .primary-btn { width: 100%; padding: 14px; background-color: var(--accent); color: white; border: none; border-radius: 6px; font-size: 16px; cursor: pointer; font-weight: bold; transition: 0.3s; margin-top: 10px; }
        .primary-btn:hover { background-color: #d35400; }
        .status { margin-top: 15px; padding: 12px; background: #e8f8f5; border-left: 4px solid var(--success); border-radius: 4px; display: none; }

        /* 自訂 Prompt 折疊面板樣式 */
        details.prompt-settings { background: #fdfefe; border: 1px solid #d5dbdb; border-radius: 8px; padding: 10px 15px; margin-bottom: 15px; }
        details.prompt-settings summary { font-weight: bold; color: #34495e; cursor: pointer; outline: none; user-select: none; }
        details.prompt-settings textarea { width: 100%; height: 250px; margin-top: 10px; padding: 10px; border: 1px solid #ccc; border-radius: 4px; font-family: 'Courier New', Courier, monospace; font-size: 13px; background: #fafafa; resize: vertical; }
        .reset-btn { background: #7f8c8d; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 12px; margin-top: 5px; }
        .reset-btn:hover { background: #95a5a6; }

        /* 表格區樣式 */
        .table-controls { display: flex; justify-content: flex-end; margin-bottom: 15px; }
        .danger-btn { background: var(--danger); color: white; border: none; padding: 8px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        .table-wrapper { overflow-x: auto; }
        th, td { border: 1px solid #eee; padding: 12px; text-align: left; vertical-align: top; transition: background-color 0.3s; }
        th { background-color: var(--primary); color: white; position: sticky; top: 0; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        tr:hover { background-color: #f1f1f1; }
        
        .tag { display: inline-block; padding: 3px 8px; border-radius: 4px; font-size: 12px; font-weight: bold; background: #eee; margin: 2px; }
        .tag.time { background: #ffc107; color: #000; }
        .tag.done { background: var(--success); color: white; }
        
        /* 收合與展開的 CSS 魔法 */
        .cell-content { max-height: 85px; overflow-y: hidden; font-size: 13px; white-space: pre-wrap; word-break: break-all; transition: max-height 0.3s ease; }
        tr.is-expanded .cell-content { max-height: none; overflow-y: visible; }
        tr.is-expanded { background-color: #eaf2f8 !important; } /* 展開時整列變色提示 */

        /* 操作按鈕區 */
        .action-btns { display: flex; flex-direction: column; gap: 8px; }
        .toggle-btn { background: var(--info); color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .toggle-btn:hover { background: #2980b9; }
        .del-row-btn { background: #ff7675; color: white; border: none; padding: 6px 10px; border-radius: 4px; cursor: pointer; font-size: 12px; font-weight: bold; transition: 0.2s; }
        .del-row-btn:hover { background: var(--danger); }
    </style>
</head>
<body>

<div class="app-header">
    <h1>📡 SNG AKIRA 控制台</h1>
    <div class="tab-nav">
        <button class="tab-btn active" onclick="switchTab('inputView', this)">📝 任務輸入</button>
        <button class="tab-btn" onclick="switchTab('tableView', this)">📊 任務總表</button>
    </div>
</div>

<div id="inputView" class="view-section active">
    <div class="input-group">
        <label>🔑 Groq API Key</label>
        <input type="password" id="apiKey" placeholder="gsk_...">
    </div>

    <details class="prompt-settings">
        <summary>⚙️ 進階設定：自訂 AI 解析規則 (Prompt)</summary>
        <p style="font-size: 12px; color: #666; margin-top: 8px; margin-bottom: 0;">
            你可以直接在此處新增台內的專有名詞或特殊規則。修改後會自動記憶。<br>
            ⚠️ <b>注意：</b>請保留 <code>{{CURRENT_TIME}}</code> 與 <code>{{DEFAULT_DATE}}</code> 讓系統自動填入時間，並<b>絕對不要刪除最下方的 JSON 格式範例</b>，否則會導致程式崩潰。
        </p>
        <textarea id="promptTemplate"></textarea>
        <button class="reset-btn" onclick="resetPrompt()">🔄 恢復系統預設規則</button>
    </details>

    <div class="input-group">
        <label>💬 貼上群組的發班/直播詳細內容：</label>
        <textarea id="messageInput" class="data-input" placeholder="將多行節目表貼在這裡 (例如：1400 新聞大白話特報...)"></textarea>
    </div>

    <button id="parseBtn" class="primary-btn" onclick="parseMessage()">⚡ AI 解析並加入任務表</button>
    <div class="status" id="statusBox"></div>
</div>

<div id="tableView" class="view-section">
    <div class="table-controls">
        <button class="danger-btn" onclick="clearAllTasks()">🗑️ 清空所有任務</button>
    </div>
    
    <div class="table-wrapper">
        <table id="taskTable">
            <thead>
                <tr>
                    <th style="width: 100px;">鬧鐘時間</th>
                    <th style="width: 150px;">節目/專案</th>
                    <th style="width: 250px;">直播平台/來源</th> 
                    <th style="width: 180px;">標題資訊</th>
                    <th>內文/備註</th>
                    <th style="width: 85px;">操作</th>
                </tr>
            </thead>
            <tbody id="tableBody">
                </tbody>
        </table>
    </div>
</div>

<script>
    let tasks = [];
    let alarmInterval = null;

    // --- 修改了這裡的 defaultPrompt ---
    const defaultPrompt = `你是一個專業的新聞台 SNG 任務萃取助理。現在時間是「{{CURRENT_TIME}}」。
請從使用者貼上的節目清單中萃取資訊。使用者會一次貼上多行節目，請將「每一行」獨立轉換為一個鬧鐘任務，並在 alarms 陣列中輸出多個物件。

【關鍵解析規則】
1. 針對每行短格式 (例如：「1400 新聞大白話特報 (平台: 1 新聞大白話YT)」)：
   - 鬧鐘時間 (time)：開頭的四位數字 (如 1400) 請轉換為 24 小時制的 HH:MM 格式 (如 14:00)。
   - 節目名稱 (programName)：緊接在時間後面的文字 (如 新聞大白話特報)。
   - 平台資訊 (platforms)：括號內的資訊請完整保留。
2. 日期判定：若使用者提供的內容中沒有明確標示日期，請一律使用預設日期：「{{DEFAULT_DATE}}」。請絕對不要留空。
3. 沒有資訊的欄位請填空字串 ""。

【手動補充區】(你可以在這邊加上自己的新規則)
- 

嚴格回傳格式範例 (必須是包含 alarms 陣列的 JSON)：
{
  "alarms": [
    {
      "date": "{{DEFAULT_DATE}}",
      "time": "14:00",
      "programName": "新聞大白話特報",
      "timeNote": "",
      "platforms": "平台: 1 新聞大白話YT",
      "source": "",
      "staff": "",
      "titles": "",
      "content": "",
      "note": ""
    }
  ]
}`;

    window.onload = () => {
        const savedKey = localStorage.getItem('groq_api_key');
        if (savedKey) document.getElementById('apiKey').value = savedKey;
        
        const savedPrompt = localStorage.getItem('sng_custom_prompt');
        document.getElementById('promptTemplate').value = savedPrompt || defaultPrompt;
        
        const savedTasks = localStorage.getItem('sng_tasks');
        if (savedTasks) {
            tasks = JSON.parse(savedTasks);
            renderTable();
        }
        startAlarmChecker(); 
    };

    function resetPrompt() {
        if(confirm("確定要放棄自訂規則，恢復為系統預設的 Prompt 嗎？")) {
            document.getElementById('promptTemplate').value = defaultPrompt;
            localStorage.setItem('sng_custom_prompt', defaultPrompt);
        }
    }

    function switchTab(viewId, btnElement) {
        document.querySelectorAll('.view-section').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(viewId).classList.add('active');
        btnElement.classList.add('active');
        
        if(viewId === 'tableView') renderTable(); 
    }

    async function parseMessage() {
        const apiKey = document.getElementById('apiKey').value.trim();
        const message = document.getElementById('messageInput').value.trim();
        const promptTemplateInput = document.getElementById('promptTemplate').value.trim();
        const statusBox = document.getElementById('statusBox');
        const btn = document.getElementById('parseBtn');

        if (!apiKey || !message) {
            alert("請輸入 API Key 和群組訊息！"); return;
        }
        if (!promptTemplateInput.includes('alarms')) {
            alert("⚠️ 你的自訂 Prompt 似乎刪除了 JSON 格式範例，這會導致程式崩潰！請點擊「恢復系統預設規則」。"); return;
        }

        localStorage.setItem('groq_api_key', apiKey);
        localStorage.setItem('sng_custom_prompt', promptTemplateInput);

        btn.disabled = true;
        btn.innerText = "⚡ 正在分析龐大資料中...";
        statusBox.style.display = "block";
        statusBox.innerText = "AI 正在提取表格欄位，請稍候...";

        const now = new Date();
        const currentContext = `${now.getFullYear()}年${now.getMonth() + 1}月${now.getDate()}日 ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;
        const defaultDate = `${now.getFullYear()}-${(now.getMonth() + 1).toString().padStart(2, '0')}-${now.getDate().toString().padStart(2, '0')}`;

        const finalSystemPrompt = promptTemplateInput
            .replace(/{{CURRENT_TIME}}/g, currentContext)
            .replace(/{{DEFAULT_DATE}}/g, defaultDate);

        try {
            const response = await fetch('https://api.groq.com/openai/v1/chat/completions', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json', 'Authorization': `Bearer ${apiKey}` },
                body: JSON.stringify({
                    model: "llama-3.3-70b-versatile", 
                    messages: [
                        { role: "system", content: finalSystemPrompt },
                        { role: "user", content: `以下是使用者輸入的訊息：\n${message}` }
                    ],
                    temperature: 0.1,
                    response_format: { type: "json_object" }
                })
            });

            const data = await response.json();
            if (!response.ok) throw new Error(data.error?.message || "API 發生錯誤");

            const parsedData = JSON.parse(data.choices[0].message.content);
            
            parsedData.alarms.forEach(task => {
                task.id = Date.now() + Math.random().toString(36).substr(2, 9);
                task.notified = false; 
                tasks.push(task);
            });

            localStorage.setItem('sng_tasks', JSON.stringify(tasks));
            renderTable();

            statusBox.innerHTML = `✅ 成功解析並加入 <b>${parsedData.alarms.length}</b> 筆任務到總表中！`;
            document.getElementById('messageInput').value = ''; 
            
            setTimeout(() => {
                document.querySelectorAll('.tab-btn')[1].click();
                statusBox.style.display = "none";
            }, 1000);

        } catch (error) {
            statusBox.innerHTML = `❌ 解析失敗：${error.message}`;
            console.error(error);
        } finally {
            btn.disabled = false;
            btn.innerText = "⚡ AI 解析並加入任務表";
        }
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';

        if (tasks.length === 0) {
            tbody.innerHTML = '<tr><td colspan="6" style="text-align:center; padding: 20px; color:#777;">目前沒有任務，請在輸入區新增。</td></tr>';
            return;
        }

        tasks.sort((a, b) => new Date(`${a.date}T${a.time}`) - new Date(`${b.date}T${b.time}`));

        tasks.forEach(task => {
            const tr = document.createElement('tr');
            // 給予每列一個獨立 ID 方便控制收合
            tr.id = `row-${task.id}`; 
            
            const isDone = task.notified ? '<span class="tag done">已提醒</span>' : '';
            const formatText = (text) => text ? text.replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>') : '-';

            tr.innerHTML = `
                <td>
                    <span class="tag time">${task.date.substring(5)} ${task.time}</span><br>
                    ${isDone}
                </td>
                <td><b>${task.programName || '-'}</b><br><div style="font-size:12px;color:#666;margin-top:4px;">${task.timeNote || ''}</div></td>
                <td>
                    <div class="cell-content">
                        <b>平台:</b><br>${formatText(task.platforms)}<br>
                        <b>來源:</b> ${task.source || '-'}<br>
                        <b>人員:</b> ${task.staff || '-'}
                    </div>
                </td>
                <td><div class="cell-content">${formatText(task.titles)}</div></td>
                <td>
                    <div class="cell-content">
                        ${task.content ? task.content + '<hr style="margin:5px 0; border:0; border-top:1px dashed #ccc;">' : ''}
                        <i>備註: ${task.note || '-'}</i>
                    </div>
                </td>
                <td>
                    <div class="action-btns">
                        <button class="toggle-btn" onclick="toggleRow('${task.id}', this)">🔽 展開</button>
                        <button class="del-row-btn" onclick="deleteTask('${task.id}')">🗑️ 刪除</button>
                    </div>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // 控制單列收合與展開的函數
    function toggleRow(id, btn) {
        const tr = document.getElementById(`row-${id}`);
        tr.classList.toggle('is-expanded');
        
        if (tr.classList.contains('is-expanded')) {
            btn.innerText = '🔼 收合';
            btn.style.background = '#7f8c8d'; // 收合狀態改為灰色提示
        } else {
            btn.innerText = '🔽 展開';
            btn.style.background = '#3498db'; // 展開按鈕維持藍色
        }
    }

    function deleteTask(id) {
        if(confirm("確定要刪除這筆任務嗎？")) {
            tasks = tasks.filter(t => t.id !== id);
            localStorage.setItem('sng_tasks', JSON.stringify(tasks));
            renderTable();
        }
    }

    function clearAllTasks() {
        if(confirm("⚠️ 警告：確定要清空今天所有的任務記錄嗎？")) {
            tasks = [];
            localStorage.removeItem('sng_tasks');
            renderTable();
        }
    }

    function startAlarmChecker() {
        if (alarmInterval) clearInterval(alarmInterval);
        
        alarmInterval = setInterval(() => {
            const now = new Date();
            let needsRender = false;

            tasks.forEach(task => {
                if (!task.notified) {
                    const targetTime = new Date(`${task.date}T${task.time}:00`);
                    if (now >= targetTime) {
                        task.notified = true;
                        needsRender = true;
                        playAlarmSound();
                        setTimeout(() => {
                            alert(`⏰ 轉播時間到！\n\n節目：${task.programName || '未命名任務'}\n時間：${task.time}`);
                        }, 500);
                    }
                }
            });

            if (needsRender) {
                localStorage.setItem('sng_tasks', JSON.stringify(tasks));
                if (document.getElementById('tableView').classList.contains('active')) {
                    renderTable(); 
                }
            }
        }, 1000);
    }

    function playAlarmSound() {
        const context = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = context.createOscillator();
        const gainNode = context.createGain();
        oscillator.type = 'square';
        oscillator.frequency.setValueAtTime(880, context.currentTime); 
        gainNode.gain.setValueAtTime(0.5, context.currentTime);
        gainNode.gain.exponentialRampToValueAtTime(0.001, context.currentTime + 1.5);
        oscillator.connect(gainNode);
        gainNode.connect(context.destination);
        oscillator.start();
        oscillator.stop(context.currentTime + 1.5);
    }
</script>

</body>
</html>
