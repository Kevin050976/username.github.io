<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>全螢幕倒數計時器 (同步版)</title>
    <!-- 引入 QRCode 生成庫 -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: #000;
            color: white;
            min-height: 100vh;
            min-height: 100dvh; 
            width: 100vw;
            overflow-x: hidden;
            overflow-y: auto;
            touch-action: manipulation;
        }
        
        #app {
            display: flex;
            flex-direction: column;
            min-height: 100vh;
            min-height: 100dvh;
            padding-bottom: env(safe-area-inset-bottom);
        }
        
        /* 密碼解鎖按鈕 */
        #unlock-btn {
            position: fixed;
            bottom: 25px;
            right: 25px;
            font-size: 2rem;
            cursor: pointer;
            opacity: 0.4;
            transition: opacity 0.3s;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.1);
            padding: 10px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
        }

        #unlock-btn:hover {
            opacity: 1;
        }

        /* 主選單樣式 */
        #menu-screen {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 20px;
            flex: 1;
        }
        
        .menu-content {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            margin-bottom: 10px;
        }
        
        .title {
            font-size: clamp(1.8rem, 5vw, 2.5rem);
            margin-bottom: 15px;
            text-align: center;
            color: #fff;
            font-weight: 600;
        }

        /* 觀眾等待區塊 (含 QRCode) */
        #viewer-section {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 20px 0;
        }

        #viewer-msg {
            font-size: 1.5rem;
            color: #888;
            margin-bottom: 20px;
            text-align: center;
            animation: pulse 2s infinite;
        }

        #qrcode {
            background: white;
            padding: 15px;
            border-radius: 10px;
            /* 預設為隱藏，如果是在 iframe 中則隱藏，實機打開才顯示 */
        }

        @keyframes pulse {
            0% { opacity: 0.5; }
            50% { opacity: 1; }
            100% { opacity: 0.5; }
        }
        
        /* 管理員控制區塊 */
        .button-grid {
            display: none; 
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: 15px;
            width: 100%;
            max-width: 500px;
        }
        
        .time-btn {
            padding: 22px 10px;
            font-size: 2rem;
            background: linear-gradient(135deg, #007AFF, #0062CC);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.15s;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .time-btn:active {
            transform: scale(0.96);
            background: linear-gradient(135deg, #0062CC, #0050A3);
        }

        /* 管理員字卡輸入區 */
        #admin-message-input {
            display: none;
            width: 100%;
            padding: 10px 20px;
            justify-content: center;
            gap: 10px;
            background: rgba(0,0,0,0.5);
        }

        #msg-input {
            flex: 1;
            max-width: 600px;
            padding: 15px;
            font-size: 1.2rem;
            border-radius: 10px;
            border: none;
            background: #222;
            color: white;
            outline: none;
        }

        #msg-send-btn, #msg-clear-btn {
            padding: 15px 20px;
            font-size: 1.2rem;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
        }
        #msg-send-btn { background: #34C759; color: white; }
        #msg-clear-btn { background: #555; color: white; }
        
        .current-time {
            font-size: 1.2rem;
            color: #aaa;
            padding: 10px 0;
            text-align: center;
            width: 100%;
        }
        
        @media (orientation: landscape) {
            .button-grid {
                grid-template-columns: repeat(4, minmax(0, 1fr));
                gap: 12px;
                max-width: 800px;
            }
            .time-btn {
                padding: 15px 5px;
                font-size: 1.6rem;
                border-radius: 15px;
            }
        }
        
        /* 倒數畫面樣式 */
        #countdown-screen {
            display: none;
            flex-direction: column;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100vh;
            height: 100dvh;
            background: #000;
            z-index: 100;
            padding-top: env(safe-area-inset-top);
        }
        
        .countdown-wrapper {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
        }
        
        .countdown-display {
            font-size: min(32vw, 45vh);
            font-weight: 900;
            line-height: 1;
            text-align: center;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.2);
            width: 100%;
            padding: 0 10px;
            font-variant-numeric: tabular-nums;
        }

        /* 觀眾端字卡顯示區 */
        .message-display {
            font-size: clamp(4rem, 10vw, 8rem); /* 顯著放大字體，支援響應式 */
            color: #FFD60A; /* 醒目的黃色 */
            text-align: center;
            min-height: 1.5em; /* 預留空間避免畫面跳動 */
            font-weight: bold;
            text-shadow: 0 0 20px rgba(255, 214, 10, 0.8); /* 加深陰影讓大字更清楚 */
            margin-top: 10px;
            padding: 0 20px;
            width: 100%;
            word-wrap: break-word;
        }
        
        /* 管理員控制列 (預設隱藏) */
        #admin-action-buttons {
            display: none; 
            width: 100%;
            padding: 15px 20px;
            padding-bottom: max(25px, env(safe-area-inset-bottom));
            justify-content: center;
            gap: 12px;
            background: rgba(0,0,0,0.5);
        }
        
        .stop-btn, .pause-btn, .restart-btn, .card-btn {
            padding: 10px 5px; /* 縮小上下左右的內距 */
            color: white;
            border: none;
            border-radius: 12px; /* 稍微縮小圓角比例 */
            font-size: 1.1rem; /* 縮小字體 */
            font-weight: bold;
            cursor: pointer;
            transition: all 0.15s;
            width: 100%;
            max-width: 90px; /* 將按鈕的最大寬度縮小，從 120px 改為 90px */
        }
        
        .stop-btn { background: linear-gradient(135deg, #FF3B30, #E60000); }
        .pause-btn { background: linear-gradient(135deg, #FF9500, #FF8800); }
        .restart-btn { background: linear-gradient(135deg, #34C759, #2CAE4B); }
        .card-btn { background: linear-gradient(135deg, #AF52DE, #5E5CE6); }
        
        .stop-btn:active { transform: scale(0.95); }
        .pause-btn:active { transform: scale(0.95); }
        .restart-btn:active { transform: scale(0.95); }
        .card-btn:active { transform: scale(0.95); }
        
        .flashing {
            animation: flash 1s infinite;
        }
        @keyframes flash {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }
    </style>
</head>
<body>
    <div id="app">
        <!-- 密碼解鎖鈕 -->
        <div id="unlock-btn" title="主控端解鎖">🔒</div>

        <!-- 主選單畫面 -->
        <div id="menu-screen">
            <div class="menu-content">
                <h1 class="title">全螢幕倒數計時器</h1>
                
                <!-- 觀眾等待區塊 (含 QRCode) -->
                <div id="viewer-section">
                    <div id="viewer-msg">等待主控端操作...</div>
                    <div id="qrcode"></div>
                </div>
                
                <!-- 主控端：時間按鈕 -->
                <div class="button-grid" id="admin-controls">
                    <button class="time-btn" data-time="180">3:00</button>
                    <button class="time-btn" data-time="150">2:30</button>
                    <button class="time-btn" data-time="120">2:00</button>
                    <button class="time-btn" data-time="90">1:30</button>
                    <button class="time-btn" data-time="60">1:00</button>
                    <button class="time-btn" data-time="30">0:30</button>
                    <button class="time-btn" data-time="20">0:20</button>
                    <button class="time-btn" data-time="1200">20:00</button>
                </div>
            </div>
            
            <div class="current-time" id="current-time"></div>
        </div>
        
        <!-- 倒數畫面 -->
        <div id="countdown-screen">
            <div class="countdown-wrapper">
                <div class="countdown-display" id="countdown-display">0:00</div>
                <!-- 觀眾端：字卡顯示區 -->
                <div class="message-display" id="message-display"></div>
            </div>

            <!-- 主控端：字卡輸入區 -->
            <div id="admin-message-input">
                <input type="text" id="msg-input" placeholder="輸入字卡內容推播至螢幕...">
                <button id="msg-send-btn">發送</button>
                <button id="msg-clear-btn">清除</button>
            </div>

            <!-- 主控端：倒數控制 (停止/暫停) -->
            <div id="admin-action-buttons">
                <button class="restart-btn" id="restart-btn">重新</button>
                <button class="pause-btn" id="pause-btn">暫停</button>
                <button class="stop-btn" id="stop-btn">停止</button>
                <button class="card-btn" id="card-btn">字卡</button>
            </div>
        </div>
    </div>

    <!-- 載入 Firebase 模組 -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // ==========================================
        // 1. Firebase 設定區 (請填入你申請到的 API Key)
        // ==========================================
        const myFirebaseConfig = {
            apiKey: "AIzaSyBTAfe5wuGrLfPJQ_zcWFGUccplWXh12PQ", // <--- 填這裡
            authDomain: "synctimer-728c8.firebaseapp.com", // <--- 填這裡
            projectId: "synctimer-728c8", // <--- 填這裡
            storageBucket: "synctimer-728c8.firebasestorage.app",
            messagingSenderId: "148121880969",
            appId: "1:148121880969:web:1eb47c1f1f8f95ff663958"
        };
        const myAppId = 'my-sync-timer';

        const fbConfigString = typeof __firebase_config !== 'undefined' ? __firebase_config : null;
        const finalConfig = fbConfigString ? JSON.parse(fbConfigString) : myFirebaseConfig;
        const appId = typeof __app_id !== 'undefined' ? __app_id : myAppId;

        let app, auth, db;
        try {
            if(finalConfig.apiKey && finalConfig.apiKey !== "你的_API_KEY_請替換這裡") {
                app = initializeApp(finalConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            } else if (fbConfigString) {
                app = initializeApp(finalConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            } else {
                console.warn("⚠️ 尚未設定 Firebase，目前啟動【離線單機模式】。");
            }
        } catch (err) {
            console.error("Firebase 初始化失敗:", err);
        }

        // --- 全域狀態變數 ---
        let isAdmin = false;       
        let localTimer = null;     
        let currentStatus = 'menu';
        let endTime = 0;           
        let pausedRemaining = 0;   
        let originalDuration = 0;  
        let currentMessage = ''; // 儲存目前的字卡內容
        let isTypingCard = false; // 是否正在輸入字卡

        // --- DOM 元素 ---
        const ui = {
            unlockBtn: document.getElementById('unlock-btn'),
            viewerSection: document.getElementById('viewer-section'),
            adminControls: document.getElementById('admin-controls'),
            adminMsgInput: document.getElementById('admin-message-input'),
            adminActions: document.getElementById('admin-action-buttons'),
            menuScreen: document.getElementById('menu-screen'),
            countdownScreen: document.getElementById('countdown-screen'),
            display: document.getElementById('countdown-display'),
            msgDisplay: document.getElementById('message-display'),
            msgInputVal: document.getElementById('msg-input'),
            msgSendBtn: document.getElementById('msg-send-btn'),
            msgClearBtn: document.getElementById('msg-clear-btn'),
            timeBtns: document.querySelectorAll('.time-btn'),
            stopBtn: document.getElementById('stop-btn'),
            pauseBtn: document.getElementById('pause-btn'),
            restartBtn: document.getElementById('restart-btn'),
            cardBtn: document.getElementById('card-btn'),
            currentTime: document.getElementById('current-time'),
            qrcodeEl: document.getElementById('qrcode')
        };

        // --- 產生 QRCode ---
        function generateQRCode() {
            // 你指定的 GitHub 網址
            const targetUrl = "https://kevin050976.github.io/username.github.io/countdown3.html";
            
            // 由於在 iframe (預覽環境) 中 QRCode 套件可能算錯尺寸，加點防呆
            try {
                new QRCode(ui.qrcodeEl, {
                    text: targetUrl,
                    width: 200,
                    height: 200,
                    colorDark : "#000000",
                    colorLight : "#ffffff",
                    correctLevel : QRCode.CorrectLevel.H
                });
            } catch(e) {
                console.warn("QRCode 生成失敗:", e);
            }
        }

        // --- 1. 初始化與事件綁定 ---
        function initFrontend() {
            // 時鐘
            setInterval(() => {
                ui.currentTime.textContent = new Date().toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
            }, 1000);

            // 生成QRCode
            generateQRCode();

            // 解鎖邏輯
            ui.unlockBtn.addEventListener('click', () => {
                if (isAdmin) {
                    alert("您已是主控端狀態。");
                    return;
                }
                const pwd = prompt("請輸入主控端密碼：");
            if (pwd === "8888") {
                isAdmin = true;
                ui.unlockBtn.textContent = '🔓';
                // 隱藏觀眾區(QRCode)
                ui.viewerSection.style.display = 'none';
                // 顯示管理員區塊
                ui.adminControls.style.display = 'grid'; 
                if (currentStatus !== 'menu') {
                    ui.adminActions.style.display = 'flex';
                }
                syncLocalView({}); // 強制更新畫面狀態
                if(!auth || !db) {
                        alert("解鎖成功！(目前為單機模式，請記得填寫 Firebase API)");
                    }
                } else if (pwd !== null) {
                    alert("密碼錯誤，您目前為僅檢視模式。");
                }
            });

            // 字卡按鈕 (開啟輸入框)
            ui.cardBtn.addEventListener('click', () => {
                if (!isAdmin) return;
                isTypingCard = true; // 切換為輸入模式
                syncLocalView({});
                ui.msgInputVal.focus(); // 自動聚焦輸入框
            });

            // 字卡發送鈕
            ui.msgSendBtn.addEventListener('click', () => {
                if (!isAdmin) return;
                const text = ui.msgInputVal.value.trim();
                isTypingCard = false; // 關閉輸入模式

                if (text === "") {
                    // 沒輸入按發送 = 取消，直接關閉切換回按鈕
                    syncLocalView({});
                    return;
                }
                pushStateToFirebase({ customMessage: text });
                ui.msgInputVal.value = ''; // 清空以利下次輸入
            });

            // 字卡清除鈕
            ui.msgClearBtn.addEventListener('click', () => {
                if (!isAdmin) return;
                isTypingCard = false; // 關閉輸入模式
                ui.msgInputVal.value = '';
                pushStateToFirebase({ customMessage: '' });
            });

            // 時間按鈕
            ui.timeBtns.forEach(btn => {
                btn.addEventListener('click', () => {
                    if (!isAdmin) return;
                    const seconds = parseInt(btn.dataset.time);
                    pushStateToFirebase({
                        status: 'running',
                        endTime: Date.now() + (seconds * 1000),
                        originalDuration: seconds,
                        pausedRemaining: 0
                        // 啟動倒數時，刻意保留原本的 customMessage 不清空，讓字卡繼續顯示
                    });
                });
            });

            ui.pauseBtn.addEventListener('click', () => {
                if (!isAdmin || currentStatus === 'menu' || currentStatus === 'finished') return;
                
                if (currentStatus === 'running') {
                    const remaining = Math.max(0, endTime - Date.now());
                    pushStateToFirebase({
                        status: 'paused',
                        pausedRemaining: remaining,
                        endTime: 0,
                        originalDuration: originalDuration
                    });
                } else if (currentStatus === 'paused') {
                    pushStateToFirebase({
                        status: 'running',
                        endTime: Date.now() + pausedRemaining,
                        pausedRemaining: 0,
                        originalDuration: originalDuration
                    });
                }
            });

            ui.restartBtn.addEventListener('click', () => {
                if (!isAdmin || originalDuration === 0) return;
                pushStateToFirebase({
                    status: 'running',
                    endTime: Date.now() + (originalDuration * 1000),
                    originalDuration: originalDuration,
                    pausedRemaining: 0
                });
            });

            ui.stopBtn.addEventListener('click', () => {
                if (!isAdmin) return;
                isTypingCard = false; // 關閉輸入模式
                // 停止時，除了回主選單，也一併清空字卡
                pushStateToFirebase({ 
                    status: 'menu',
                    customMessage: '' 
                });
                ui.msgInputVal.value = ''; // 清空主控端的輸入框
            });
            
            document.addEventListener('touchmove', (e) => {
                if (ui.countdownScreen.style.display === 'flex') {
                    e.preventDefault();
                }
            }, { passive: false });
        }

        // --- 2. Firebase 資料讀寫核心 ---

        async function pushStateToFirebase(newState) {
            if (!auth || !db || !auth.currentUser) {
                syncLocalView(newState);
                return; 
            }
            try {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'timerState', 'global');
                await setDoc(docRef, newState, { merge: true });
                syncLocalView(newState); 
            } catch (err) {
                console.error("同步失敗，降級為本機模式:", err);
                syncLocalView(newState);
            }
        }

        function listenToCloudTimer() {
            if (!db) return;
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'timerState', 'global');
            
            onSnapshot(docRef, (docSnap) => {
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    syncLocalView(data);
                }
            }, (error) => {
                console.warn("連線錯誤:", error);
            });
        }

        async function startFirebase() {
            if (!auth) return; 
            try {
                await signInAnonymously(auth);
                onAuthStateChanged(auth, (user) => {
                    if (user) {
                        listenToCloudTimer();
                    }
                });
            } catch (error) {
                console.error("Firebase 登入失敗:", error);
            }
        }

        // --- 3. 畫面渲染與同步 ---
        
        function syncLocalView(data) {
            currentStatus = data.status || currentStatus;
            if (data.endTime !== undefined) endTime = data.endTime;
            if (data.pausedRemaining !== undefined) pausedRemaining = data.pausedRemaining;
            if (data.originalDuration !== undefined) originalDuration = data.originalDuration;
            
            // 處理字卡更新
            if (data.customMessage !== undefined) {
                currentMessage = data.customMessage;
                ui.msgDisplay.textContent = currentMessage;
                // 如果是管理員收到雲端同步的字卡更新，也一併更新輸入框的值
                if (isAdmin && ui.msgInputVal.value !== currentMessage && document.activeElement !== ui.msgInputVal) {
                 ui.msgInputVal.value = currentMessage;
            }
        }

        if (localTimer) clearInterval(localTimer);
        ui.display.classList.remove('flashing');

        if (currentStatus === 'menu') {
            ui.countdownScreen.style.display = 'none';
            ui.menuScreen.style.display = 'flex';
            ui.adminActions.style.display = 'none';
            ui.adminMsgInput.style.display = 'none';
        } 
        else if (currentStatus === 'running') {
            ui.menuScreen.style.display = 'none';
            ui.countdownScreen.style.display = 'flex';
            ui.pauseBtn.textContent = '暫停';
            if (isAdmin) {
                ui.adminActions.style.display = isTypingCard ? 'none' : 'flex';
                ui.adminMsgInput.style.display = isTypingCard ? 'flex' : 'none';
            }
            
            renderTick();
            localTimer = setInterval(renderTick, 200);
        } 
        else if (currentStatus === 'paused') {
            ui.menuScreen.style.display = 'none';
            ui.countdownScreen.style.display = 'flex';
            ui.pauseBtn.textContent = '繼續';
            if (isAdmin) {
                ui.adminActions.style.display = isTypingCard ? 'none' : 'flex';
                ui.adminMsgInput.style.display = isTypingCard ? 'flex' : 'none';
            }
            
            renderTimeLeft(pausedRemaining);
        }
        else if (currentStatus === 'finished') {
            ui.menuScreen.style.display = 'none';
            ui.countdownScreen.style.display = 'flex';
            if (isAdmin) {
                ui.adminActions.style.display = isTypingCard ? 'none' : 'flex';
                ui.adminMsgInput.style.display = isTypingCard ? 'flex' : 'none';
            }
            
            ui.display.textContent = "0:00";
            ui.display.style.color = '#FF3B30';
                ui.display.style.textShadow = '0 0 25px rgba(255, 59, 48, 0.6)';
                ui.display.classList.add('flashing');
            }
        }

        function renderTick() {
            const now = Date.now();
            const remaining = Math.max(0, endTime - now);
            
            if (remaining <= 0) {
                clearInterval(localTimer);
                if (isAdmin) {
                    pushStateToFirebase({ status: 'finished', originalDuration: originalDuration });
                }
                return;
            }
            renderTimeLeft(remaining);
        }

        function renderTimeLeft(ms) {
            const totalSeconds = Math.ceil(ms / 1000);
            const mins = Math.floor(totalSeconds / 60);
            const secs = totalSeconds % 60;
            
            ui.display.textContent = `${mins}:${secs < 10 ? '0' : ''}${secs}`;
            
            if (totalSeconds <= 10) {
                ui.display.style.color = '#FF3B30';
                ui.display.style.textShadow = '0 0 25px rgba(255, 59, 48, 0.6)';
            } else if (totalSeconds <= 30) {
                ui.display.style.color = '#FF9500';
                ui.display.style.textShadow = '0 0 25px rgba(255, 149, 0, 0.6)';
            } else {
                ui.display.style.color = '#FFFFFF';
                ui.display.style.textShadow = '0 0 20px rgba(255, 255, 255, 0.3)';
            }
        }

        initFrontend();
        startFirebase();

    </script>
</body>
</html>
