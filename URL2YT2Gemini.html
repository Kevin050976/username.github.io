<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube 連續播放控制台</title>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden; 
            position: relative;
        }
        #video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            flex-shrink: 0;
            z-index: 10;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        #info-section {
            flex-grow: 1;
            padding: 15px;
            padding-bottom: 110px;
            background: #111;
            overflow-y: auto;
            touch-action: pan-y; 
        }
        #vid-title {
            margin: 0 0 5px 0;
            font-size: 18px;
            line-height: 1.3;
        }
        #vid-channel {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: #aaa;
        }
        #vid-desc {
            background: #222;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
            white-space: pre-wrap; 
            word-wrap: break-word;
        }
        #controls { 
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            height: 90px; 
            background: #1c1c1e; 
            box-sizing: border-box; 
            padding: 0 15px;
            padding-bottom: env(safe-area-inset-bottom); 
            gap: 15px; 
            z-index: 100;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5); 
        }
        button { 
            flex: 1; 
            height: 55px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            background: #0a84ff; 
            color: white; 
            touch-action: manipulation; 
        }
        button:active { background: #0060d1; }
        button:disabled { 
            background: #3a3a3c; 
            color: #8e8e93;
            cursor: not-allowed; 
        }
        #status { 
            font-size: 15px; 
            font-weight: 500;
            color: #ebebf5;
            white-space: nowrap; 
            text-align: center;
            min-width: 80px;
        }

        #prompt-panel {
            position: fixed;
            top: 0;
            right: -100%; 
            width: 85%;
            height: 100dvh;
            background: rgba(28, 28, 30, 0.98);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: -5px 0 20px rgba(0,0,0,0.7);
            transition: right 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 200; 
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        #prompt-panel.open {
            right: 0;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .panel-header h3 {
            margin: 0;
            font-size: 20px;
        }
        .close-btn {
            background: #3a3a3c;
            height: 40px;
            flex: 0 0 80px;
            font-size: 16px;
        }
        #requirement-input {
            flex-grow: 1;
            margin-bottom: 15px;
            background: #000;
            color: #fff;
            border: 1px solid #3a3a3c;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            outline: none;
            font-family: inherit;
        }
        #copy-prompt-btn {
            background: #32d74b;
            flex: 0 0 60px;
            font-size: 18px;
            transition: background 0.2s;
        }
        #copy-prompt-btn:active { background: #28a745; }

        #swipe-hint {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(50, 50, 50, 0.7);
            color: #fff;
            padding: 15px 5px;
            border-radius: 8px 0 0 8px;
            z-index: 50;
            font-size: 12px;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="video-wrapper">
        <iframe id="yt-player" allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </div>
    
    <div id="swipe-hint" onclick="togglePanel(true)">◀ 品管</div>

    <div id="info-section">
        <h3 id="vid-title">載入影片畫面中...</h3>
        <p id="vid-channel"></p>
        <div id="vid-desc">準備抓取資料...</div>
    </div>

    <div id="controls">
        <button id="prev-btn" onclick="changeVideo(-1)">◄ 上一部</button>
        <div id="status">等待中</div>
        <button id="next-btn" onclick="changeVideo(1)">下一部 ►</button>
    </div>

    <div id="prompt-panel">
        <div class="panel-header">
            <h3>📝 發稿比對設定</h3>
            <button class="close-btn" onclick="togglePanel(false)">收合</button>
        </div>
        <textarea id="requirement-input" placeholder="請貼上您的發稿需求單..."></textarea>
        <button id="copy-prompt-btn" onclick="copyToGemini()">📋 複製發稿比對內容</button>
    </div>

    <script>
        const API_KEY = 'AIzaSyCD8fnx7T0aEpPG2Co5p4QDqshIgB_ix1Y'; 

        let videoIds = [];
        let currentIndex = 0;
        let globalVideoData = []; 

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawText = urlParams.get('text');

            if (rawText) {
                const rawTextDecoded = decodeURIComponent(rawText);
                const regExp = /(?:youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|live\/|shorts\/)([a-zA-Z0-9_-]{11})/g;
                const matches = [...rawTextDecoded.matchAll(regExp)];
                videoIds = matches.map(match => match[1]);
                videoIds = [...new Set(videoIds)];

                if (videoIds.length > 0) {
                    // 先幫所有影片建立好預設空資料
                    for (let i = 0; i < videoIds.length; i++) {
                        globalVideoData.push({
                            id: videoIds[i],
                            channel: '',
                            title: '',
                            desc: ''
                        });
                    }
                    
                    // 核心修正 1：絕對優先讓影片先播，不要等 API！
                    loadVideo(0); 
                    
                    // 核心修正 2：背景去抓所有頻道資料
                    fetchAllVideoData();
                } else {
                    document.getElementById('status').innerText = '無效網址';
                    document.getElementById('vid-title').innerText = '找不到 YouTube 影片';
                    document.getElementById('vid-desc').innerText = '請確認複製的文字中是否包含有效的 YouTube 連結。';
                }
            } else {
                document.getElementById('status').innerText = '無輸入';
                document.getElementById('vid-title').innerText = '請透過捷徑傳入網址';
                document.getElementById('vid-desc').innerText = '';
            }
            
            setupSwipeGestures();
        }

        function loadVideo(index) {
            if (index < 0 || index >= videoIds.length) return;
            currentIndex = index;
            
            const currentId = videoIds[currentIndex];
            
            // 讓影片毫無阻礙地播放
            const player = document.getElementById('yt-player');
            player.src = `https://www.youtube.com/embed/${currentId}?autoplay=1&playsinline=1`;
            
            document.getElementById('status').innerText = `${currentIndex + 1} / ${videoIds.length}`;
            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').disabled = (currentIndex === videoIds.length - 1);

            // 更新下方文字（如果有抓到就顯示，沒抓到就顯示載入中）
            const currentData = globalVideoData[currentIndex];
            if (currentData && currentData.title) {
                document.getElementById('vid-title').innerText = currentData.title;
                document.getElementById('vid-channel').innerText = currentData.channel;
                document.getElementById('vid-desc').innerText = currentData.desc ? currentData.desc : '（此影片無提供內文）';
            } else {
                document.getElementById('vid-title').innerText = '載入影片資訊中...';
                document.getElementById('vid-channel').innerText = '';
                document.getElementById('vid-desc').innerText = '抓取內文中...';
            }
        }

        async function fetchAllVideoData() {
            const idsString = videoIds.join(',');
            const apiUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${idsString}&key=${API_KEY}`;

            try {
                const response = await fetch(apiUrl);
                const data = await response.json();
                
                if (data.items && data.items.length > 0) {
                    const infoMap = {};
                    for (let i = 0; i < data.items.length; i++) {
                        const item = data.items[i];
                        infoMap[item.id] = {
                            channel: item.snippet.channelTitle,
                            title: item.snippet.title,
                            desc: item.snippet.description
                        };
                    }

                    // 把抓回來的資料填入陣列
                    for (let i = 0; i < globalVideoData.length; i++) {
                        const vid = globalVideoData[i];
                        if (infoMap[vid.id]) {
                            vid.channel = infoMap[vid.id].channel;
                            vid.title = infoMap[vid.id].title;
                            vid.desc = infoMap[vid.id].desc;
                        } else {
                            vid.channel = '未知頻道';
                            vid.title = '（無標題）';
                            vid.desc = '（無內文）';
                        }
                    }
                    
                    // 資料填齊後，刷新一次當前畫面的文字
                    loadVideo(currentIndex);
                }
            } catch (error) {
                console.error("API 請求錯誤: ", error);
                document.getElementById('vid-title').innerText = 'API 請求失敗，請檢查金鑰';
            }
        }

        function changeVideo(direction) {
            loadVideo(currentIndex + direction);
        }

        function togglePanel(show) {
            const panel = document.getElementById('prompt-panel');
            if (show) {
                panel.classList.add('open');
            } else {
                panel.classList.remove('open');
            }
        }

        function setupSwipeGestures() {
            let touchStartX = 0;
            let touchEndX = 0;
            
            const swipeArea = document.getElementById('info-section');
            
            swipeArea.addEventListener('touchstart', function(e) {
                touchStartX = e.changedTouches[0].screenX;
            }, false);
            
            swipeArea.addEventListener('touchend', function(e) {
                touchEndX = e.changedTouches[0].screenX;
                const swipeDistance = touchStartX - touchEndX;
                if (swipeDistance > 50) togglePanel(true);
                if (swipeDistance < -50) togglePanel(false);
            }, false);
        }

        function copyToGemini() {
            const requirement = document.getElementById('requirement-input').value;
            const reqText = requirement ? requirement : '（未輸入發稿需求）';

            // 抓出所有有名字的頻道
            let channelsArray = [];
            for (let i = 0; i < globalVideoData.length; i++) {
                if (globalVideoData[i].channel) {
                    channelsArray.push(globalVideoData[i].channel);
                }
            }
            const channels = channelsArray.join('，');

            // 拿第一支影片當代表
            let sampleTitle = '（無標題）';
            let sampleDesc = '（無內文）';
            if (globalVideoData.length > 0) {
                sampleTitle = globalVideoData[0].title ? globalVideoData[0].title : '（無標題）';
                sampleDesc = globalVideoData[0].desc ? globalVideoData[0].desc : '（無內文）';
            }

            // 組裝出精簡、不重複的比對格式
            const finalPrompt = `${reqText}\n\n====================\n【頻道】：${channels}\n\n【標題】：${sampleTitle}\n\n【內文】：\n${sampleDesc}`;

            navigator.clipboard.writeText(finalPrompt).then(function() {
                const btn = document.getElementById('copy-prompt-btn');
                const originalText = btn.innerText;
                const originalBg = btn.style.background;
                
                btn.innerText = '✅ 已複製！請貼給 Gemini';
                btn.style.background = '#0a84ff';
                
                setTimeout(function() {
                    btn.innerText = originalText;
                    btn.style.background = originalBg;
                }, 2000);
            }).catch(function(err) {
                console.error('複製失敗', err);
                alert('剪貼簿權限遭阻擋，請手動全選文字複製。');
            });
        }
    </script>
</body>
</html>
