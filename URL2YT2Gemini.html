<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube 連續播放控制台</title>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            height: 100dvh; 
            overflow: hidden; 
            position: relative;
        }
        #video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            flex-shrink: 0;
            z-index: 10;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        #info-section {
            flex-grow: 1;
            padding: 15px;
            padding-bottom: 110px;
            background: #111;
            overflow-y: auto;
            /* 讓這個區塊能更滑順地接收手勢 */
            touch-action: pan-y; 
        }
        #vid-title {
            margin: 0 0 5px 0;
            font-size: 18px;
            line-height: 1.3;
        }
        #vid-channel {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: #aaa;
        }
        #vid-desc {
            background: #222;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #ccc;
            line-height: 1.5;
            white-space: pre-wrap; 
            word-wrap: break-word;
        }
        #controls { 
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            height: 90px; 
            background: #1c1c1e; 
            box-sizing: border-box; 
            padding: 0 15px;
            padding-bottom: env(safe-area-inset-bottom); 
            gap: 15px; 
            z-index: 100;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5); 
        }
        button { 
            flex: 1; 
            height: 55px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            background: #0a84ff; 
            color: white; 
            touch-action: manipulation; 
        }
        button:active { background: #0060d1; }
        button:disabled { 
            background: #3a3a3c; 
            color: #8e8e93;
            cursor: not-allowed; 
        }
        #status { 
            font-size: 15px; 
            font-weight: 500;
            color: #ebebf5;
            white-space: nowrap; 
            text-align: center;
            min-width: 80px;
        }

        /* --- 新增：滑動側邊面板樣式 --- */
        #prompt-panel {
            position: fixed;
            top: 0;
            right: -100%; /* 預設隱藏在右側畫面外 */
            width: 85%;
            height: 100dvh;
            background: rgba(28, 28, 30, 0.98);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            box-shadow: -5px 0 20px rgba(0,0,0,0.7);
            transition: right 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            z-index: 200; 
            display: flex;
            flex-direction: column;
            padding: 20px;
            box-sizing: border-box;
            padding-top: env(safe-area-inset-top, 20px);
            padding-bottom: env(safe-area-inset-bottom, 20px);
        }
        #prompt-panel.open {
            right: 0;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
        }
        .panel-header h3 {
            margin: 0;
            font-size: 20px;
        }
        .close-btn {
            background: #3a3a3c;
            height: 40px;
            flex: 0 0 80px;
            font-size: 16px;
        }
        #requirement-input {
            flex-grow: 1;
            margin-bottom: 15px;
            background: #000;
            color: #fff;
            border: 1px solid #3a3a3c;
            border-radius: 12px;
            padding: 15px;
            font-size: 16px;
            line-height: 1.5;
            resize: none;
            outline: none;
            font-family: inherit;
        }
        #copy-prompt-btn {
            background: #32d74b;
            flex: 0 0 60px;
            font-size: 18px;
            transition: background 0.2s;
        }
        #copy-prompt-btn:active { background: #28a745; }

        /* 視覺提示：右側的小拉環 */
        #swipe-hint {
            position: fixed;
            right: 0;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(50, 50, 50, 0.7);
            color: #fff;
            padding: 15px 5px;
            border-radius: 8px 0 0 8px;
            z-index: 50;
            font-size: 12px;
            writing-mode: vertical-rl;
            text-orientation: upright;
            letter-spacing: 2px;
        }
    </style>
</head>
<body>
    <div id="video-wrapper">
        <iframe id="yt-player" allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </div>
    
    <!-- 加入手勢提示拉環 -->
    <div id="swipe-hint" onclick="togglePanel(true)">◀ 品管</div>

    <div id="info-section">
        <h3 id="vid-title">載入影片資訊中...</h3>
        <p id="vid-channel">頻道名稱</p>
        <div id="vid-desc">載入內文中...</div>
    </div>

    <div id="controls">
        <button id="prev-btn" onclick="changeVideo(-1)">◄ 上一部</button>
        <div id="status">等待中</div>
        <button id="next-btn" onclick="changeVideo(1)">下一部 ►</button>
    </div>

    <!-- 新增：品管需求與提示詞面板 -->
    <div id="prompt-panel">
        <div class="panel-header">
            <h3>📝 發稿品管設定</h3>
            <button class="close-btn" onclick="togglePanel(false)">收合</button>
        </div>
        <textarea id="requirement-input" placeholder="請在此輸入您的品管需求、預設內文或任何前置指令..."></textarea>
        <button id="copy-prompt-btn" onclick="copyToGemini()">📋 複製完整提示詞</button>
    </div>

    <script>
        const API_KEY = 'AIzaSyCD8fnx7T0aEpPG2Co5p4QDqshIgB_ix1Y'; 

        let videoIds = [];
        let currentIndex = 0;

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawText = urlParams.get('text');

            if (rawText) {
                const rawTextDecoded = decodeURIComponent(rawText);
                
                const regExp = /(?:youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|live\/|shorts\/)([a-zA-Z0-9_-]{11})/g;
                const matches = [...rawTextDecoded.matchAll(regExp)];
                videoIds = matches.map(match => match[1]);
                
                videoIds = [...new Set(videoIds)];

                if (videoIds.length > 0) {
                    loadVideo(0); 
                } else {
                    document.getElementById('status').innerText = '無效網址';
                    document.getElementById('vid-title').innerText = '找不到 YouTube 影片';
                    document.getElementById('vid-desc').innerText = '請確認複製的文字中是否包含有效的 YouTube 連結。';
                }
            } else {
                document.getElementById('status').innerText = '無輸入';
                document.getElementById('vid-title').innerText = '請透過捷徑傳入網址';
                document.getElementById('vid-desc').innerText = '';
            }
            
            // 初始化滑動偵測
            setupSwipeGestures();
        }

        function loadVideo(index) {
            if (index < 0 || index >= videoIds.length) return;
            currentIndex = index;
            const currentVideoId = videoIds[currentIndex];
            
            const player = document.getElementById('yt-player');
            player.src = `https://www.youtube.com/embed/${currentVideoId}?autoplay=1&playsinline=1`;
            
            document.getElementById('status').innerText = `${currentIndex + 1} / ${videoIds.length}`;
            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').disabled = (currentIndex === videoIds.length - 1);

            document.getElementById('vid-title').innerText = '載入影片資訊中...';
            document.getElementById('vid-channel').innerText = '';
            document.getElementById('vid-desc').innerText = '抓取內文中...';

            const apiUrl = `https://www.googleapis.com/youtube/v3/videos?part=snippet&id=${currentVideoId}&key=${API_KEY}`;

            fetch(apiUrl)
                .then(response => response.json())
                .then(data => {
                    if (data.items && data.items.length > 0) {
                        const snippet = data.items[0].snippet;
                        document.getElementById('vid-title').innerText = snippet.title;
                        document.getElementById('vid-channel').innerText = snippet.channelTitle;
                        
                        const description = snippet.description;
                        document.getElementById('vid-desc').innerText = description ? description : '（此影片無提供內文）';
                    } else {
                        document.getElementById('vid-title').innerText = '無法取得資訊';
                        document.getElementById('vid-desc').innerText = '可能影片已設為私人或遭移除。';
                    }
                })
                .catch(error => {
                    console.error("API 請求錯誤: ", error);
                    document.getElementById('vid-title').innerText = 'API 請求失敗';
                    document.getElementById('vid-desc').innerText = '請檢查 API 金鑰是否正確，或是否超過使用額度。';
                });
        }

        function changeVideo(direction) {
            loadVideo(currentIndex + direction);
        }

        /* --- 新增：控制面板開關 --- */
        function togglePanel(show) {
            const panel = document.getElementById('prompt-panel');
            if (show) {
                panel.classList.add('open');
            } else {
                panel.classList.remove('open');
            }
        }

        /* --- 新增：手勢滑動偵測 --- */
        function setupSwipeGestures() {
            let touchStartX = 0;
            let touchEndX = 0;
            
            // 綁定在 info-section 避免被 iframe 吃掉手勢
            const swipeArea = document.getElementById('info-section');
            
            swipeArea.addEventListener('touchstart', e => {
                touchStartX = e.changedTouches[0].screenX;
            }, false);
            
            swipeArea.addEventListener('touchend', e => {
                touchEndX = e.changedTouches[0].screenX;
                handleSwipe();
            }, false);
            
            function handleSwipe() {
                const swipeDistance = touchStartX - touchEndX;
                // 向左滑動超過 50px，打開面板
                if (swipeDistance > 50) {
                    togglePanel(true);
                }
                // 向右滑動超過 50px，關閉面板
                if (swipeDistance < -50) {
                    togglePanel(false);
                }
            }
        }

        /* --- 新增：組合並複製提示詞給 Gemini --- */
        function copyToGemini() {
            const requirement = document.getElementById('requirement-input').value;
            const title = document.getElementById('vid-title').innerText;
            const desc = document.getElementById('vid-desc').innerText;

            // 組裝準備送給 AI 的完整文字
            const finalPrompt = `${requirement}\n\n==========\n【YouTube 標題】\n${title}\n\n【YouTube 內文】\n${desc}`;

            // 使用瀏覽器剪貼簿 API
            navigator.clipboard.writeText(finalPrompt).then(() => {
                const btn = document.getElementById('copy-prompt-btn');
                const originalText = btn.innerText;
                const originalBg = btn.style.background;
                
                // 提供成功的視覺回饋
                btn.innerText = '✅ 已複製！請切換至 Gemini';
                btn.style.background = '#0a84ff';
                
                // 2秒後恢復原狀
                setTimeout(() => {
                    btn.innerText = originalText;
                    btn.style.background = originalBg;
                }, 2000);
            }).catch(err => {
                console.error('複製失敗', err);
                alert('剪貼簿權限遭阻擋，請手動全選文字複製。');
            });
        }

        init();
    </script>
</body>
</html>
