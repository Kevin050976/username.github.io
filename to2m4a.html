<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4A 轉碼 (輕量穩定版)</title>
    <script src="https://unpkg.com/@ffmpeg/ffmpeg@0.11.6/dist/ffmpeg.min.js"></script>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; background: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { margin-bottom: 15px; width: 100%; padding: 12px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #aaa; }
        #log-box { background: #1e1e1e; color: #00ff00; padding: 10px; height: 250px; overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>影片轉 m4a (輕量穩定版)</h2>
        <input type="file" id="uploader" accept="video/mp4, video/quicktime">
        <input type="password" id="token" placeholder="GitHub Token (ghp_...)">
        <input type="text" id="repo" placeholder="GitHub 儲存庫 (例: name/repo)">
        
        <button id="start-btn" disabled>載入轉碼引擎中...</button>
        <div id="log-box">等待操作...<br></div>
    </div>

    <script>
        const logBox = document.getElementById('log-box');
        function log(msg) {
            logBox.innerHTML += msg + '<br>';
            logBox.scrollTop = logBox.scrollHeight;
        }

        // 捕捉全域錯誤
        window.onerror = function(msg) { log(`<span style="color:red">🔴 系統錯誤: ${msg}</span>`); };

        // 使用 v0.11 的簡化寫法
        const { createFFmpeg, fetchFile } = FFmpeg;
        const ffmpeg = createFFmpeg({
            corePath: 'https://unpkg.com/@ffmpeg/core@0.11.0/dist/ffmpeg-core.js',
            logger: ({ message }) => log(`[底層] ${message}`)
        });

        const startBtn = document.getElementById('start-btn');
        const uploader = document.getElementById('uploader');

        async function init() {
            try {
                log("🟡 正在呼叫輕量版引擎...");
                await ffmpeg.load();
                log("🎉 引擎準備完畢！");
                startBtn.disabled = false;
                startBtn.innerText = "開始轉碼並上傳";
            } catch (e) {
                log(`<span style="color:red">❌ 引擎載入失敗: ${e.message}</span>`);
            }
        }
        
        // 稍微延遲讓瀏覽器有喘息空間
        setTimeout(init, 500);

        startBtn.addEventListener('click', async () => {
            const file = uploader.files[0];
            const token = document.getElementById('token').value;
            const repo = document.getElementById('repo').value;

            if (!file || !token || !repo) return alert("請填寫所有欄位！");

            try {
                startBtn.disabled = true;
                log("正在將影片寫入虛擬空間...");
                ffmpeg.FS('writeFile', 'input.mp4', await fetchFile(file));

                log("轉碼中 (16kHz, 32kbps)...");
                // v0.11 的執行語法
                await ffmpeg.run('-i', 'input.mp4', '-ar', '16000', '-b:a', '32k', 'output.m4a');

                log("✅ 轉碼完成！正在讀取檔案...");
                const data = ffmpeg.FS('readFile', 'output.m4a');
                
                log("準備上傳至 GitHub...");
                // 將 Uint8Array 轉為 Base64
                let binary = '';
                const len = data.byteLength;
                for (let i = 0; i < len; i++) {
                    binary += String.fromCharCode(data[i]);
                }
                const base64Data = window.btoa(binary);
                const fileName = `audio_${Date.now()}.m4a`;

                const response = await fetch(`https://api.github.com/repos/${repo}/contents/${fileName}`, {
                    method: 'PUT',
                    headers: {
                        'Authorization': `Bearer ${token}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        message: 'Upload m4a via Web Lite',
                        content: base64Data
                    })
                });

                if (response.ok) {
                    const resData = await response.json();
                    log(`🎉 上傳成功！<br><a href="${resData.content.html_url}" target="_blank" style="color:#00ffff;">點此查看檔案</a>`);
                } else {
                    const err = await response.json();
                    log(`<span style="color:red">❌ GitHub 拒絕上傳：${err.message}</span>`);
                }
                startBtn.disabled = false;
            } catch (e) {
                log(`<span style="color:red">❌ 發生錯誤：${e.message}</span>`);
                startBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
