<script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
        // 👉 這裡多引入了 toBlobURL
        import { fetchFile, toBlobURL } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

        const ffmpeg = new FFmpeg();
        const logBox = document.getElementById('log-box');
        const startBtn = document.getElementById('start-btn');
        const uploader = document.getElementById('uploader');

        function log(msg) {
            logBox.innerHTML += msg + '<br>';
            logBox.scrollTop = logBox.scrollHeight;
        }

        ffmpeg.on('log', ({ message }) => log(`[FFmpeg] ${message}`));

        async function init() {
            try {
                log("正在透過 Blob 偽裝跨網域檔案...");
                const coreBaseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';
                const ffmpegBaseURL = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm';

                // 👉 這裡用 toBlobURL 把檔案轉換成本地 Blob 網址，破解瀏覽器限制
                await ffmpeg.load({
                    coreURL: await toBlobURL(`${coreBaseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${coreBaseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                    classWorkerURL: await toBlobURL(`${ffmpegBaseURL}/worker.js`, 'text/javascript')
                });
                
                log("✅ 引擎準備完畢！");
                startBtn.disabled = false;
                startBtn.innerText = "開始轉碼並上傳";
            } catch (e) {
                log(`❌ 引擎載入失敗: ${e.message}`);
            }
        }
        init();

        startBtn.addEventListener('click', async () => {
            const file = uploader.files[0];
            const token = document.getElementById('token').value;
            const repo = document.getElementById('repo').value;

            if (!file || !token || !repo) return alert("請填寫所有欄位！");

            try {
                startBtn.disabled = true;
                log("正在讀取影片...");
                await ffmpeg.writeFile('input.mp4', await fetchFile(file));

                log("轉碼中 (16kHz, 32kbps)... 平板運算中，請保持螢幕亮起！");
                await ffmpeg.exec(['-i', 'input.mp4', '-ar', '16000', '-b:a', '32k', 'output.m4a']);

                const data = await ffmpeg.readFile('output.m4a');
                log("✅ 轉碼完成！準備上傳...");

                const blob = new Blob([data.buffer], { type: 'audio/mp4' });
                const reader = new FileReader();
                
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];
                    const fileName = `audio_${Date.now()}.m4a`;

                    const response = await fetch(`https://api.github.com/repos/${repo}/contents/${fileName}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: 'Upload m4a via Web',
                            content: base64Data
                        })
                    });

                    if (response.ok) {
                        const resData = await response.json();
                        log(`🎉 上傳成功！<br><a href="${resData.content.html_url}" target="_blank" style="color:#007bff;">點此查看檔案</a>`);
                    } else {
                        const err = await response.json();
                        log(`❌ 上傳失敗：${err.message}`);
                    }
                    startBtn.disabled = false;
                };
                reader.readAsDataURL(blob);

            } catch (e) {
                log(`❌ 發生錯誤：${e.message}`);
                startBtn.disabled = false;
            }
        });
    </script>
