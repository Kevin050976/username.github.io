<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>M4A 轉碼測試 (修復版)</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; background: #f0f0f0; }
        .card { background: white; padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        input, button { margin-bottom: 15px; width: 100%; padding: 12px; box-sizing: border-box; border-radius: 5px; border: 1px solid #ccc; }
        button { background: #007bff; color: white; font-weight: bold; border: none; cursor: pointer; }
        button:disabled { background: #aaa; }
        #log-box { background: #1e1e1e; color: #00ff00; padding: 10px; height: 200px; overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 5px; }
    </style>
</head>
<body>
    <div class="card">
        <h2>影片轉 m4a (單檔測試)</h2>
        <input type="file" id="uploader" accept="video/mp4, video/quicktime">
        <input type="password" id="token" placeholder="GitHub Token (ghp_...)">
        <input type="text" id="repo" placeholder="GitHub 儲存庫 (例: name/repo)">
        
        <button id="start-btn" disabled>載入轉碼引擎中...</button>
        <div id="log-box">等待操作...<br></div>
    </div>

    <script type="module">
        import { FFmpeg } from 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm/index.js';
        import { fetchFile, toBlobURL } from 'https://unpkg.com/@ffmpeg/util@0.12.1/dist/esm/index.js';

        const ffmpeg = new FFmpeg();
        const logBox = document.getElementById('log-box');
        const startBtn = document.getElementById('start-btn');
        const uploader = document.getElementById('uploader');

        function log(msg) {
            logBox.innerHTML += msg + '<br>';
            logBox.scrollTop = logBox.scrollHeight;
        }

        ffmpeg.on('log', ({ message }) => log(`[FFmpeg] ${message}`));

        async function init() {
            try {
                log("正在載入轉碼核心 (破解跨網域限制)...");
                const coreBaseURL = 'https://unpkg.com/@ffmpeg/core@0.12.6/dist/esm';
                const ffmpegBaseURL = 'https://unpkg.com/@ffmpeg/ffmpeg@0.12.10/dist/esm';

                await ffmpeg.load({
                    coreURL: await toBlobURL(`${coreBaseURL}/ffmpeg-core.js`, 'text/javascript'),
                    wasmURL: await toBlobURL(`${coreBaseURL}/ffmpeg-core.wasm`, 'application/wasm'),
                    classWorkerURL: await toBlobURL(`${ffmpegBaseURL}/worker.js`, 'text/javascript')
                });
                
                log("✅ 引擎準備完畢！");
                startBtn.disabled = false;
                startBtn.innerText = "開始轉碼並上傳";
            } catch (e) {
                log(`❌ 引擎載入失敗: ${e.message}`);
            }
        }
        init();

        startBtn.addEventListener('click', async () => {
            const file = uploader.files[0];
            const token = document.getElementById('token').value;
            const repo = document.getElementById('repo').value;

            if (!file || !token || !repo) return alert("請填寫所有欄位！");

            try {
                startBtn.disabled = true;
                log("正在讀取影片...");
                await ffmpeg.writeFile('input.mp4', await fetchFile(file));

                log("轉碼中 (16kHz, 32kbps)... 平板運算中，請保持螢幕亮起！");
                await ffmpeg.exec(['-i', 'input.mp4', '-ar', '16000', '-b:a', '32k', 'output.m4a']);

                const data = await ffmpeg.readFile('output.m4a');
                log("✅ 轉碼完成！準備上傳...");

                const blob = new Blob([data.buffer], { type: 'audio/mp4' });
                const reader = new FileReader();
                
                reader.onload = async () => {
                    const base64Data = reader.result.split(',')[1];
                    const fileName = `audio_${Date.now()}.m4a`;

                    const response = await fetch(`https://api.github.com/repos/${repo}/contents/${fileName}`, {
                        method: 'PUT',
                        headers: {
                            'Authorization': `Bearer ${token}`,
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            message: 'Upload m4a via Web',
                            content: base64Data
                        })
                    });

                    if (response.ok) {
                        const resData = await response.json();
                        log(`🎉 上傳成功！<br><a href="${resData.content.html_url}" target="_blank" style="color:#007bff;">點此查看檔案</a>`);
                    } else {
                        const err = await response.json();
                        log(`❌ 上傳失敗：${err.message}`);
                    }
                    startBtn.disabled = false;
                };
                reader.readAsDataURL(blob);

            } catch (e) {
                log(`❌ 發生錯誤：${e.message}`);
                startBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
