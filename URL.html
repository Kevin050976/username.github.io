<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <!-- 針對手機螢幕最佳化，防止使用者不小心縮放網頁 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube 連續播放控制台</title>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; /* 填滿螢幕高度 */
            overflow: hidden; /* 防止整個網頁上下滑動 */
        }
        #player-container { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #111;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        /* 針對 iPhone 底部優化的控制列 */
        #controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            height: 90px; 
            background: #1c1c1e; 
            padding: 0 15px;
            padding-bottom: env(safe-area-inset-bottom); /* 適應 iPhone 底部的橫條 */
            gap: 15px; 
        }
        /* 巨大化的觸控按鈕 */
        button { 
            flex: 1; 
            height: 55px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            background: #0a84ff; /* iOS 預設藍色 */
            color: white; 
            touch-action: manipulation; /* 提升觸控反應速度 */
        }
        button:active {
            background: #0060d1; 
        }
        button:disabled { 
            background: #3a3a3c; 
            color: #8e8e93;
            cursor: not-allowed; 
        }
        #status { 
            font-size: 15px; 
            font-weight: 500;
            color: #ebebf5;
            white-space: nowrap; 
            text-align: center;
            min-width: 80px;
        }
    </style>
</head>
<body>
    <div id="player-container">
        <!-- 播放器區塊，加上 playsinline 讓影片在 iPhone 上可以在網頁內播放，而不會強制全螢幕 -->
        <iframe id="yt-player" allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </div>
    <div id="controls">
        <button id="prev-btn" onclick="changeVideo(-1)">◄ 上一部</button>
        <div id="status">等待中</div>
        <button id="next-btn" onclick="changeVideo(1)">下一部 ►</button>
    </div>

    <script>
        let videoIds = [];
        let currentIndex = 0;

        // 利用 Regex 精準提取「各種」YouTube 網址中的 Video ID
        function extractVideoID(url) {
            // 強化版的正則表達式，支援一般影片、youtu.be 短網址、直播 (live) 與短影音 (shorts)
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|live\/|shorts\/)([^#\&\?]*).*/;
            const match = url.match(regExp);
            // 確保抓出來的 ID 是標準的 11 碼
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function init() {
            // 讀取網址結尾 ?urls= 後面的參數
            const urlParams = new URLSearchParams(window.location.search);
            const urlsParam = urlParams.get('urls');

            if (urlsParam) {
                // 將逗號分隔的網址解碼並轉換為陣列
                const urls = decodeURIComponent(urlsParam).split(',');
                // 過濾並轉換為純 Video ID 陣列
                videoIds = urls.map(extractVideoID).filter(id => id !== null);

                if (videoIds.length > 0) {
                    loadVideo(0); // 載入第一部影片
                } else {
                    document.getElementById('status').innerText = '無效網址';
                }
            } else {
                document.getElementById('status').innerText = '無輸入';
            }
        }

        function loadVideo(index) {
            if (index < 0 || index >= videoIds.length) return;
            currentIndex = index;
            
            const player = document.getElementById('yt-player');
            // 轉換為 embed 格式並啟用自動播放
            player.src = `https://www.youtube.com/embed/${videoIds[currentIndex]}?autoplay=1&playsinline=1`;
            
            // 更新底部按鈕與狀態文字
            document.getElementById('status').innerText = `${currentIndex + 1} / ${videoIds.length}`;
            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').disabled = (currentIndex === videoIds.length - 1);
        }

        function changeVideo(direction) {
            loadVideo(currentIndex + direction);
        }

        // 啟動程式
        init();
    </script>
</body>
</html>
