<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube 連續播放控制台</title>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            height: 100vh; 
            overflow: hidden; 
        }
        #player-container { 
            flex-grow: 1; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            background: #111;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        #controls { 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            height: 90px; 
            background: #1c1c1e; 
            padding: 0 15px;
            padding-bottom: env(safe-area-inset-bottom); 
            gap: 15px; 
        }
        button { 
            flex: 1; 
            height: 55px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            background: #0a84ff; 
            color: white; 
            touch-action: manipulation; 
        }
        button:active { background: #0060d1; }
        button:disabled { 
            background: #3a3a3c; 
            color: #8e8e93;
            cursor: not-allowed; 
        }
        #status { 
            font-size: 15px; 
            font-weight: 500;
            color: #ebebf5;
            white-space: nowrap; 
            text-align: center;
            min-width: 80px;
        }
    </style>
</head>
<body>
    <div id="player-container">
        <iframe id="yt-player" allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </div>
    <div id="controls">
        <button id="prev-btn" onclick="changeVideo(-1)">◄ 上一部</button>
        <div id="status">等待中</div>
        <button id="next-btn" onclick="changeVideo(1)">下一部 ►</button>
    </div>

    <script>
        let videoIds = [];
        let currentIndex = 0;

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            // 抓取捷徑傳過來的「整段原始文字」
            const rawText = urlParams.get('text') || urlParams.get('urls');

            if (rawText) {
                const decodedText = decodeURIComponent(rawText);
                
                // 強制全域搜尋 (g)，直接掃描文字中所有符合特徵的 11 碼影片 ID
                const regExp = /(?:youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|live\/|shorts\/)([a-zA-Z0-9_-]{11})/g;
                
                // 將所有符合的結果提取出來
                const matches = [...decodedText.matchAll(regExp)];
                videoIds = matches.map(match => match[1]);
                
                // 去除重複的影片 ID (避免同一網址出現兩次)
                videoIds = [...new Set(videoIds)];

                if (videoIds.length > 0) {
                    loadVideo(0); 
                } else {
                    document.getElementById('status').innerText = '無效網址';
                }
            } else {
                document.getElementById('status').innerText = '無輸入';
            }
        }

        function loadVideo(index) {
            if (index < 0 || index >= videoIds.length) return;
            currentIndex = index;
            
            const player = document.getElementById('yt-player');
            player.src = `https://www.youtube.com/embed/${videoIds[currentIndex]}?autoplay=1&playsinline=1`;
            
            document.getElementById('status').innerText = `${currentIndex + 1} / ${videoIds.length}`;
            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').disabled = (currentIndex === videoIds.length - 1);
        }

        function changeVideo(direction) {
            loadVideo(currentIndex + direction);
        }

        init();
    </script>
</body>
</html>
