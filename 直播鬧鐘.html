<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 直播鬧鐘擷取工具 (終極版)</title>
    <style>
        /* 網頁基本排版與顏色 */
        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f4f7f6;
        }
        h2 { text-align: center; color: #333; margin-bottom: 10px; }
        
        /* 系統控制區 (防熄屏) */
        .system-control {
            background-color: #fff3cd; border: 2px solid #ffeeba;
            padding: 10px; border-radius: 8px; margin-bottom: 20px; text-align: center;
        }
        .btn-master {
            background-color: #e67e22; color: white; border: none;
            padding: 8px 15px; border-radius: 8px; font-size: 14px;
            font-weight: bold; cursor: pointer; width: 100%; transition: 0.3s;
        }
        .btn-master.active { background-color: #27ae60; }

        /* 輸入區與工具列 */
        .input-group { display: flex; flex-direction: column; gap: 10px; margin-bottom: 20px; }
        .toolbar { display: flex; justify-content: flex-end; }
        .btn-tool {
            background-color: #7f8c8d; color: white; border: none;
            padding: 6px 12px; border-radius: 6px; font-size: 13px;
            cursor: pointer; font-weight: bold;
        }
        .btn-tool:active { background-color: #95a5a6; }
        
        textarea {
            width: 100%; height: 100px; padding: 12px; border: 2px solid #ddd;
            border-radius: 8px; font-size: 15px; box-sizing: border-box;
        }
        
        .button-group { display: flex; gap: 10px; }
        .btn-add {
            background-color: #06C755; color: white; border: none; cursor: pointer;
            padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; flex: 1;
        }
        .btn-sort {
            background-color: #3498db; color: white; border: none; cursor: pointer;
            padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; flex: 0.5;
        }

        /* 鬧鐘清單排版 */
        .alarm-list { list-style: none; padding: 0; margin: 0; }
        .alarm-item {
            display: flex; align-items: center; justify-content: space-between;
            background: white; padding: 15px; margin-bottom: 12px;
            border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .alarm-info { display: flex; flex-direction: column; gap: 10px; flex-grow: 1; }
        
        /* 標題 (點擊效果) */
        .alarm-title { 
            font-size: 17px; font-weight: bold; color: #2980b9; 
            cursor: pointer; text-decoration: underline; text-underline-offset: 4px;
            display: inline-block;
        }
        .alarm-title:active { color: #1c5980; background-color: #f0f8ff; }
        
        /* 時間與加減按鈕區 */
        .time-control { display: flex; align-items: center; gap: 12px; }
        .time-text { color: #e74c3c; font-size: 20px; font-weight: bold; width: 60px; text-align: center; }
        .btn-time {
            background-color: #ecf0f1; border: none; color: #333;
            width: 40px; height: 40px; border-radius: 8px; font-size: 24px; font-weight: bold;
            display: flex; align-items: center; justify-content: center; cursor: pointer;
        }
        .btn-time:active { background-color: #bdc3c7; }

        .alarm-controls { display: flex; align-items: center; gap: 12px; }
        .btn-delete { background: none; border: none; color: #95a5a6; font-size: 24px; padding: 5px; cursor: pointer; }
        
        /* 開關 */
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 26px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #06C755; }
        input:checked + .slider:before { transform: translateX(20px); }

        /* 彈出視窗共用樣式 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.7); display: none; 
            align-items: center; justify-content: center; z-index: 1000;
        }
        .modal-content {
            background: white; padding: 25px; border-radius: 15px;
            text-align: center; width: 85%; max-width: 350px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            animation: popIn 0.3s ease-out; display: flex; flex-direction: column; max-height: 80vh;
        }
        .modal-title { font-size: 22px; font-weight: bold; margin-bottom: 15px; margin-top: 0; }
        
        /* 鬧鐘專用文字 */
        .alarm-text { font-size: 18px; color: #333; margin-bottom: 25px; line-height: 1.5; color: #e74c3c; }
        
        /* 原始資料專用文字區塊 (加入網址樣式) */
        .raw-data-text {
            font-size: 15px; color: #333; background: #f9f9f9; 
            padding: 12px; border-radius: 8px; border: 1px solid #eee;
            text-align: left; overflow-y: auto; margin-bottom: 20px; flex-grow: 1;
        }
        .raw-data-text a {
            color: #06C755; /* 網址變成亮綠色 */
            text-decoration: underline;
            word-break: break-all;
            font-weight: bold;
        }

        .btn-stop-alarm {
            background-color: #e74c3c; color: white; border: none;
            padding: 15px 20px; border-radius: 10px; font-size: 18px;
            font-weight: bold; cursor: pointer; width: 100%;
        }
        .btn-stop-alarm:active { background-color: #c0392b; }

        .btn-close-info {
            background-color: #3498db; color: white; border: none;
            padding: 12px 20px; border-radius: 10px; font-size: 16px;
            font-weight: bold; cursor: pointer; width: 100%;
        }
        .btn-close-info:active { background-color: #2980b9; }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <h2>直播鬧鐘設定 ⏰</h2>
    
    <div class="system-control">
        <button id="masterBtn" class="btn-master" onclick="toggleSystem()">
            1. 點擊啟動螢幕長亮 (解鎖音效)
        </button>
        <p style="font-size: 12px; color: #666; margin-top: 5px; margin-bottom: 0;">
            ⚠️ iPhone 必點：螢幕保持亮著，時間到才會發聲。
        </p>
    </div>
    
    <div class="input-group">
        <div class="toolbar">
            <button class="btn-tool" onclick="wrapBrackets()" title="請先選取文字再點擊">➕ 幫反白的文字加【 】</button>
        </div>
        <textarea id="inputText" placeholder="2. 請在此貼上從 LINE 複製的內容..."></textarea>
        <div class="button-group">
            <button class="btn-add" onclick="parseAndAdd()">擷取並新增</button>
            <button class="btn-sort" onclick="sortAlarms()">依時間排序</button>
        </div>
    </div>

    <ul class="alarm-list" id="alarmList"></ul>

    <div id="alarmModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title" style="color: #e74c3c;">⏰ 鬧鐘響了！</h3>
            <div class="alarm-text" id="alarmModalText">準備收看直播</div>
            <button class="btn-stop-alarm" onclick="stopAlarm()">關閉鬧鐘</button>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title" style="color: #2980b9;">📄 完整直播資訊</h3>
            <div class="raw-data-text" id="infoModalText"></div>
            <button class="btn-close-info" onclick="closeInfoModal()">關閉</button>
        </div>
    </div>

    <script>
        let audioCtx;
        let wakeLock = null;
        let alarmInterval = null; 

        function initAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start(); osc.stop(audioCtx.currentTime + 0.001);
        }

        async function toggleSystem() {
            initAudio();
            const btn = document.getElementById('masterBtn');
            if (wakeLock !== null) {
                await wakeLock.release();
                wakeLock = null;
                btn.innerText = "1. 點擊啟動螢幕長亮 (解鎖音效)";
                btn.classList.remove('active');
            } else {
                try {
                    if ('wakeLock' in navigator) {
                        wakeLock = await navigator.wakeLock.request('screen');
                        btn.innerText = "✅ 螢幕長亮已啟動 (再點一次可關閉)";
                        btn.classList.add('active');
                    } else {
                        btn.innerText = "✅ 音效已解鎖 (您的瀏覽器不支援長亮)";
                        btn.classList.add('active');
                    }
                } catch (err) {
                    alert(`無法啟動螢幕長亮：${err.message}`);
                }
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible') {
                wakeLock = await navigator.wakeLock.request('screen');
            }
        });

        // ⭐ 新增功能：手動幫選取文字加上【 】
        function wrapBrackets() {
            const textarea = document.getElementById('inputText');
            const start = textarea.selectionStart;
            const end = textarea.selectionEnd;

            if (start !== end) {
                const selectedText = textarea.value.substring(start, end);
                const before = textarea.value.substring(0, start);
                const after = textarea.value.substring(end);

                // 將選取的文字前後加上括號並替換回去
                textarea.value = before + '【' + selectedText + '】' + after;
                
                // 將游標重新對焦，方便繼續編輯
                textarea.focus();
                textarea.setSelectionRange(start, end + 2);
            } else {
                alert('請先在輸入框中「反白選取」你想要當作標題的文字！');
            }
        }

        function parseAndAdd() {
            const inputEl = document.getElementById('inputText');
            const text = inputEl.value; 
            if (!text.trim()) return;

            const regex = /【([^】]+)】\s*(\d{1,2}:\d{2})/;
            const match = text.match(regex);
            
            if (match) {
                const title = match[1].trim();
                let time = match[2].trim();
                const [h, m] = time.split(':');
                time = `${h.padStart(2, '0')}:${m.padStart(2, '0')}`;
                
                addAlarmItem(title, time, text);
                inputEl.value = ''; 
            } else {
                alert('無法解析！請確認格式包含「【標題】時間」。\n(如果沒有【】，可使用輸入框上方的工具按鈕)');
            }
        }

        function addAlarmItem(title, time, rawText) {
            const list = document.getElementById('alarmList');
            const li = document.createElement('li');
            li.className = 'alarm-item';
            li.dataset.rang = "false"; 
            
            const encodedText = encodeURIComponent(rawText);
            
            li.innerHTML = `
                <div class="alarm-info">
                    <span class="alarm-title" onclick="showInfoModal('${encodedText}')">
                        ${title} ${time} 🔍
                    </span>
                    <div class="time-control">
                        ⏰
                        <button class="btn-time" onclick="adjustTime(this, -1)">-</button>
                        <span class="time-text">${time}</span>
                        <button class="btn-time" onclick="adjustTime(this, 1)">+</button>
                    </div>
                </div>
                <div class="alarm-controls">
                    <label class="switch">
                        <input type="checkbox" checked class="alarm-toggle">
                        <span class="slider"></span>
                    </label>
                    <button class="btn-delete" onclick="this.closest('.alarm-item').remove()">🗑️</button>
                </div>
            `;
            list.insertBefore(li, list.firstChild);
        }

        // ⭐ 新增功能：將純文字轉換為包含 <br> 和 <a> 的 HTML
        function formatTextToLinks(text) {
            // 先防範 XSS，將文字轉為安全字串
            const div = document.createElement('div');
            div.innerText = text;
            let safeHtml = div.innerHTML;

            // 正規表達式：尋找 http 或 https 開頭的網址
            const urlRegex = /(https?:\/\/[^\s]+)/g;
            
            // 將網址替換為 <a> 標籤，並設定 target="_blank" 另開視窗
            safeHtml = safeHtml.replace(urlRegex, function(url) {
                return `<a href="${url}" target="_blank">${url}</a>`;
            });

            // 將原本的換行符號轉為網頁的 <br>
            return safeHtml.replace(/\n/g, '<br>');
        }

        function showInfoModal(encodedText) {
            const rawText = decodeURIComponent(encodedText);
            // 呼叫轉換函式，然後放進 innerHTML
            document.getElementById('infoModalText').innerHTML = formatTextToLinks(rawText);
            document.getElementById('infoModal').style.display = 'flex';
        }

        function closeInfoModal() {
            document.getElementById('infoModal').style.display = 'none';
        }

        function adjustTime(button, deltaMinutes) {
            const timeSpan = button.parentElement.querySelector('.time-text');
            let [hours, minutes] = timeSpan.innerText.split(':').map(Number);
            
            minutes += deltaMinutes;
            if (minutes >= 60) { minutes -= 60; hours = (hours + 1) % 24; } 
            else if (minutes < 0) { minutes += 60; hours = (hours - 1 + 24) % 24; }
            
            timeSpan.innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            button.closest('.alarm-item').dataset.rang = "false";
        }

        function sortAlarms() {
            const list = document.getElementById('alarmList');
            const items = Array.from(list.children);
            items.sort((a, b) => {
                const timeA = a.querySelector('.time-text').innerText;
                const timeB = b.querySelector('.time-text').innerText;
                const getMinutes = (t) => { const [h, m] = t.split(':'); return parseInt(h) * 60 + parseInt(m); };
                return getMinutes(timeA) - getMinutes(timeB);
            });
            items.forEach(item => list.appendChild(item));
        }

        function playBeep() {
            if (audioCtx) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'square'; osc.frequency.setValueAtTime(800, audioCtx.currentTime); 
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); 
                osc.connect(gainNode); gainNode.connect(audioCtx.destination);
                osc.start(); setTimeout(() => osc.stop(), 200);
            }
            if (navigator.vibrate) navigator.vibrate([200, 100, 200]);
        }

        function triggerAlarm(titleElement) {
            initAudio(); 
            const fullTitle = titleElement.innerText.replace(' 🔍', '');
            document.getElementById('alarmModalText').innerHTML = `準備收看：<br><br><b>【${fullTitle}】</b>`;
            document.getElementById('alarmModal').style.display = 'flex';
            
            if (alarmInterval) clearInterval(alarmInterval);
            playBeep(); alarmInterval = setInterval(playBeep, 800);
        }

        function stopAlarm() {
            document.getElementById('alarmModal').style.display = 'none';
            if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; }
        }

        setInterval(() => {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();

            document.querySelectorAll('.alarm-item').forEach(item => {
                const isChecked = item.querySelector('.alarm-toggle').checked;
                const timeText = item.querySelector('.time-text').innerText;
                const [alarmHour, alarmMinute] = timeText.split(':');
                const titleElement = item.querySelector('.alarm-title');

                if (isChecked && parseInt(alarmHour) === currentHour && parseInt(alarmMinute) === currentMinute) {
                    if (item.dataset.rang === "false") {
                        triggerAlarm(titleElement);
                        item.dataset.rang = "true"; 
                    }
                } else {
                    item.dataset.rang = "false";
                }
            });
        }, 1000);
    </script>
</body>
</html>
