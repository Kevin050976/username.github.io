<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 直播鬧鐘擷取工具 (進階版)</title>
    <style>
        /* 網頁基本排版與顏色 */
        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f4f7f6;
        }
        h2 {
            text-align: center;
            color: #333;
        }
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 120px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            resize: vertical;
            font-size: 15px;
            box-sizing: border-box;
        }
        .button-group {
            display: flex;
            gap: 10px;
        }
        button {
            flex: 1;
            padding: 12px;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: background-color 0.3s;
        }
        .btn-add {
            background-color: #06C755; /* LINE綠色 */
        }
        .btn-add:hover { background-color: #05a044; }
        
        .btn-sort {
            background-color: #3498db; /* 藍色 */
            flex: 0.5;
        }
        .btn-sort:hover { background-color: #2980b9; }

        /* 鬧鐘清單排版 */
        .alarm-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }
        .alarm-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: white;
            padding: 15px;
            margin-bottom: 12px;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            animation: fadeIn 0.3s ease-in-out;
        }
        .alarm-info {
            display: flex;
            flex-direction: column;
            gap: 5px;
            flex-grow: 1;
        }
        .alarm-title {
            font-size: 17px;
            font-weight: bold;
            color: #2c3e50;
        }
        .alarm-time {
            color: #e74c3c;
            font-size: 16px;
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .alarm-controls {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* 刪除按鈕 */
        .btn-delete {
            background: none;
            border: none;
            color: #95a5a6;
            font-size: 20px;
            cursor: pointer;
            padding: 5px;
            flex: none;
        }
        .btn-delete:hover {
            color: #e74c3c;
        }

        /* 蘋果風格的開關 (Toggle Switch) */
        .switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 28px;
        }
        .switch input {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 28px;
        }
        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 4px;
            bottom: 4px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }
        input:checked + .slider { background-color: #06C755; }
        input:checked + .slider:before { transform: translateX(22px); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <h2>直播鬧鐘設定 ⏰</h2>
    
    <div class="input-group">
        <textarea id="inputText" placeholder="請在此貼上從 LINE 複製的內容..."></textarea>
        <div class="button-group">
            <button class="btn-add" onclick="parseAndAdd()">擷取並新增</button>
            <button class="btn-sort" onclick="sortAlarms()">依時間排序</button>
        </div>
    </div>

    <ul class="alarm-list" id="alarmList">
        </ul>

    <script>
        // 為了讓瀏覽器允許發出聲音，我們需要在使用者第一次點擊時初始化 AudioContext
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        // 1. 擷取與新增功能
        function parseAndAdd() {
            initAudio(); // 初始化音效權限
            const inputEl = document.getElementById('inputText');
            const text = inputEl.value;
            if (!text.trim()) return;

            const regex = /【([^】]+)】\s*(\d{1,2}:\d{2})/;
            const match = text.match(regex);
            
            if (match) {
                const title = match[1].trim();
                const time = match[2].trim();
                addAlarmItem(title, time);
                inputEl.value = ''; 
            } else {
                alert('無法解析！請確認格式包含「【標題】時間」（例如：【FOCUS世界新聞】11:00）');
            }
        }

        // 建立鬧鐘 DOM 元素
        function addAlarmItem(title, time) {
            const list = document.getElementById('alarmList');
            const li = document.createElement('li');
            li.className = 'alarm-item';
            // 使用 data 屬性來防止同一分鐘內重複響鈴
            li.dataset.rang = "false"; 
            
            li.innerHTML = `
                <div class="alarm-info">
                    <span class="alarm-title">${title}</span>
                    <span class="alarm-time">⏰ ${time}</span>
                </div>
                <div class="alarm-controls">
                    <label class="switch">
                        <input type="checkbox" checked class="alarm-toggle">
                        <span class="slider"></span>
                    </label>
                    <button class="btn-delete" onclick="this.closest('.alarm-item').remove()">🗑️</button>
                </div>
            `;
            list.insertBefore(li, list.firstChild);
        }

        // 2. 排序功能 (將時間轉為分鐘數來比大小)
        function sortAlarms() {
            const list = document.getElementById('alarmList');
            const items = Array.from(list.children);
            
            items.sort((a, b) => {
                const timeA = a.querySelector('.alarm-time').innerText.replace('⏰ ', '');
                const timeB = b.querySelector('.alarm-time').innerText.replace('⏰ ', '');
                
                const getMinutes = (timeStr) => {
                    const [h, m] = timeStr.split(':');
                    return parseInt(h) * 60 + parseInt(m);
                };
                
                return getMinutes(timeA) - getMinutes(timeB);
            });
            
            // 重新依序加入清單
            items.forEach(item => list.appendChild(item));
        }

        // 3. 鬧鐘響鈴與震動功能
        function triggerAlarm(title) {
            // 發出嗶嗶聲 (使用 Web Audio API，不需外部音檔)
            if (audioCtx) {
                const osc = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                osc.type = 'square';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime); // 頻率
                gainNode.gain.setValueAtTime(0.1, audioCtx.currentTime); // 音量
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                osc.start();
                
                // 讓聲音斷續，製造鬧鐘感
                setTimeout(() => osc.stop(), 200);
                setTimeout(() => {
                    const osc2 = audioCtx.createOscillator();
                    osc2.type = 'square';
                    osc2.frequency.setValueAtTime(880, audioCtx.currentTime);
                    osc2.connect(gainNode);
                    osc2.start();
                    setTimeout(() => osc2.stop(), 200);
                }, 400);
            }

            // 觸發手機震動 (震動 500ms, 暫停 200ms, 震動 500ms)
            // 註：iOS Safari 網頁端不支援震動 API，但 Android 與電腦版多數支援
            if (navigator.vibrate) {
                navigator.vibrate([500, 200, 500]);
            }

            // 跳出視窗提醒
            alert(`⏰ 鬧鐘時間到！\n準備收看：【${title}】`);
        }

        // 每秒檢查一次時間
        setInterval(() => {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();

            document.querySelectorAll('.alarm-item').forEach(item => {
                const isChecked = item.querySelector('.alarm-toggle').checked;
                const timeText = item.querySelector('.alarm-time').innerText.replace('⏰ ', '');
                const [alarmHour, alarmMinute] = timeText.split(':');
                const title = item.querySelector('.alarm-title').innerText;

                // 判斷時間是否吻合
                if (isChecked && parseInt(alarmHour) === currentHour && parseInt(alarmMinute) === currentMinute) {
                    // 確保這一分鐘內只響一次
                    if (item.dataset.rang === "false") {
                        triggerAlarm(title);
                        item.dataset.rang = "true"; // 標記為已響過
                    }
                } else {
                    // 如果時間已經過了這一分鐘，就把狀態重置，讓明天同個時間還能響
                    item.dataset.rang = "false";
                }
            });
        }, 1000); // 1000毫秒 = 1秒
    </script>
</body>
</html>
