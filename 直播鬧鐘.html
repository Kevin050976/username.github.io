<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 直播鬧鐘擷取工具 (終極版)</title>
    <style>
        /* 網頁基本排版與顏色 */
        body {
            font-family: "Microsoft JhengHei", "微軟正黑體", sans-serif;
            max-width: 500px;
            margin: 20px auto;
            padding: 20px;
            background-color: #f4f7f6;
        }
        h2 { text-align: center; color: #333; margin-bottom: 10px; }
        
        /* 系統控制區 */
        .system-control {
            background-color: #fff3cd;
            border: 2px solid #ffeeba;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .btn-master {
            background-color: #e67e22;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: 0.3s;
        }
        .btn-master.active {
            background-color: #27ae60;
        }

        /* 輸入區 */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-bottom: 20px;
        }
        textarea {
            width: 100%;
            height: 100px;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
        }
        .button-group { display: flex; gap: 10px; }
        button { cursor: pointer; }
        .btn-add {
            background-color: #06C755; color: white; border: none;
            padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; flex: 1;
        }
        .btn-sort {
            background-color: #3498db; color: white; border: none;
            padding: 12px; border-radius: 8px; font-size: 16px; font-weight: bold; flex: 0.5;
        }

        /* 鬧鐘清單排版 */
        .alarm-list { list-style: none; padding: 0; margin: 0; }
        .alarm-item {
            display: flex; align-items: center; justify-content: space-between;
            background: white; padding: 15px; margin-bottom: 12px;
            border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .alarm-info { display: flex; flex-direction: column; gap: 8px; flex-grow: 1; }
        .alarm-title { font-size: 17px; font-weight: bold; color: #2c3e50; }
        
        /* 時間與加減按鈕區 */
        .time-control {
            display: flex; align-items: center; gap: 10px;
        }
        .time-text { color: #e74c3c; font-size: 18px; font-weight: bold; width: 50px; text-align: center; }
        .btn-time {
            background-color: #ecf0f1; border: none; color: #333;
            width: 30px; height: 30px; border-radius: 5px; font-size: 18px; font-weight: bold;
            display: flex; align-items: center; justify-content: center;
        }
        .btn-time:active { background-color: #bdc3c7; }

        .alarm-controls { display: flex; align-items: center; gap: 12px; }
        .btn-delete { background: none; border: none; color: #95a5a6; font-size: 22px; padding: 5px; }
        
        /* 開關 */
        .switch { position: relative; display: inline-block; width: 46px; height: 26px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0;
            background-color: #ccc; transition: .4s; border-radius: 26px;
        }
        .slider:before {
            position: absolute; content: ""; height: 18px; width: 18px; left: 4px; bottom: 4px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #06C755; }
        input:checked + .slider:before { transform: translateX(20px); }
    </style>
</head>
<body>

    <h2>直播鬧鐘設定 ⏰</h2>
    
    <div class="system-control">
        <button id="masterBtn" class="btn-master" onclick="enableSystem()">
            1. 點擊啟動鬧鐘模式 (解鎖音效與螢幕長亮)
        </button>
        <p style="font-size: 12px; color: #666; margin-top: 8px; margin-bottom: 0;">
            ⚠️ iPhone 必點：確保螢幕不變暗，時間到才會發出聲音。
        </p>
    </div>
    
    <div class="input-group">
        <textarea id="inputText" placeholder="2. 請在此貼上從 LINE 複製的內容..."></textarea>
        <div class="button-group">
            <button class="btn-add" onclick="parseAndAdd()">擷取並新增</button>
            <button class="btn-sort" onclick="sortAlarms()">依時間排序</button>
        </div>
    </div>

    <ul class="alarm-list" id="alarmList"></ul>

    <script>
        let audioCtx;
        let wakeLock = null;

        // 啟動系統 (解鎖音效 + 請求螢幕長亮)
        async function enableSystem() {
            const btn = document.getElementById('masterBtn');
            
            // 1. 解鎖 Web Audio (發出一個極短的無聲音頻來欺騙 iOS 系統)
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                await audioCtx.resume();
            }
            const osc = audioCtx.createOscillator();
            osc.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.001);

            // 2. 請求螢幕長亮 (Wake Lock API)
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                    btn.innerText = "✅ 鬧鐘模式已啟動 (螢幕將保持長亮)";
                    btn.classList.add('active');
                    
                    // 若使用者切換網頁再切回來，重新請求螢幕長亮
                    document.addEventListener('visibilitychange', async () => {
                        if (wakeLock !== null && document.visibilityState === 'visible') {
                            wakeLock = await navigator.wakeLock.request('screen');
                        }
                    });
                } else {
                    btn.innerText = "✅ 音效已解鎖 (您的瀏覽器不支援自動防熄屏)";
                    btn.classList.add('active');
                }
            } catch (err) {
                alert(`無法啟動螢幕長亮：${err.message}`);
            }
        }

        function parseAndAdd() {
            const inputEl = document.getElementById('inputText');
            const text = inputEl.value;
            if (!text.trim()) return;

            const regex = /【([^】]+)】\s*(\d{1,2}:\d{2})/;
            const match = text.match(regex);
            
            if (match) {
                const title = match[1].trim();
                let time = match[2].trim();
                // 補齊時間格式，例如把 9:00 變成 09:00
                const [h, m] = time.split(':');
                time = `${h.padStart(2, '0')}:${m.padStart(2, '0')}`;
                
                addAlarmItem(title, time);
                inputEl.value = ''; 
            } else {
                alert('無法解析！請確認格式包含「【標題】時間」');
            }
        }

        function addAlarmItem(title, time) {
            const list = document.getElementById('alarmList');
            const li = document.createElement('li');
            li.className = 'alarm-item';
            li.dataset.rang = "false"; 
            
            li.innerHTML = `
                <div class="alarm-info">
                    <span class="alarm-title">${title}</span>
                    <div class="time-control">
                        ⏰
                        <button class="btn-time" onclick="adjustTime(this, -1)">-</button>
                        <span class="time-text">${time}</span>
                        <button class="btn-time" onclick="adjustTime(this, 1)">+</button>
                    </div>
                </div>
                <div class="alarm-controls">
                    <label class="switch">
                        <input type="checkbox" checked class="alarm-toggle">
                        <span class="slider"></span>
                    </label>
                    <button class="btn-delete" onclick="this.closest('.alarm-item').remove()">🗑️</button>
                </div>
            `;
            list.insertBefore(li, list.firstChild);
        }

        // 調整時間的函數
        function adjustTime(button, deltaMinutes) {
            const timeSpan = button.parentElement.querySelector('.time-text');
            let [hours, minutes] = timeSpan.innerText.split(':').map(Number);
            
            minutes += deltaMinutes;
            
            // 處理時間進位與退位
            if (minutes >= 60) {
                minutes -= 60;
                hours = (hours + 1) % 24;
            } else if (minutes < 0) {
                minutes += 60;
                hours = (hours - 1 + 24) % 24;
            }
            
            // 轉回 HH:MM 格式
            timeSpan.innerText = `${String(hours).padStart(2, '0')}:${String(minutes).padStart(2, '0')}`;
            
            // 調整時間後，重置響鈴狀態
            const listItem = button.closest('.alarm-item');
            listItem.dataset.rang = "false";
        }

        function sortAlarms() {
            const list = document.getElementById('alarmList');
            const items = Array.from(list.children);
            
            items.sort((a, b) => {
                const timeA = a.querySelector('.time-text').innerText;
                const timeB = b.querySelector('.time-text').innerText;
                
                const getMinutes = (timeStr) => {
                    const [h, m] = timeStr.split(':');
                    return parseInt(h) * 60 + parseInt(m);
                };
                
                return getMinutes(timeA) - getMinutes(timeB);
            });
            
            items.forEach(item => list.appendChild(item));
        }

        // 鬧鐘響鈴
        function triggerAlarm(title) {
            if (audioCtx) {
                if (audioCtx.state === 'suspended') audioCtx.resume();
                
                // 製造連續的急促嗶聲
                for (let i = 0; i < 5; i++) {
                    setTimeout(() => {
                        const osc = audioCtx.createOscillator();
                        const gainNode = audioCtx.createGain();
                        osc.type = 'square';
                        osc.frequency.setValueAtTime(900, audioCtx.currentTime); 
                        gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); 
                        osc.connect(gainNode);
                        gainNode.connect(audioCtx.destination);
                        osc.start();
                        setTimeout(() => osc.stop(), 150);
                    }, i * 300);
                }
            }

            // Android 會震動，iPhone 忽略此行
            if (navigator.vibrate) navigator.vibrate([200, 100, 200, 100, 200]);

            alert(`⏰ 直播時間到！\n\n準備收看：【${title}】`);
        }

        // 每秒檢查時間
        setInterval(() => {
            const now = new Date();
            const currentHour = now.getHours();
            const currentMinute = now.getMinutes();

            document.querySelectorAll('.alarm-item').forEach(item => {
                const isChecked = item.querySelector('.alarm-toggle').checked;
                const timeText = item.querySelector('.time-text').innerText;
                const [alarmHour, alarmMinute] = timeText.split(':');
                const title = item.querySelector('.alarm-title').innerText;

                if (isChecked && parseInt(alarmHour) === currentHour && parseInt(alarmMinute) === currentMinute) {
                    if (item.dataset.rang === "false") {
                        triggerAlarm(title);
                        item.dataset.rang = "true"; 
                    }
                } else {
                    item.dataset.rang = "false";
                }
            });
        }, 1000);
    </script>
</body>
</html>
