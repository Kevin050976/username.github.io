<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>雙視窗導覽頁</title>
    <!-- 引入 Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #1a1a1a; /* 深色背景 */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        /* 添加按鈕按下的縮放效果，增加互動感 */
        .card-link:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>
    <!-- 
      外層容器，填滿螢幕。
      預設直向(flex-col)，橫向時(landscape:flex-row) 
      加入 gap-4 讓兩個區塊之間有點空隙
    -->
    <div class="flex flex-col landscape:flex-row w-full h-full p-4 gap-4">
        
        <!-- 第一個連結區塊 (閃速提醒工具) -->
        <!-- 使用 a 標籤作為大按鈕，點擊整塊都會跳轉 -->
        <a href="https://kevin050976.github.io/username.github.io/MITV8.0.html" 
           target="_blank" rel="noopener noreferrer"
           class="card-link flex-1 flex flex-col items-center justify-center bg-gray-800 rounded-2xl shadow-lg border border-gray-700 transition-all duration-200 hover:bg-gray-750 overflow-hidden relative group">
            
            <!-- 預覽圖區塊：使用 flex-1 讓圖片佔滿所有剩餘空間，減少黑邊 -->
            <div class="w-full flex-1 bg-black relative">
                <!-- 圖片顯示模式改為 object-contain (完整顯示不裁切) -->
                <img src="MITV8.0.png" onerror="this.src='https://placehold.co/600x400/000000/cccccc?text=閃速提醒工具'"
                     alt="閃速提醒工具 預覽圖" 
                     class="absolute inset-0 w-full h-full object-contain opacity-80 group-hover:opacity-100 transition-opacity duration-300">
            </div>
            
            <!-- 標題區塊：改為 shrink-0 與 py-4，只佔用必要的文字高度 -->
            <div class="w-full shrink-0 flex flex-col items-center justify-center py-4 border-t border-gray-700 bg-gray-800">
                <h2 class="text-xl md:text-2xl font-bold text-white">閃速提醒工具</h2>
            </div>
        </a>

        <!-- 第二個連結區塊 (快速倒數工具) -->
        <a href="https://kevin050976.github.io/username.github.io/countdown2.html" 
           target="_blank" rel="noopener noreferrer"
           class="card-link flex-1 flex flex-col items-center justify-center bg-gray-800 rounded-2xl shadow-lg border border-gray-700 transition-all duration-200 hover:bg-gray-750 overflow-hidden relative group">
            
            <!-- 預覽圖區塊：使用 flex-1 讓圖片佔滿所有剩餘空間，減少黑邊 -->
            <div class="w-full flex-1 bg-black relative">
                <!-- 圖片顯示模式改為 object-contain (完整顯示不裁切) -->
                <img src="countdown2.png" onerror="this.src='https://placehold.co/600x400/000000/cccccc?text=快速倒數工具'"
                     alt="快速倒數工具 預覽圖" 
                     class="absolute inset-0 w-full h-full object-contain opacity-80 group-hover:opacity-100 transition-opacity duration-300">
            </div>
            
            <!-- 標題區塊：改為 shrink-0 與 py-4，只佔用必要的文字高度 -->
            <div class="w-full shrink-0 flex flex-col items-center justify-center py-4 border-t border-gray-700 bg-gray-800">
                <h2 class="text-xl md:text-2xl font-bold text-white">快速倒數工具</h2>
            </div>
        </a>

    </div>
</body>
</html>
