<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNG 資產盤點系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; font-family: -apple-system, sans-serif; 
            background: #000; display: flex; flex-direction: column; height: 100vh; color: white; 
            overflow: hidden; /* 防止整個畫面被亂拉動 */
        }
        
        /* === 頂部切換開關 === */
        #mode-switch-bar {
            display: flex; background: #222; padding: 10px; gap: 10px;
        }
        .mode-btn {
            flex: 1; padding: 12px; font-size: 16px; font-weight: bold;
            border: none; border-radius: 8px; background: #444; color: white;
        }
        .mode-btn.active { background: #1a73e8; }

        /* === 掃描模式容器 === */
        #scan-container { flex: 1; display: flex; flex-direction: column; }

        #camera-section { 
            flex: 1; position: relative; overflow: hidden; background: #111; 
            display: flex; align-items: center; justify-content: center; 
        }
        #reader { width: 100%; border: none; }
        
        #status-bar { 
            position: absolute; top: 10px; left: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px; 
            text-align: center; border-radius: 8px; z-index: 10; font-size: 14px; 
        }

        #info-section { 
            flex: 1; background: #f8f9fa; color: #333; padding: 20px; box-sizing: border-box; 
            overflow-y: auto; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; 
            border-top: 4px solid #1a73e8; transition: background-color 0.2s ease;
        }
        
        /* === 手動模式容器 === */
        #manual-container {
            flex: 1; display: none; flex-direction: column; background: #111;
        }

        /* 手動上半部：顯示區與自訂鍵盤 */
        #manual-input-section {
            display: flex; flex-direction: column; background: #222; border-bottom: 4px solid #1a73e8;
        }
        
        #manual-display {
            font-size: 32px; font-weight: bold; font-family: monospace;
            text-align: center; padding: 15px; color: #fff; letter-spacing: 2px;
            min-height: 40px; background: #111; margin: 15px; border-radius: 8px;
            border: 2px solid #555;
        }
        .display-placeholder { color: #666; font-size: 18px; line-height: 40px; letter-spacing: normal; }

        #custom-keyboard {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px 15px 15px;
        }
        .key {
            background: #444; color: white; font-size: 26px; font-weight: bold;
            padding: 15px 0; text-align: center; border-radius: 8px; user-select: none;
        }
        .key:active { background: #666; }
        .key-confirm { background: #1a73e8; font-size: 20px;}
        .key-confirm:active { background: #1557b0; }
        .key-delete { background: #d32f2f; font-size: 20px;}
        .key-delete:active { background: #9a0007; }

        /* 手動下半部：清單與結果顯示 */
        #manual-results-section {
            flex: 1; background: #f8f9fa; color: #333; overflow-y: auto; padding: 15px; box-sizing: border-box;
        }
        
        /* 動態滑動清單樣式 */
        .list-item {
            background: white; padding: 15px; border-radius: 8px; margin-bottom: 10px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #1a73e8;
        }
        .list-item:active { background: #e8f0fe; }
        .list-id { font-family: monospace; color: #666; font-size: 14px; margin-bottom: 5px; }
        .list-name { font-size: 18px; font-weight: bold; color: #333; }
        
        /* 共用圖片與文字資訊樣式 */
        .asset-img-container { width: 100%; max-height: 200px; display: flex; justify-content: center; margin-bottom: 15px; }
        .asset-img-container img { max-width: 100%; max-height: 200px; object-fit: contain; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); }
        .asset-id { font-size: 16px; color: #666; margin-bottom: 5px; font-family: monospace; }
        .asset-name { font-size: 24px; font-weight: bold; color: #1a73e8; text-align: center; line-height: 1.3; }
        .error-msg { color: #d32f2f; font-size: 20px; font-weight: bold; text-align: center; margin-top: 20px; }
        .hint-msg { color: #888; font-size: 16px; text-align: center; margin-top: 20px; }
        .success-flash { background-color: #d4edda !important; }
    </style>
</head>
<body>

    <div id="mode-switch-bar">
        <button id="btn-scan" class="mode-btn active" onclick="switchMode('scan')">📷 掃描模式</button>
        <button id="btn-manual" class="mode-btn" onclick="switchMode('manual')">⌨️ 手動模式</button>
    </div>

    <div id="scan-container">
        <div id="camera-section">
            <div id="status-bar">🔄 正在連線下載資料庫...</div>
            <div id="reader"></div>
        </div>
        <div id="info-section">
            <div style="margin-top: 60px; color: #aaa; font-size: 18px;">準備就緒，請掃描條碼</div>
        </div>
    </div>

    <div id="manual-container">
        <div id="manual-input-section">
            <div id="manual-display"><span class="display-placeholder">請輸入資產編號 (12碼)</span></div>
            <div id="custom-keyboard">
                <div class="key" onclick="pressKey('1')">1</div>
                <div class="key" onclick="pressKey('2')">2</div>
                <div class="key" onclick="pressKey('3')">3</div>
                <div class="key" onclick="pressKey('4')">4</div>
                <div class="key" onclick="pressKey('5')">5</div>
                <div class="key" onclick="pressKey('6')">6</div>
                <div class="key" onclick="pressKey('7')">7</div>
                <div class="key" onclick="pressKey('8')">8</div>
                <div class="key" onclick="pressKey('9')">9</div>
                <div class="key key-delete" onclick="pressKey('delete')">刪除</div>
                <div class="key" onclick="pressKey('0')">0</div>
                <div class="key key-confirm" onclick="pressKey('confirm')">確認</div>
            </div>
        </div>
        
        <div id="manual-results-section">
            <div class="hint-msg">輸入前 4 碼開始篩選</div>
        </div>
    </div>

    <script>
        const statusBar = document.getElementById('status-bar');
        const infoSection = document.getElementById('info-section');
        const manualDisplay = document.getElementById('manual-display');
        const manualResults = document.getElementById('manual-results-section');
        
        let assetsArray = []; // 改為陣列，方便進行前綴模糊篩選
        let lastScannedCode = "";
        let lastScanTime = 0;
        let manualInputString = "";
        let html5QrcodeScanner = null;

        const sheetUrl = "https://docs.google.com/spreadsheets/d/1xQIr30as-2eftyskMZ9lOPm7T05Pn16D3mYxxDZEx2g/export?format=csv";

        // Google Drive 圖片網址轉換器
        function getDirectImageUrl(url) {
            if (!url) return "";
            url = String(url).trim();
            let match = url.match(/\/file\/d\/([a-zA-Z0-9_-]+)/) || url.match(/id=([a-zA-Z0-9_-]+)/);
            if (match) return `https://drive.google.com/thumbnail?id=${match[1]}&sz=w800`;
            return url;
        }

        // 1. 載入資料庫
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                let count = 0;
                
                data.forEach(row => {
                    const assetId = String(row["資產編號"] || "").trim(); // 12碼 (手動比對用)
                    const scanCode = String(row["掃描條碼"] || "").trim(); // 10碼 (掃描比對用)
                    
                    // 只要其中一個有值就存入資料庫陣列
                    if (assetId || scanCode) {
                        assetsArray.push({
                            assetId: assetId,
                            scanCode: scanCode,
                            name: row["資產名稱"] || "未命名設備",
                            image: getDirectImageUrl(row["照片.http"])
                        });
                        count++;
                    }
                });
                
                statusBar.innerHTML = `✅ 資料載入完成 (共備妥 ${count} 筆)`;
                setTimeout(() => statusBar.style.display = 'none', 3000);
                
                startScanner(); 
            },
            error: function(err) {
                statusBar.innerHTML = "❌ 資料載入失敗，請檢查網址或網路狀態";
                statusBar.style.background = "rgba(211, 47, 47, 0.9)";
            }
        });

        // 2. 音效系統
        function playBeep(isSuccess) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.type = isSuccess ? 'sine' : 'sawtooth';
            osc.frequency.setValueAtTime(isSuccess ? 1500 : 250, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (isSuccess ? 0.1 : 0.3));
            osc.stop(audioCtx.currentTime + (isSuccess ? 0.1 : 0.3));
        }

        // 統一渲染詳細資訊的模組
        function renderAssetDetail(asset, matchedBy) {
            const imgHtml = asset.image 
                ? `<img src="${asset.image}" alt="資產照片">` 
                : `<div style="width:100%; height:150px; background:#e0e0e0; display:flex; align-items:center; justify-content:center; border-radius:8px; color:#888;">無提供照片</div>`;
            return `
                <div class="asset-img-container">${imgHtml}</div>
                <div class="asset-id">資產編號 (12碼): ${asset.assetId}</div>
                <div class="asset-id" style="font-size:12px; margin-bottom:10px;">掃描條碼 (10碼): ${asset.scanCode || '無'}</div>
                <div class="asset-name">${asset.name}</div>
            `;
        }

        // ================= 掃描模式邏輯 =================
        function onScanSuccess(decodedText) {
            // 如果當前不在掃描模式，就忽略掃描結果
            if (document.getElementById('scan-container').style.display === 'none') return;

            const currentTime = new Date().getTime();
            if (decodedText === lastScannedCode && (currentTime - lastScanTime) < 1500) return; 
            lastScannedCode = decodedText;
            lastScanTime = currentTime;

            const scanIdStr = String(decodedText).trim();
            // 掃描模式：嚴格比對 "掃描條碼" 欄位
            const asset = assetsArray.find(a => a.scanCode === scanIdStr);

            infoSection.classList.add('success-flash');
            setTimeout(() => infoSection.classList.remove('success-flash'), 300);

            if (asset) {
                playBeep(true);
                infoSection.innerHTML = renderAssetDetail(asset, 'scan');
            } else {
                playBeep(false);
                infoSection.innerHTML = `
                    <div class="error-msg">❌ 查無此設備</div>
                    <div class="asset-id" style="margin-top:10px; text-align:center;">未知掃描內容: ${scanIdStr}</div>
                `;
            }
        }

        function startScanner() {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", { fps: 15, qrbox: { width: 280, height: 120 }, aspectRatio: 1.0, videoConstraints: { facingMode: "environment" } }, false
            );
            html5QrcodeScanner.render(onScanSuccess);
        }

        // ================= 模式切換邏輯 =================
        function switchMode(mode) {
            if (mode === 'scan') {
                document.getElementById('btn-scan').classList.add('active');
                document.getElementById('btn-manual').classList.remove('active');
                document.getElementById('scan-container').style.display = 'flex';
                document.getElementById('manual-container').style.display = 'none';
            } else {
                document.getElementById('btn-manual').classList.add('active');
                document.getElementById('btn-scan').classList.remove('active');
                document.getElementById('manual-container').style.display = 'flex';
                document.getElementById('scan-container').style.display = 'none';
                
                // 切換到手動時，自動清空並重置狀態
                manualInputString = "";
                manualDisplay.innerHTML = '<span class="display-placeholder">請輸入資產編號 (12碼)</span>';
                manualResults.innerHTML = '<div class="hint-msg">輸入前 4 碼開始篩選</div>';
            }
        }

        // ================= 手動輸入模式邏輯 =================
        function pressKey(key) {
            if (key === 'delete') {
                manualInputString = manualInputString.slice(0, -1);
            } else if (key === 'confirm') {
                updateManualResults(true); // 按下確認強制送出
                return;
            } else {
                if (manualInputString.length < 12) { // 限制最多 12 碼
                    manualInputString += key;
                }
            }
            
            if (manualInputString.length === 0) {
                manualDisplay.innerHTML = '<span class="display-placeholder">請輸入資產編號 (12碼)</span>';
            } else {
                manualDisplay.innerText = manualInputString;
            }
            updateManualResults(false);
        }

        function updateManualResults(isConfirm) {
            if (manualInputString.length < 4) {
                manualResults.innerHTML = '<div class="hint-msg">輸入前 4 碼開始篩選</div>';
                manualResults.classList.remove('success-flash');
                return;
            }

            // 手動模式：比對 "資產編號" 的前綴
            const matches = assetsArray.filter(a => a.assetId.startsWith(manualInputString));

            if (matches.length === 0) {
                manualResults.innerHTML = '<div class="error-msg">❌ 查無字首相符的設備</div>';
                return;
            }

            // 判斷是否要顯示單一資產詳情 (按下確認 或 唯一解 或 打滿12碼)
            const exactMatch = matches.find(a => a.assetId === manualInputString);
            if (exactMatch && (isConfirm || manualInputString.length === 12)) {
                playBeep(true);
                manualResults.classList.add('success-flash');
                setTimeout(() => manualResults.classList.remove('success-flash'), 300);
                manualResults.innerHTML = `<div style="padding-top:10px;">${renderAssetDetail(exactMatch, 'manual')}</div>`;
            } 
            // 否則，在下半部渲染可滑動的預測清單
            else {
                let html = matches.map(asset => `
                    <div class="list-item" onclick="selectFromList('${asset.assetId}')">
                        <div class="list-id">${asset.assetId}</div>
                        <div class="list-name">${asset.name}</div>
                    </div>
                `).join('');
                manualResults.innerHTML = html;
                manualResults.classList.remove('success-flash');
            }
        }

        // 操作員直接點擊下半部的預測清單時觸發
        function selectFromList(assetId) {
            manualInputString = assetId; // 直接補滿 12 碼
            manualDisplay.innerText = manualInputString;
            updateManualResults(true); // 帶入並觸發顯示詳情
        }
    </script>
</body>
</html>
