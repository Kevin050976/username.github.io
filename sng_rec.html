<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNG AKIRA 勤務終端 (多重標籤版)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 10px; background-color: #f4f4f9; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 180px; }
        
        /* 彈出視窗 */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 15% auto; padding: 20px; width: 85%; max-width: 450px; border-radius: 15px; text-align: center; }
        
        button { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-success { background: #28a745; color: white; padding: 12px; }
        .btn-danger { background: #dc3545; color: white; padding: 12px; }
        .btn-secondary { background: #6c757d; color: white; padding: 10px; }

        /* 標籤樣式分組 */
        .tag-container { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 15px; justify-content: center; border-bottom: 1px solid #eee; padding-bottom: 15px; }
        .tag-btn { padding: 12px; font-size: 1.1em; flex: 1 1 40%; border: 3px solid transparent; }
        
        .tag-live { background: #28a745; color: white; } /* 綠色組 */
        .tag-task { background: #17a2b8; color: white; } /* 藍色組 */
        .tag-time { background: #fd7e14; color: white; } /* 橘色組 */
        
        .tag-btn.selected { border-color: #212529; box-shadow: inset 0 0 8px rgba(0,0,0,0.4); transform: scale(0.96); }

        /* 固定底部 */
        .bottom-controls { position: fixed; bottom: 0; left: 0; right: 0; background: #212529; z-index: 100; padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #toggleBtn { width: 100%; max-width: 500px; height: 75px; font-size: 1.6em; background: #28a745; color: white; border-radius: 12px; }
        #toggleBtn.active { background: #dc3545; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        
        /* 紀錄清單 */
        .log-item { background: #fff; border: 1px solid #eee; padding: 12px; margin-bottom: 12px; border-radius: 10px; display: flex; align-items: flex-start; }
        .log-checkbox { margin-top: 5px; margin-right: 12px; transform: scale(1.6); }
        .log-content { flex-grow: 1; }
        .log-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .log-time { color: #888; font-size: 0.85em; }
        .log-timer { color: #dc3545; font-size: 0.85em; font-weight: bold; cursor: pointer; background: #fff5f5; padding: 2px 6px; border-radius: 4px; }
        .log-text { font-size: 1.25em; font-weight: bold; color: #333; line-height: 1.4; }

        /* Badge 顯示 */
        .badge { display: inline-block; padding: 2px 6px; font-size: 0.75em; border-radius: 4px; margin-left: 5px; color: white; vertical-align: middle; }
        .badge-live { background: #28a745; }
        .badge-task { background: #17a2b8; }
        .badge-time { background: #fd7e14; }

        .icon-btn { width: 34px; height: 34px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; }
        #livePreview { color: #007bff; font-weight: bold; text-align: center; margin-bottom: 10px; height: 1.2em; }
        
        .timer-input-box { display: flex; align-items: center; justify-content: center; gap: 10px; margin: 20px 0; font-size: 1.2em; }
        .timer-input-box input { width: 65px; padding: 10px; text-align: center; border-radius: 8px; border: 1px solid #ccc; font-size: 1em; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
        <h3 style="margin:0;">🎙️ SNG AKIRA</h3>
        <button class="btn-secondary" onclick="openVocabModal()" style="font-size:0.85em;">⚙️ 詞彙</button>
    </div>
    <div id="livePreview"></div>
    <div id="logArea"></div>
</div>

<div class="bottom-controls">
    <button id="toggleBtn">🎤 點擊開始錄音</button>
    <div style="display:flex; gap:8px; width:100%; max-width:500px;">
        <button onclick="copySelected()" style="flex:1; height:50px; background:#17a2b8; color:white;">📋 複製</button>
        <button onclick="shareSelected()" style="flex:1; height:50px; background:#28a745; color:white;">📲 分享</button>
        <button onclick="clearAllLogs()" style="flex:1; height:50px; background:#dc3545; color:white;">🗑️ 清空</button>
    </div>
</div>

<div id="timerEditModal" class="modal">
    <div class="modal-content">
        <h4>⏱️ 修改倒數時間</h4>
        <div class="timer-input-box">
            <input type="number" id="newTimerHour" placeholder="0"> 時
            <input type="number" id="newTimerMin" placeholder="0"> 分
        </div>
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="btn-success" onclick="updateTimerValue()">✅ 確定修改</button>
            <button class="btn-danger" onclick="stopTimer()">⏹️ 不顯示</button>
            <button class="btn-secondary" onclick="closeTimerModal()">取消</button>
        </div>
    </div>
</div>

<div id="tagModal" class="modal">
    <div class="modal-content">
        <h4>🏷️ 標籤設定 (按色分組單選)</h4>
        
        <p style="text-align:left; font-size:0.8em; margin:5px 0; color:#28a745;">【綠色組】</p>
        <div class="tag-container" id="groupLive">
            <button class="tag-btn tag-live" onclick="toggleSingle(this, 'live')">直播</button>
        </div>

        <p style="text-align:left; font-size:0.8em; margin:5px 0; color:#17a2b8;">【藍色組】</p>
        <div class="tag-container" id="groupTask">
            <button class="tag-btn tag-task" onclick="toggleSingle(this, 'task')">側錄</button>
            <button class="tag-btn tag-task" onclick="toggleSingle(this, '準連')">準連</button>
            <button class="tag-btn tag-task" onclick="toggleSingle(this, '傳帶')">傳帶</button>
        </div>

        <p style="text-align:left; font-size:0.8em; margin:5px 0; color:#fd7e14;">【橘色組】</p>
        <div class="tag-container" id="groupTime">
            <button class="tag-btn tag-time" onclick="toggleTime(this, 14400)">4時</button>
            <button class="tag-btn tag-time" onclick="toggleTime(this, 10800)">3時</button>
            <button class="tag-btn tag-time" onclick="toggleTime(this, 7200)">2時</button>
            <button class="tag-btn tag-time" onclick="toggleTime(this, 3600)">1時</button>
            <button class="tag-btn tag-time" onclick="toggleTime(this, 1800)">30分</button>
            <button class="tag-btn tag-time" onclick="toggleTime(this, 1200)">20分</button>
            <button class="tag-btn tag-time" onclick="toggleTime(this, 600)">10分</button>
            <button class="tag-btn tag-time" onclick="toggleTime(this, 300)">5分</button>
        </div>
        <button class="btn-success" onclick="applyTags()" style="width:100%;">✅ 確定</button>
    </div>
</div>

<div id="vocabModal" class="modal">
    <div class="modal-content">
        <h4>📚 詞彙庫</h4>
        <textarea id="vocab" style="width:100%; height:120px;"></textarea>
        <button class="btn-success" onclick="closeVocabModal()" style="width:100%; margin-top:10px;">儲存</button>
    </div>
</div>

<script>
    let logs = JSON.parse(localStorage.getItem('sng_logs')) || [];
    const logArea = document.getElementById('logArea');
    const vocabBox = document.getElementById('vocab');
    let currentIdx = null;
    let selLive = null, selTask = null, selTime = null, tempEnd = null;

    if(localStorage.getItem('sng_vocab')) vocabBox.value = localStorage.getItem('sng_vocab');

    // 倒數核心
    setInterval(() => {
        const now = Date.now();
        let changed = false;
        logs.forEach(log => {
            if (log.timerEnd) {
                const diff = Math.floor((log.timerEnd - now) / 1000);
                if (diff > 0) {
                    const h = Math.floor(diff / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
                    log.displayTimer = `${h > 0 ? h + ':' : ''}${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
                } else { log.displayTimer = "時間到"; }
                changed = true;
            }
        });
        if (changed) renderLogs();
    }, 1000);

    // 標籤切換
    function toggleSingle(btn, group) {
        const isSel = btn.classList.contains('selected');
        const container = group === 'live' ? '#groupLive' : '#groupTask';
        document.querySelectorAll(`${container} .tag-btn`).forEach(b => b.classList.remove('selected'));
        if (!isSel) {
            btn.classList.add('selected');
            if(group === 'live') selLive = btn.innerText; else selTask = btn.innerText;
        } else {
            if(group === 'live') selLive = null; else selTask = null;
        }
    }

    function toggleTime(btn, sec) {
        const isSel = btn.classList.contains('selected');
        document.querySelectorAll('#groupTime .tag-btn').forEach(b => b.classList.remove('selected'));
        if (!isSel) {
            btn.classList.add('selected');
            selTime = btn.innerText.replace('分', '分鐘').replace('時', '小時');
            tempEnd = Date.now() + (sec * 1000);
        } else {
            selTime = null; tempEnd = null;
        }
    }

    function openTagModal(i) {
        currentIdx = i;
        selLive = logs[i].tags.find(t => t === '直播') || null;
        selTask = logs[i].tags.find(t => ['側錄','準連','傳帶'].includes(t)) || null;
        selTime = logs[i].tags.find(t => t.includes('小時') || t.includes('分鐘')) || null;
        tempEnd = logs[i].timerEnd;

        document.querySelectorAll('.tag-btn').forEach(btn => {
            const txt = btn.innerText.replace('分', '分鐘').replace('時', '小時');
            btn.classList.toggle('selected', txt === selLive || txt === selTask || txt === selTime);
        });
        document.getElementById('tagModal').style.display = 'block';
    }

    function applyTags() {
        logs[currentIdx].tags = [selLive, selTask, selTime].filter(t => t);
        logs[currentIdx].timerEnd = tempEnd;
        document.getElementById('tagModal').style.display = 'none';
        saveLogs();
    }

    // 修改倒數
    function openTimerEdit(i) { currentIdx = i; document.getElementById('timerEditModal').style.display = 'block'; }
    function updateTimerValue() {
        const h = parseInt(document.getElementById('newTimerHour').value) || 0;
        const m = parseInt(document.getElementById('newTimerMin').value) || 0;
        if (h || m) { logs[currentIdx].timerEnd = Date.now() + (h * 3600 + m * 60) * 1000; saveLogs(); }
        closeTimerModal();
    }
    function stopTimer() { logs[currentIdx].timerEnd = null; logs[currentIdx].displayTimer = null; saveLogs(); closeTimerModal(); }
    function closeTimerModal() { document.getElementById('timerEditModal').style.display = 'none'; }

    // 渲染
    function renderLogs() {
        logArea.innerHTML = '';
        [...logs].reverse().forEach((log, revIdx) => {
            const i = logs.length - 1 - revIdx;
            const item = document.createElement('div');
            item.className = `log-item ${log.checked ? 'selected' : ''}`;
            const tags = (log.tags || []).map(t => `<span class="badge badge-${t==='直播'?'live':(['側錄','準連','傳帶'].includes(t)?'task':'time')}">${t}</span>`).join('');
            const timer = log.displayTimer ? `<span class="log-timer" onclick="openTimerEdit(${i})">⏳ ${log.displayTimer}</span>` : '';
            
            if (log.isEditing) {
                item.innerHTML = `<div style="width:100%"><input type="text" id="edit-${i}" class="log-text" style="width:85%;" value="${log.text}"><button class="btn-success" onclick="saveEdit(${i})">💾</button></div>`;
            } else {
                item.innerHTML = `
                    <input type="checkbox" class="log-checkbox" onchange="toggleCheck(${i})" ${log.checked ? 'checked' : ''}>
                    <div class="log-content">
                        <div class="log-header"><span class="log-time">${log.time}</span>${timer}</div>
                        <div class="log-text" onclick="toggleCheck(${i})">${log.text}${tags}</div>
                    </div>
                    <div class="log-actions">
                        <button class="icon-btn" onclick="openTagModal(${i})">🏷️</button>
                        <button class="icon-btn" onclick="editLog(${i})">✏️</button>
                        <button class="icon-btn" onclick="deleteLog(${i})">🗑️</button>
                    </div>`;
            }
            logArea.appendChild(item);
        });
    }

    function saveLogs() { localStorage.setItem('sng_logs', JSON.stringify(logs)); renderLogs(); }
    function toggleCheck(i) { logs[i].checked = !logs[i].checked; saveLogs(); }
    function deleteLog(i) { if(confirm('刪除？')) { logs.splice(i,1); saveLogs(); } }
    function clearAllLogs() { if(confirm('清空紀錄？')) { logs=[]; saveLogs(); } }
    function editLog(i) { logs[i].isEditing = true; renderLogs(); }
    function saveEdit(i) { logs[i].text = document.getElementById(`edit-${i}`).value; logs[i].isEditing = false; saveLogs(); }
    function copySelected() { 
        const sel = logs.filter(l => l.checked);
        if(sel.length) navigator.clipboard.writeText(sel.map(l => `${l.text} ${l.tags.join(' ')}`).join('\n')).then(()=>alert("複製成功"));
    }
    function shareSelected() { 
        const sel = logs.filter(l => l.checked);
        if(sel.length && navigator.share) navigator.share({text: sel.map(l => `${l.text} ${l.tags.join(' ')}`).join('\n')});
    }

    // 錄音
    let rec, isRec = false, curTxt = "";
    if ('webkitSpeechRecognition' in window) {
        rec = new webkitSpeechRecognition();
        rec.continuous = true; rec.interimResults = true; rec.lang = 'zh-TW';
        rec.onresult = (e) => {
            let f = '';
            for (let i = e.resultIndex; i < e.results.length; ++i) if(e.results[i].isFinal) f += e.results[i][0].transcript;
            if(f) curTxt = f;
            document.getElementById('livePreview').innerText = "🗣️ " + (f || "聽寫中...");
        };
        rec.onend = () => {
            isRec = false; document.getElementById('toggleBtn').classList.remove('active'); document.getElementById('toggleBtn').innerText = '🎤 點擊開始錄音';
            if(!curTxt.trim()) return;
            logs.push({ time: new Date().toLocaleTimeString('zh-TW',{hour12:false}), text: applyDict(curTxt.trim()), tags: [], timerEnd: null, checked: true, isEditing: false });
            curTxt = ""; saveLogs();
        };
    }
    document.getElementById('toggleBtn').onclick = () => {
        if(!isRec) { curTxt = ""; rec.start(); isRec = true; document.getElementById('toggleBtn').classList.add('active'); document.getElementById('toggleBtn').innerText = `🔴 錄音中...`; } 
        else { rec.stop(); }
    };
    function applyDict(txt) {
        let dict = {};
        vocabBox.value.split(/[,，\n]+/).forEach(v => {
            if(v.includes('=')) {
                let [keys, val] = v.split('=');
                keys.split('/').forEach(k => { if(k.trim()) dict[k.trim()] = val.trim(); });
            } else if(v.trim()) dict[v.trim()] = v.trim();
        });
        Object.keys(dict).sort((a,b) => b.length - a.length).forEach(k => { txt = txt.split(k).join(dict[k]); });
        return txt;
    }
    function openVocabModal() { document.getElementById('vocabModal').style.display='block'; }
    function closeVocabModal() { localStorage.setItem('sng_vocab', vocabBox.value); document.getElementById('vocabModal').style.display='none'; }
    renderLogs();
</script>
</body>
</html>
