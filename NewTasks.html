<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Tasks 自動排程器</title>
    <style>
        body { font-family: -apple-system, sans-serif; padding: 25px; background: #f8fafc; color: #334155; }
        .container { max-width: 500px; margin: 0 auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1); }
        h2 { margin-top: 0; border-bottom: 2px solid #e2e8f0; padding-bottom: 10px; }
        .auth-panel { margin-bottom: 20px; padding: 12px; background: #f1f5f9; border-radius: 8px; }
        .status-badge { font-weight: bold; padding: 2px 6px; border-radius: 4px; }
        .status-disconnected { color: #dc2626; background: #fee2e2; }
        .status-connected { color: #16a34a; background: #dcfce7; }
        .btn-auth { background: #4285F4; color: white; border: none; padding: 6px 12px; border-radius: 4px; cursor: pointer; float: right; }
        .task-list { list-style: none; padding: 0; }
        .task-item { border: 1px solid #e2e8f0; margin-bottom: 12px; padding: 16px; border-radius: 8px; cursor: pointer; }
        .timer-options { display: none; margin-top: 12px; gap: 8px; }
        .timer-btn { padding: 6px 12px; border: 1px solid #cbd5e1; background: #fff; border-radius: 6px; cursor: pointer; }
        #status-message { margin-top: 15px; padding: 10px; border-radius: 6px; display: none; white-space: pre-line; }
        .msg-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
        .msg-error { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
        .msg-info { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
    </style>
</head>
<body>

<div class="container">
    <h2>任務排程列表v3</h2>
    <div class="auth-panel">
        <span>狀態：<span id="auth-status" class="status-badge status-disconnected">載入中...</span></span>
        <button id="auth-btn" class="btn-auth" onclick="handleAuth()" disabled>請稍候</button>
    </div>

    <ul class="task-list">
        <li class="task-item" onclick="toggleOptions('item-1')">
            <strong>韓國瑜宴客</strong>
            <div id="item-1" class="timer-options">
                <button class="timer-btn" onclick="schedule(event, '韓國瑜宴客', 3)">3分鐘</button>
                <button class="timer-btn" onclick="schedule(event, '韓國瑜宴客', 2)">2分鐘</button>
                <button class="timer-btn" onclick="schedule(event, '韓國瑜宴客', 1)">1分鐘</button>
            </div>
        </li>
    </ul>
    <div id="status-message"></div>
</div>

<script>
    // 👇👇👇 請在這裡貼上您「剛剛新建立」的 CLIENT_ID 👇👇👇
    const CLIENT_ID = '663371153098-sb2qcm64nn22mpo0jmvk86l0h1ldqob2.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/tasks';

    let tokenClient;
    let accessToken = null;

    function initGIS() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (resp) => {
                if (resp && resp.access_token) {
                    accessToken = resp.access_token;
                    document.getElementById('auth-status').className = 'status-badge status-connected';
                    document.getElementById('auth-status').innerText = '已連線';
                    document.getElementById('auth-btn').innerText = '切換帳號';
                    localStorage.setItem('has_auth', 'true');
                }
            }
        });
        document.getElementById('auth-btn').disabled = false;
        document.getElementById('auth-status').innerText = '未授權';

        if (localStorage.getItem('has_auth') === 'true') {
            tokenClient.requestAccessToken({ prompt: 'none' });
        }
    }

    function handleAuth() {
        if (tokenClient) tokenClient.requestAccessToken({ prompt: 'consent' });
    }

    function toggleOptions(id) {
        const el = document.getElementById(id);
        el.style.display = el.style.display === "flex" ? "none" : "flex";
    }

    function showMsg(txt, type) {
        const el = document.getElementById('status-message');
        el.innerText = txt;
        el.className = 'msg-' + type;
        el.style.display = 'block';
    }

    function schedule(e, task, min) {
        e.stopPropagation();
        if (!accessToken) return showMsg('請先點擊 Google 授權', 'error');
        
        const target = new Date(Date.now() + min * 60000);
        showMsg(`⏳ 系統將在 ${min} 分鐘後自動寫入Tasks...`, 'info');
        
        setTimeout(() => {
            fetch('https://tasks.googleapis.com/tasks/v1/lists/@default/tasks', {
                method: 'POST',
                headers: { 'Authorization': `Bearer ${accessToken}`, 'Content-Type': 'application/json' },
                body: JSON.stringify({ title: task, due: target.toISOString(), notes: `自動排程於 ${target.toLocaleTimeString()}` })
            }).then(r => r.json()).then(() => {
                showMsg(`✅ 成功寫入 Google Tasks！\n任務：${task}`, 'success');
            });
        }, min * 60000);
    }
</script>
<script src="https://accounts.google.com/gsi/client" async defer onload="initGIS()"></script>
</body>
</html>
