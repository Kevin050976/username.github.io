<body>
<div class="container">
    <h2>任務排程列表</h2>
<!-- 授權與狀態控制區塊 -->
    <div class="auth-panel">
        <span>認證狀態：<span id="auth-status" class="status-badge status-disconnected">未授
權</span></span>
        <button id="auth-btn" class="btn-auth" onclick="handleAuthClick()">Google 授權</
button>
    </div>
    <ul class="task-list">
        <li class="task-item" onclick="toggleOptions('item-1')">
            <div class="task-title">韓國瑜宴客</div>
            <div id="item-1" class="timer-options">
                <button class="timer-btn" onclick="scheduleReminder(event, '韓國瑜宴客', 
3)">3分鐘</button>
                <button class="timer-btn" onclick="scheduleReminder(event, '韓國瑜宴客', 
2)">2分鐘</button>
                <button class="timer-btn" onclick="scheduleReminder(event, '韓國瑜宴客', 
1)">1分鐘</button>
            </div>
        </li>
    </ul>
    <div id="status-message"></div>
</div>
<script>
// 填入您在 GCP 申請的憑證資料
    const CLIENT_ID = '730504878022-6iepkf1ck8t8321pdrvrkmejrj62rveh.apps.googleusercontent.com';
    const SCOPES = 'https://www.googleapis.com/auth/tasks';
    let tokenClient;
    let accessToken = null;
// 網頁載入時初始化 GIS 用戶端
    window.onload = function () {
        if (typeof google !== 'undefined') {
4
            initializeTokenClient();
        } else {
// 確保指令碼加載完畢
            setTimeout(initializeTokenClient, 500); 
        }
    };
    function initializeTokenClient() {
        tokenClient = google.accounts.oauth2.initTokenClient({
            client_id: CLIENT_ID,
            scope: SCOPES,
            callback: (tokenResponse) => {
                if (tokenResponse && tokenResponse.access_token) {
                    accessToken = tokenResponse.access_token;
                    updateAuthUI(true);
// 註記已授權過，供下次無縫登入使用
                    localStorage.setItem('tasks_authorized', 'true');
                }
            },
            error_callback: (err) => {
                console.error('授權發生錯誤:', err);
                if (err.error === 'interaction_required') {
// 靜默失敗，提示使用者手動點擊授權
                    updateAuthUI(false);
                }
            }
        });
// 🎯 核心小技巧：檢查過去是否授權過，若有則進行「靜默登入」
        if (localStorage.getItem('tasks_authorized') === 'true') {
            tokenClient.requestAccessToken({ prompt: 'none' });
        }
    }
    function handleAuthClick() {
// 手動點擊時彈出標準授權視窗 (prompt: '')
        if (tokenClient) {
            tokenClient.requestAccessToken({ prompt: '' });
        }
    }
    function updateAuthUI(isConnected) {
        const statusEl = document.getElementById('auth-status');
        const btnEl = document.getElementById('auth-btn');
        if (isConnected) {
5
            statusEl.innerText = '已連線';
            statusEl.className = 'status-badge status-connected';
            btnEl.innerText = '切換帳號';
        } else {
            statusEl.innerText = '未授權';
            statusEl.className = 'status-badge status-disconnected';
            btnEl.innerText = 'Google 授權';
        }
    }
    function toggleOptions(itemId) {
        const optionsDiv = document.getElementById(itemId);
        const isOpen = optionsDiv.style.display === "flex";
        document.querySelectorAll('.timer-options').forEach(el => el.style.display = 
"none");
        optionsDiv.style.display = isOpen ? "none" : "flex";
    }
    function showStatus(text, type) {
        const msgEl = document.getElementById('status-message');
        msgEl.innerText = text;
        msgEl.className = type === 'success' ? 'msg-success' : 'msg-info';
        msgEl.style.display = 'block';
    }
    function scheduleReminder(event, taskName, minutes) {
        event.stopPropagation();
// 1. 檢查目前是否持有 Token，若無則引導授權
        if (!accessToken) {
            showStatus('請先點擊上方按鈕完成 Google 授權。', 'info');
            handleAuthClick();
            return;
        }
// 2. 計算目標時間並顯示倒數提示
        showStatus(`已選擇：系統將在 ${minutes} 分鐘後自動寫入 Google Tasks...`, 'info');
        const targetTime = new Date(new Date().getTime() + minutes * 60000);
// 3. 設定定時器，在指定分鐘後精準觸發 API
        setTimeout(() => {
            writeTaskToGoogle(taskName, targetTime);
        }, minutes * 60000); 
    }
6
// 4. 真正向 Google Tasks API 發送 POST 請求
    function writeTaskToGoogle(taskName, dueTime) {
// 格式化時間為 RFC 3339 格式 (Google Tasks 要求)
        const rfc3339Time = dueTime.toISOString(); 
        fetch('https://tasks.googleapis.com/tasks/v1/lists/@default/tasks', {
            method: 'POST',
            headers: {
                'Authorization': `Bearer ${accessToken}`,
                'Content-Type': 'application/json'
            },
搭配日曆 API
            })
        })
            body: JSON.stringify({
                title: taskName,
                notes: `透過網頁自動排程提醒。排定時間：${dueTime.toLocaleTimeString()}`,
                due: rfc3339Time // 注意：部分 Tasks 用戶端僅將 due 顯示為當天待辦，若要精準彈窗建議
        .then(response => {
            if (!response.ok) {
                if (response.status === 401) {
// Token 過期，嘗試無感重新整理
                    tokenClient.requestAccessToken({ prompt: 'none' });
                    throw new Error('認證過期，已自動嘗試刷新，請重新點選一次。');
                }
            }
                throw new Error('網路回應不正確');
            return response.json();
        })
        .then(data => {
            showStatus(`✅ 成功寫入 Google Tasks！
任務：${taskName}
時間：${dueTime.toLocaleTimeString()}`, 'success');
        })
        .catch(error => {
            console.error('API 錯誤:', error);
            showStatus(`寫入失敗: ${error.message}`, 'info');
        });
    }
</script>
</body>
