<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SNG 資產盤點系統</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
    <style>
        body { 
            margin: 0; padding: 0; font-family: -apple-system, sans-serif; 
            background: #000; display: flex; flex-direction: column; height: 100vh; color: white; 
        }
        
        /* === 上半部：相機掃描區 === */
        #camera-section { 
            flex: 1; 
            position: relative; overflow: hidden; background: #111; 
            display: flex; align-items: center; justify-content: center; 
        }
        #reader { width: 100%; border: none; }
        
        #status-bar { 
            position: absolute; top: 10px; left: 10px; right: 10px; 
            background: rgba(0,0,0,0.8); color: #fff; padding: 10px; 
            text-align: center; border-radius: 8px; z-index: 10; font-size: 14px; 
        }

        /* === 下半部：資料顯示區 === */
        #info-section { 
            flex: 1; 
            background: #f8f9fa; color: #333; padding: 20px; box-sizing: border-box; 
            overflow-y: auto; display: flex; flex-direction: column; 
            align-items: center; justify-content: flex-start; 
            border-top: 4px solid #1a73e8; 
            transition: background-color 0.2s ease;
        }
        
        .asset-img-container { 
            width: 100%; max-height: 200px; display: flex; 
            justify-content: center; margin-bottom: 15px; 
        }
        .asset-img-container img { 
            max-width: 100%; max-height: 200px; object-fit: contain; 
            border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); 
        }
        
        .asset-id { font-size: 18px; color: #666; margin-bottom: 8px; font-family: monospace; font-weight: bold;}
        .asset-name { font-size: 24px; font-weight: bold; color: #1a73e8; text-align: center; line-height: 1.3; }
        .error-msg { color: #d32f2f; font-size: 24px; font-weight: bold; margin-top: 30px; }
        
        .success-flash { background-color: #d4edda !important; }
    </style>
</head>
<body>

    <div id="camera-section">
        <div id="status-bar">🔄 正在連線下載資料庫...</div>
        <div id="reader"></div>
    </div>
    
    <div id="info-section">
        <div style="margin-top: 60px; color: #aaa; font-size: 18px;">準備就緒，請掃描條碼</div>
    </div>

    <script>
        const statusBar = document.getElementById('status-bar');
        const infoSection = document.getElementById('info-section');
        
        let assetDB = {}; 
        let lastScannedCode = "";
        let lastScanTime = 0;

        const sheetUrl = "https://docs.google.com/spreadsheets/d/1xQIr30as-2eftyskMZ9lOPm7T05Pn16D3mYxxDZEx2g/export?format=csv";

        // 1. 載入資料庫
        Papa.parse(sheetUrl, {
            download: true,
            header: true,
            complete: function(results) {
                const data = results.data;
                let count = 0;
                
                data.forEach(row => {
                    // 修正：用「掃描條碼」當作比對用的 Key，並強制轉為純文字字串
                    const scanCode = String(row["掃描條碼"] || "").trim();
                    
                    if (scanCode) {
                        assetDB[scanCode] = {
                            // 將資產編號存起來供畫面顯示用，同樣強制轉為字串
                            assetId: String(row["資產編號"] || "無編號").trim(), 
                            name: row["資產名稱"] || "未命名設備",
                            image: row["照片.http"] || ""
                        };
                        count++;
                    }
                });
                
                statusBar.innerHTML = `✅ 資料載入完成 (共備妥 ${count} 筆)`;
                setTimeout(() => statusBar.style.display = 'none', 3000);
                
                startScanner(); 
            },
            error: function(err) {
                statusBar.innerHTML = "❌ 資料載入失敗，請檢查網址或權限設定";
                statusBar.style.background = "rgba(211, 47, 47, 0.9)";
            }
        });

        // 2. 音效回饋
        function playBeep(isSuccess) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            
            osc.type = isSuccess ? 'sine' : 'sawtooth';
            osc.frequency.setValueAtTime(isSuccess ? 1500 : 250, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            
            osc.start();
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + (isSuccess ? 0.1 : 0.3));
            osc.stop(audioCtx.currentTime + (isSuccess ? 0.1 : 0.3));
        }

        // 3. 掃描比對邏輯
        function onScanSuccess(decodedText) {
            const currentTime = new Date().getTime();
            
            if (decodedText === lastScannedCode && (currentTime - lastScanTime) < 1500) return; 
            lastScannedCode = decodedText;
            lastScanTime = currentTime;

            // 確保掃描進來的資料也是純文字
            const scanCodeStr = String(decodedText).trim();
            const asset = assetDB[scanCodeStr];

            infoSection.classList.add('success-flash');
            setTimeout(() => infoSection.classList.remove('success-flash'), 300);

            if (asset) {
                playBeep(true); 
                
                const imgHtml = asset.image 
                    ? `<img src="${asset.image}" alt="設備照片">` 
                    : `<div style="width:100%; height:150px; background:#e0e0e0; display:flex; align-items:center; justify-content:center; border-radius:8px; color:#888;">無提供照片</div>`;
                
                infoSection.innerHTML = `
                    <div class="asset-img-container">${imgHtml}</div>
                    <div class="asset-id">資產編號: ${asset.assetId}</div>
                    <div class="asset-name">${asset.name}</div>
                `;
            } else {
                playBeep(false); 
                infoSection.innerHTML = `
                    <div class="error-msg">❌ 查無此設備</div>
                    <div class="asset-id" style="margin-top:10px; font-weight:normal;">未登記的條碼: ${scanCodeStr}</div>
                `;
            }
        }

        // 4. 啟動後置相機
        function startScanner() {
            const scanner = new Html5QrcodeScanner(
                "reader", 
                { 
                    fps: 15, 
                    qrbox: { width: 280, height: 120 }, 
                    aspectRatio: 1.0,
                    videoConstraints: { facingMode: "environment" } 
                }, 
                false
            );
            scanner.render(onScanSuccess);
        }
    </script>
</body>
</html>
