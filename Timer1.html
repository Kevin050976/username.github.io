<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>BMC 戰術打點器 V6</title>
    <style>
        body {
            background-color: #000; color: #fff;
            font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; padding: 20px;
        }
        .preview-box {
            border: 2px solid #333; border-radius: 12px;
            width: 260px; height: 90px; background: #111;
            margin-bottom: 20px; overflow: hidden;
        }
        video { width: 100%; height: 100%; object-fit: cover; display: block; }
        button {
            padding: 20px; font-size: 18px; font-weight: bold; width: 100%; max-width: 300px;
            border: none; border-radius: 12px; cursor: pointer; margin-bottom: 15px;
        }
        #startBtn { background: #32d74b; color: #000; }
        #dlBtn { background: #0a84ff; color: #fff; display: none; }
        .status { color: #888; font-size: 14px; margin-bottom: 5px; }
        #log { color: #666; font-size: 12px; height: 20px; margin-bottom: 10px;}
    </style>
</head>
<body>

    <h2 style="color:#666;">V6 戰術匿蹤版</h2>
    <div class="status">有效打點：<span id="cnt" style="color:#fff; font-weight:bold; font-size:20px;">0</span></div>
    <div id="log">系統就緒</div>

    <canvas id="cvs" width="300" height="100" style="display:none;"></canvas>

    <div class="preview-box">
        <video id="vid" muted playsinline autoplay></video>
    </div>

    <button id="startBtn">啟動懸浮 (MediaSession)</button>
    <button id="dlBtn">下載紀錄</button>

    <script>
        const cvs = document.getElementById('cvs');
        const ctx = cvs.getContext('2d');
        const vid = document.getElementById('vid');
        const startBtn = document.getElementById('startBtn');
        const dlBtn = document.getElementById('dlBtn');
        const cntSpan = document.getElementById('cnt');
        const logDiv = document.getElementById('log');

        let marks = [];
        let isFlash = false;
        let audioCtx = null;
        let lastMarkTime = 0;

        // 1. 低功耗繪圖 (FPS 10) - 避免被 iOS 判定佔用太多 GPU
        function draw() {
            ctx.fillStyle = isFlash ? '#ff453a' : '#000';
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            const now = new Date();
            // 簡化顯示，只顯示到秒，節省運算
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false }) + '.' + String(Math.floor(now.getMilliseconds()/100));

            ctx.fillStyle = isFlash ? '#000' : '#32d74b';
            ctx.font = 'bold 50px -apple-system'; // 字體縮小
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(timeStr, cvs.width/2, cvs.height/2);
        }
        setInterval(draw, 100); // 100ms = 10 FPS (極低功耗)

        // 綁定串流
        const stream = cvs.captureStream(10); // 設定 10 FPS
        vid.srcObject = stream;
        vid.play().catch(()=>{});

        // 2. 音訊保活 (必要的邪惡)
        function wakeLock() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = 10; // 稍微提高頻率避免被當作雜訊過濾
            gain.gain.value = 0.001;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
        }

        // 3. 核心功能：記錄邏輯
        function recordMark(source) {
            // A. 背景過濾：如果 Safari 在背景 (你看不到網頁)，絕對不紀錄！
            // 這解決了「離開 App 計數增加」的 Bug
            if (document.visibilityState === 'hidden' && !document.pictureInPictureElement) {
                console.log("背景誤觸，忽略");
                return;
            }

            // B. 冷卻過濾：1秒內不重複紀錄
            const nowTime = Date.now();
            if (nowTime - lastMarkTime < 1000) return;
            lastMarkTime = nowTime;

            // 執行紀錄
            const now = new Date();
            const t = now.toLocaleTimeString('zh-TW', { hour12: false }) + '.' + String(Math.floor(now.getMilliseconds()/100));
            marks.push(t);
            
            // UI 反饋
            cntSpan.innerText = marks.length;
            dlBtn.style.display = 'block';
            logDiv.innerText = `打點成功 (${source}): ${t}`;
            
            isFlash = true;
            setTimeout(() => isFlash = false, 200);

            // 如果是暫停觸發的，立刻恢復播放
            if(vid.paused) vid.play().catch(()=>{});
        }

        // 4. 啟動按鈕
        startBtn.addEventListener('click', () => {
            wakeLock();
            vid.muted = true;
            
            vid.play().then(() => {
                // 註冊 MediaSession (讓你可以用控制中心的按鈕打點)
                if ("mediaSession" in navigator) {
                    navigator.mediaSession.metadata = new MediaMetadata({
                        title: "打點錄製中",
                        artist: "點擊快進/快退來打點",
                        album: "Blackmagic Tool"
                    });
                    // 綁定「下一首」和「上一首」按鈕作為打點觸發器
                    navigator.mediaSession.setActionHandler('nexttrack', () => recordMark('MediaBtn'));
                    navigator.mediaSession.setActionHandler('previoustrack', () => recordMark('MediaBtn'));
                    navigator.mediaSession.setActionHandler('play', () => { vid.play(); recordMark('PlayBtn'); });
                    navigator.mediaSession.setActionHandler('pause', () => recordMark('PauseBtn'));
                }

                if (vid.requestPictureInPicture) {
                    vid.requestPictureInPicture().catch(e => alert("PiP 失敗: " + e.message));
                } else if (vid.webkitSetPresentationMode) {
                    vid.webkitSetPresentationMode('picture-in-picture');
                }
            });
        });

        // 5. 監聽暫停 (作為備用打點觸發)
        vid.addEventListener('pause', () => {
            // 只有在 PiP 模式下才算數
            if (document.pictureInPictureElement || vid.webkitPresentationMode === 'picture-in-picture') {
                recordMark('PauseEvent');
            }
        });

        // 下載
        dlBtn.addEventListener('click', () => {
            const b = new Blob([marks.join('\n')], {type:'text/plain'});
            const u = URL.createObjectURL(b);
            const a = document.createElement('a');
            a.href = u; a.download = 'marks.txt';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        });

        // 頁面切換時嘗試修復
        document.addEventListener('visibilitychange', () => {
             if (document.visibilityState === 'visible') {
                 // 回到 Safari 時，重整 log
                 logDiv.innerText = "已回到 Safari，請下載紀錄";
                 // 確保 Audio 活著
                 if(audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
             }
        });
    </script>
</body>
</html>
