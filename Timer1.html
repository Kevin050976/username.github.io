<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackmagic 懸浮打點器 (iOS修正版)</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #888; }
        
        #preview-container {
            margin-bottom: 30px;
            border: 2px solid #333;
            border-radius: 16px;
            overflow: hidden;
            width: 300px;
            height: 100px;
            background: #1c1c1e;
            position: relative;
        }
        
        /* 讓 Video 填滿容器 */
        video { width: 100%; height: 100%; object-fit: cover; display: block; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        
        button {
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        button:active { transform: scale(0.96); }
        
        #startPipBtn { background-color: #32d74b; color: black; } 
        #downloadBtn { background-color: #0a84ff; color: white; display: none; }
        #clearBtn { background-color: #ff453a; color: white; margin-top: 10px; }
        
        .status { margin-top: 20px; color: #888; font-size: 14px; }
        .count-badge { background: #ff453a; padding: 2px 8px; border-radius: 10px; color: white; font-weight: bold; }
    </style>
</head>
<body>

    <h1>懸浮打點時鐘</h1>

    <canvas id="clockCanvas" width="600" height="200" style="display:none;"></canvas>

    <div id="preview-container">
        <video id="clockVideo" muted playsinline autoplay></video>
    </div>

    <div class="btn-group">
        <button id="startPipBtn">步驟 1: 開啟懸浮時鐘</button>
        <div class="status">目前記錄點數：<span id="markCount" class="count-badge">0</span></div>
        <button id="downloadBtn">步驟 2: 下載紀錄檔 (.txt)</button>
        <button id="clearBtn">清除重來</button>
    </div>

    <script>
        const canvas = document.getElementById('clockCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('clockVideo');
        const startPipBtn = document.getElementById('startPipBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const countSpan = document.getElementById('markCount');

        let marks = [];
        let isFlashing = false;

        // 1. 繪製時鐘
        function drawClock() {
            ctx.fillStyle = isFlashing ? '#ff453a' : '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            const timeStr = `${h}:${m}:${s}.${ms}`;

            ctx.fillStyle = isFlashing ? '#000000' : '#32d74b';
            ctx.font = 'bold 110px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(timeStr, canvas.width / 2, canvas.height / 2);

            requestAnimationFrame(drawClock);
        }
        
        // 【關鍵修正 1】先啟動繪圖，再綁定 Stream，避免 Stream 空白
        drawClock();
        const stream = canvas.captureStream(30);
        video.srcObject = stream;

        // 【關鍵修正 2】按鈕事件邏輯重寫
        startPipBtn.addEventListener('click', () => {
            // 強制確保靜音，否則 iOS 拒絕播放
            video.muted = true;
            
            // 嘗試播放 (不管 Promise 結果，先執行 PiP 請求)
            video.play().then(() => {
                // 播放成功後，如果 PiP 沒開，再開一次確保
                if (!document.pictureInPictureElement && video.readyState >= 1) {
                   video.requestPictureInPicture().catch(e => {
                       console.error("PiP Auto-Fail:", e);
                   });
                }
            }).catch(error => {
                console.log("Play failed:", error);
                alert("播放啟動失敗，請再點一次按鈕");
            });

            // 【核心駭客】在點擊的「當下」同步請求 PiP
            // 這樣 Safari 才會認為是你的手指在操作
            setTimeout(() => {
                if (!document.pictureInPictureElement) {
                    video.requestPictureInPicture().catch(err => {
                        // 這裡捕捉錯誤但不跳 Alert，避免干擾，因為上面的 .then 可能會成功
                        console.log("Sync PiP failed, waiting for promise:", err);
                    });
                }
            }, 100);
        });

        // 打點邏輯 (監聽暫停)
        video.addEventListener('pause', () => {
            if (document.pictureInPictureElement) {
                const now = new Date();
                const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false }) + '.' + String(Math.floor(now.getMilliseconds()/100));
                marks.push(timeStr);
                
                countSpan.innerText = marks.length;
                downloadBtn.style.display = 'block';

                isFlashing = true;
                setTimeout(() => { isFlashing = false; }, 200);

                video.play(); // 立刻恢復播放
            }
        });

        // 下載邏輯
        downloadBtn.addEventListener('click', () => {
            if (marks.length === 0) return alert("無紀錄");
            const content = marks.join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            a.download = `Mark_${now.getHours()}${now.getMinutes()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        clearBtn.addEventListener('click', () => {
            if(confirm("清除紀錄？")) {
                marks = [];
                countSpan.innerText = '0';
                downloadBtn.style.display = 'none';
            }
        });
    </script>
</body>
</html>
