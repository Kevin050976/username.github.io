<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackmagic 打點器 V5 (暴力版)</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, sans-serif;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            height: 100vh; margin: 0; padding: 20px;
        }
        
        #preview-box {
            border: 2px solid #333; border-radius: 12px;
            width: 280px; height: 94px; background: #1c1c1e;
            margin-bottom: 20px; overflow: hidden;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; display: block; }

        button {
            padding: 20px 40px; font-size: 20px; font-weight: bold;
            border: none; border-radius: 12px; cursor: pointer; width: 100%; max-width: 300px;
            margin-bottom: 15px;
        }
        
        #startBtn { background-color: #32d74b; color: black; } 
        #dlBtn { background-color: #0a84ff; color: white; display: none; }
        
        .status { color: #888; font-size: 14px; margin-bottom: 10px; }
        #log { color: #ff453a; font-size: 12px; height: 20px; }
    </style>
</head>
<body>

    <h2 style="color:#666;">V5 暴力啟動版</h2>
    <div id="log"></div>

    <canvas id="cvs" width="560" height="188" style="display:none;"></canvas>

    <div id="preview-box">
        <video id="vid" muted playsinline autoplay></video>
    </div>

    <div class="status">目前點數：<span id="cnt" style="color:#fff; font-weight:bold;">0</span></div>

    <button id="startBtn">💥 點我強制懸浮</button>
    <button id="dlBtn">下載紀錄</button>

    <script>
        const cvs = document.getElementById('cvs');
        const ctx = cvs.getContext('2d');
        const vid = document.getElementById('vid');
        const startBtn = document.getElementById('startBtn');
        const dlBtn = document.getElementById('dlBtn');
        const cntSpan = document.getElementById('cnt');
        const logDiv = document.getElementById('log');

        let marks = [];
        let isFlash = false;
        let audioCtx = null;

        // --- 1. 頁面一載入就開始畫圖與播放 (不等按鈕) ---
        function draw() {
            ctx.fillStyle = isFlash ? '#ff453a' : '#000';
            ctx.fillRect(0, 0, cvs.width, cvs.height);
            
            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false }) + '.' + String(Math.floor(now.getMilliseconds()/100));

            ctx.fillStyle = isFlash ? '#000' : '#32d74b';
            ctx.font = 'bold 100px -apple-system';
            ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
            ctx.fillText(timeStr, cvs.width/2, cvs.height/2);
        }
        setInterval(draw, 50); // 強制 20fps 更新

        // 綁定串流
        const stream = cvs.captureStream(30);
        vid.srcObject = stream;
        
        // 嘗試自動播放 (Safari 可能會擋，但試試無妨)
        vid.play().catch(() => {}); 

        // --- 2. 音訊保活 (防凍結) ---
        function wakeLock() {
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.frequency.value = 1; gain.gain.value = 0.001;
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start();
        }

        // --- 3. 按鈕事件：暴力執行 ---
        startBtn.addEventListener('click', function() {
            logDiv.innerText = "正在啟動...";
            
            // A. 立刻喚醒音訊
            wakeLock();

            // B. 確保影片播放 (如果還沒播)
            vid.muted = true;
            vid.play(); 

            // C. 【關鍵】直接請求 PiP，不等待 play() 的結果
            // 這是避免 NotAllowedError 的唯一解法
            try {
                if (vid.requestPictureInPicture) {
                    vid.requestPictureInPicture().catch(err => {
                        logDiv.innerText = "失敗: " + err.message;
                        alert("啟動失敗原因：" + err.message);
                    });
                } else if (vid.webkitSetPresentationMode) {
                    // iOS 特有 API
                    vid.webkitSetPresentationMode('picture-in-picture');
                }
            } catch (e) {
                logDiv.innerText = "錯誤: " + e;
            }
        });

        // --- 4. 打點邏輯 (防止連點) ---
        let lastTime = 0;
        vid.addEventListener('pause', () => {
            // 只在 PiP 模式下運作
            if (!document.pictureInPictureElement && !vid.webkitPresentationMode === 'picture-in-picture') return;
            
            // 嘗試恢復播放
            const p = vid.play();
            if (p) {
                p.then(() => {
                    // 只有成功恢復播放，才算有效點擊
                    const now = Date.now();
                    if (now - lastTime < 500) return; // 冷卻
                    lastTime = now;

                    const d = new Date();
                    const t = d.toLocaleTimeString('zh-TW', { hour12: false }) + '.' + String(Math.floor(d.getMilliseconds()/100));
                    marks.push(t);
                    cntSpan.innerText = marks.length;
                    dlBtn.style.display = 'block';
                    
                    isFlash = true;
                    setTimeout(() => isFlash = false, 200);
                }).catch(() => {
                    console.log("系統強制暫停，忽略");
                });
            }
        });

        // 下載
        dlBtn.addEventListener('click', () => {
            const b = new Blob([marks.join('\n')], {type:'text/plain'});
            const u = URL.createObjectURL(b);
            const a = document.createElement('a');
            a.href = u; a.download = 'marks.txt';
            document.body.appendChild(a); a.click(); document.body.removeChild(a);
        });
    </script>
</body>
</html>
