<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackmagic 懸浮打點器 (防凍結版)</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { font-size: 24px; margin-bottom: 10px; color: #888; }
        
        #preview-container {
            margin-bottom: 30px;
            border: 2px solid #333;
            border-radius: 16px;
            overflow: hidden;
            width: 300px;
            height: 100px;
            background: #1c1c1e;
            position: relative;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; display: block; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        
        button {
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        button:active { transform: scale(0.96); }
        
        #startPipBtn { background-color: #32d74b; color: black; } 
        #downloadBtn { background-color: #0a84ff; color: white; display: none; }
        #clearBtn { background-color: #ff453a; color: white; margin-top: 10px; }
        
        .status { margin-top: 20px; color: #888; font-size: 14px; }
        .count-badge { background: #ff453a; padding: 2px 8px; border-radius: 10px; color: white; font-weight: bold; }
        
        /* 增加一個狀態燈 */
        .live-indicator {
            width: 10px; height: 10px; border-radius: 50%; background: #333;
            display: inline-block; margin-right: 5px;
        }
        .live-indicator.active { background: #32d74b; box-shadow: 0 0 8px #32d74b; }
    </style>
</head>
<body>

    <h1>懸浮打點時鐘 V3</h1>
    <div style="font-size:12px; color:#555; margin-bottom: 20px;">防凍結音訊引擎已就緒</div>

    <canvas id="clockCanvas" width="600" height="200" style="display:none;"></canvas>

    <div id="preview-container">
        <video id="clockVideo" muted playsinline autoplay></video>
    </div>

    <div class="btn-group">
        <button id="startPipBtn">啟動 (音訊保活 + PiP)</button>
        <div class="status">
            <span id="liveDot" class="live-indicator"></span>
            目前記錄點數：<span id="markCount" class="count-badge">0</span>
        </div>
        <button id="downloadBtn">下載紀錄檔 (.txt)</button>
        <button id="clearBtn">清除重來</button>
    </div>

    <script>
        const canvas = document.getElementById('clockCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('clockVideo');
        const startPipBtn = document.getElementById('startPipBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const countSpan = document.getElementById('markCount');
        const liveDot = document.getElementById('liveDot');

        let marks = [];
        let isFlashing = false;
        let audioContext = null;

        // 1. 繪圖邏輯
        function drawClock() {
            ctx.fillStyle = isFlashing ? '#ff453a' : '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            const timeStr = `${h}:${m}:${s}.${ms}`;

            ctx.fillStyle = isFlashing ? '#000000' : '#32d74b';
            ctx.font = 'bold 110px -apple-system, sans-serif';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(timeStr, canvas.width / 2, canvas.height / 2);

            requestAnimationFrame(drawClock);
        }
        
        // 啟動繪圖與串流
        drawClock();
        const stream = canvas.captureStream(30);
        video.srcObject = stream;

        // --- 【核心技術：音訊保活引擎】 ---
        function initAudioKeepAlive() {
            if (!audioContext) {
                // 創建音訊上下文
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioContext = new AudioContext();
            }

            // 恢復上下文 (因為有時會被掛起)
            if (audioContext.state === 'suspended') {
                audioContext.resume();
            }

            // 建立一個聽不到的振盪器 (Oscillator)
            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();

            oscillator.type = 'sine';
            oscillator.frequency.value = 1; // 1Hz (極低頻)
            gainNode.gain.value = 0.001; // 極小音量 (幾乎靜音，但不能是 0)

            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);

            oscillator.start();
            console.log("Audio Keep-Alive Started");
            liveDot.classList.add('active'); // 亮綠燈
        }

        // 2. 按鈕啟動流程
        startPipBtn.addEventListener('click', () => {
            // A. 啟動音訊保活 (這能防止背景變灰)
            initAudioKeepAlive();

            // B. 處理影片播放
            video.muted = true;
            video.play().then(() => {
                 // C. 嘗試進入 PiP
                if (!document.pictureInPictureElement && video.readyState >= 1) {
                   video.requestPictureInPicture().catch(e => console.error(e));
                }
            }).catch(e => {
                alert("播放被阻擋，請再按一次");
            });

            // 同步備用方案
            setTimeout(() => {
                if (!document.pictureInPictureElement) {
                    video.requestPictureInPicture().catch(err => console.log(err));
                }
            }, 100);
        });

        // 3. 監聽暫停來打點
        video.addEventListener('pause', () => {
            if (document.pictureInPictureElement) {
                // 記錄
                const now = new Date();
                const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false }) + '.' + String(Math.floor(now.getMilliseconds()/100));
                marks.push(timeStr);
                
                // UI 更新
                countSpan.innerText = marks.length;
                downloadBtn.style.display = 'block';

                // 閃爍
                isFlashing = true;
                setTimeout(() => { isFlashing = false; }, 200);

                // 立刻恢復播放 (確保時鐘繼續走)
                video.play();
                
                // 確保音訊引擎還活著
                if (audioContext && audioContext.state === 'suspended') {
                    audioContext.resume();
                }
            }
        });

        // 下載與清除
        downloadBtn.addEventListener('click', () => {
            if (marks.length === 0) return alert("無紀錄");
            const content = marks.join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            a.download = `Mark_${now.getHours()}${now.getMinutes()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        clearBtn.addEventListener('click', () => {
            if(confirm("清除紀錄？")) marks = []; countSpan.innerText = '0'; downloadBtn.style.display = 'none';
        });

        // 頁面可見性改變時，再次確保 Audio 活著
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && audioContext && audioContext.state === 'suspended') {
                audioContext.resume();
            }
        });
    </script>
</body>
</html>
