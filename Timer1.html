<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Blackmagic 懸浮打點器 V4 (強制核心版)</title>
    <style>
        body {
            background-color: #000;
            color: #fff;
            font-family: -apple-system, sans-serif;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }
        h1 { font-size: 24px; margin-bottom: 5px; color: #888; }
        p { font-size: 12px; color: #555; margin-bottom: 20px; }
        
        #preview-container {
            margin-bottom: 30px;
            border: 2px solid #333;
            border-radius: 16px;
            overflow: hidden;
            width: 280px; /* 稍微縮小減輕負擔 */
            height: 94px;
            background: #1c1c1e;
            position: relative;
        }
        
        video { width: 100%; height: 100%; object-fit: cover; display: block; }

        .btn-group { display: flex; flex-direction: column; gap: 15px; width: 100%; max-width: 300px; }
        
        button {
            padding: 18px;
            font-size: 18px;
            font-weight: 600;
            border: none;
            border-radius: 12px;
            cursor: pointer;
        }
        button:active { transform: scale(0.96); }
        
        #startPipBtn { background-color: #32d74b; color: black; } 
        #downloadBtn { background-color: #0a84ff; color: white; display: none; }
        #clearBtn { background-color: #ff453a; color: white; margin-top: 10px; }
        
        .status { margin-top: 20px; color: #888; font-size: 14px; }
        .count-badge { background: #ff453a; padding: 2px 8px; border-radius: 10px; color: white; font-weight: bold; }
        
        /* 狀態指示燈 */
        .live-indicator {
            width: 10px; height: 10px; border-radius: 50%; background: #333;
            display: inline-block; margin-right: 5px;
        }
        .live-indicator.active { background: #32d74b; box-shadow: 0 0 8px #32d74b; }
    </style>
</head>
<body>

    <h1>懸浮打點時鐘 V4</h1>
    <p>setInterval 核心 + 系統暫停過濾</p>

    <canvas id="clockCanvas" width="560" height="188" style="display:none;"></canvas>

    <div id="preview-container">
        <video id="clockVideo" muted playsinline autoplay></video>
    </div>

    <div class="btn-group">
        <button id="startPipBtn">啟動懸浮時鐘</button>
        <div class="status">
            <span id="liveDot" class="live-indicator"></span>
            有效打點：<span id="markCount" class="count-badge">0</span>
        </div>
        <button id="downloadBtn">下載紀錄檔 (.txt)</button>
        <button id="clearBtn">清除重來</button>
    </div>

    <script>
        const canvas = document.getElementById('clockCanvas');
        const ctx = canvas.getContext('2d');
        const video = document.getElementById('clockVideo');
        const startPipBtn = document.getElementById('startPipBtn');
        const downloadBtn = document.getElementById('downloadBtn');
        const clearBtn = document.getElementById('clearBtn');
        const countSpan = document.getElementById('markCount');
        const liveDot = document.getElementById('liveDot');

        let marks = [];
        let isFlashing = false;
        let audioContext = null;

        // --- 核心修正 1：改用 setInterval 強制繪圖 ---
        // 即使在背景，這比 requestAnimationFrame 更有機會存活
        function drawClock() {
            ctx.fillStyle = isFlashing ? '#ff453a' : '#000000';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            const now = new Date();
            const h = String(now.getHours()).padStart(2, '0');
            const m = String(now.getMinutes()).padStart(2, '0');
            const s = String(now.getSeconds()).padStart(2, '0');
            const ms = String(Math.floor(now.getMilliseconds() / 10)).padStart(2, '0');
            const timeStr = `${h}:${m}:${s}.${ms}`;

            ctx.fillStyle = isFlashing ? '#000000' : '#32d74b';
            ctx.font = 'bold 100px -apple-system, sans-serif'; // 字體稍微調小適應
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(timeStr, canvas.width / 2, canvas.height / 2);
        }
        
        // 每 50ms 更新一次 (20 FPS)，降低系統負擔但保持流暢
        setInterval(drawClock, 50);

        // 綁定 Stream
        const stream = canvas.captureStream(20);
        video.srcObject = stream;

        // --- 音訊保活 (維持不變，這很重要) ---
        function initAudioKeepAlive() {
            if (!audioContext) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioContext = new AudioContext();
            }
            if (audioContext.state === 'suspended') audioContext.resume();

            const oscillator = audioContext.createOscillator();
            const gainNode = audioContext.createGain();
            oscillator.type = 'sine';
            oscillator.frequency.value = 1; 
            gainNode.gain.value = 0.001; 
            oscillator.connect(gainNode);
            gainNode.connect(audioContext.destination);
            oscillator.start();
            liveDot.classList.add('active');
        }

        // --- 啟動按鈕 ---
        startPipBtn.addEventListener('click', () => {
            initAudioKeepAlive();
            video.muted = true;
            
            video.play().then(() => {
                if (!document.pictureInPictureElement && video.readyState >= 1) {
                   video.requestPictureInPicture().catch(console.error);
                }
            }).catch(e => alert("請再按一次啟動"));
        });

        // --- 核心修正 2：智慧打點過濾系統 ---
        let lastMarkTime = 0; // 防止連點

        video.addEventListener('pause', () => {
            // 只有在 PiP 模式下才處理
            if (!document.pictureInPictureElement) return;

            // 嘗試立刻恢復播放
            const playPromise = video.play();

            if (playPromise !== undefined) {
                playPromise.then(() => {
                    // ★ 成功恢復播放 = 這是用戶點擊造成的暫停 ★
                    // 因為如果是系統強制暫停，這裡的 play() 通常會失敗或被擋住
                    registerMark();
                }).catch(error => {
                    // ★ 恢復失敗 = 這是系統強制搶佔資源 ★
                    // Blackmagic Cam 搶走了 Audio Focus，導致我們無法播放
                    // 這種情況下，我們【不】記錄打點，避免計數亂跳
                    console.log("系統強制暫停，忽略此次訊號");
                });
            }
        });

        function registerMark() {
            const nowTime = Date.now();
            // 冷卻時間檢查：0.5秒內不重複打點 (避免雙擊誤判)
            if (nowTime - lastMarkTime < 500) return; 
            
            lastMarkTime = nowTime;

            const now = new Date();
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false }) + '.' + String(Math.floor(now.getMilliseconds()/100));
            marks.push(timeStr);
            
            // 更新介面
            countSpan.innerText = marks.length;
            downloadBtn.style.display = 'block';

            // 閃爍效果
            isFlashing = true;
            setTimeout(() => { isFlashing = false; }, 200);
        }

        // 下載與清除
        downloadBtn.addEventListener('click', () => {
            if (marks.length === 0) return alert("無紀錄");
            const content = marks.join('\n');
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            const now = new Date();
            a.download = `Mark_${now.getHours()}${now.getMinutes()}.txt`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(url);
        });

        clearBtn.addEventListener('click', () => {
            if(confirm("清除紀錄？")) {
                marks = []; countSpan.innerText = '0'; downloadBtn.style.display = 'none';
            }
        });

        // 頁面喚醒時重啟 Audio
        document.addEventListener('visibilitychange', () => {
            if (document.visibilityState === 'visible' && audioContext?.state === 'suspended') {
                audioContext.resume();
            }
        });
    </script>
</body>
</html>
