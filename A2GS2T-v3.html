<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SNG 勤務終端 (連環炸彈版)</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; margin: 0; padding: 10px; background-color: #f4f4f9; display: flex; justify-content: center; }
        .container { width: 100%; max-width: 600px; background: white; padding: 15px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 200px; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
        .modal-content { background: white; margin: 8% auto; padding: 15px; width: 90%; max-width: 450px; border-radius: 15px; text-align: center; max-height: 80vh; overflow-y: auto; }
        button { border: none; border-radius: 8px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: #007bff; color: white; padding: 8px 10px; }
        .btn-success { background: #28a745; color: white; padding: 12px; }
        .btn-danger { background: #dc3545; color: white; padding: 12px; }
        .btn-secondary { background: #6c757d; color: white; padding: 8px 10px; }
        
        /* --- UI 優化：縮小標籤，確保確認鍵可視 --- */
        .tag-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; margin-bottom: 15px; }
        .tag-btn { padding: 8px 2px; font-size: 0.95em; border: 2px solid transparent; border-radius: 6px; font-weight: bold; word-break: keep-all; }
        .confirm-btn { padding: 16px; font-size: 1.3em; width: 100%; box-sizing: border-box; margin-top: 10px; }
        
        .tag-live { background: #28a745; color: white; } 
        .tag-task { background: #17a2b8; color: white; } 
        .tag-advance { background: #6f42c1; color: white; } 
        .tag-time { background: #fd7e14; color: white; } 
        .tag-btn.selected { border-color: #212529; box-shadow: inset 0 0 8px rgba(0,0,0,0.5); transform: scale(0.94); }
        .tag-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; border-color: transparent; }
        
        .bottom-controls { position: fixed; bottom: 0; left: 0; right: 0; background: #212529; z-index: 100; padding: 12px; display: flex; flex-direction: column; align-items: center; gap: 10px; }
        #toggleBtn { width: 100%; max-width: 500px; height: 75px; font-size: 1.6em; background: #28a745; color: white; border-radius: 12px; }
        #toggleBtn.active { background: #dc3545; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.8; } 100% { opacity: 1; } }
        .log-item { background: #fff; border: 1px solid #eee; padding: 12px; margin-bottom: 12px; border-radius: 10px; display: flex; align-items: flex-start; }
        .log-checkbox { margin-top: 5px; margin-right: 12px; transform: scale(1.6); }
        .log-content { flex-grow: 1; }
        .log-header { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
        .log-time { color: #888; font-size: 0.85em; }
        .log-timer { color: #dc3545; font-size: 0.85em; font-weight: bold; cursor: pointer; background: #fff5f5; padding: 2px 6px; border-radius: 4px; }
        .log-text { font-size: 1.25em; font-weight: bold; color: #333; line-height: 1.4; }
        .badge { display: inline-block; padding: 2px 6px; font-size: 0.75em; border-radius: 4px; margin-left: 5px; color: white; vertical-align: middle; }
        .badge-live { background: #28a745; }
        .badge-task { background: #17a2b8; }
        .badge-advance { background: #6f42c1; }
        .badge-time { background: #fd7e14; }
        .icon-btn { width: 34px; height: 34px; background: #f8f9fa; border: 1px solid #ddd; border-radius: 8px; margin-bottom: 5px; display: flex; align-items: center; justify-content: center; }
        #livePreview { color: #007bff; font-weight: bold; text-align: center; margin-bottom: 8px; height: 1.2em; font-size: 1.1em; }
        .action-bar-btn { flex: 1; height: 55px; color: white; border-radius: 8px; font-size: 1.1em; font-weight: bold; }
        textarea { box-sizing: border-box; }
    </style>
</head>
<body>

<div class="container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; gap: 5px;">
        <div style="display: flex; align-items: center; gap: 5px;">
            <select id="recordTimerSelect" style="padding: 4px 6px; border-radius: 5px; border: 1px solid #ccc; font-weight:bold; color: #155724; background: #d4edda; font-size: 0.9em;">
                <option value="0">手動</option>
                <option value="3000">3秒</option>
                <option value="4000">4秒</option>
                <option value="5000" selected>5秒</option>
                <option value="6000">6秒</option>
            </select>
            <h3 style="margin:0; font-size: 1.3em; white-space: nowrap;">🎙️ SNG</h3>
        </div>
        <div style="display: flex; gap: 5px; white-space: nowrap;">
            <button class="btn-primary" onclick="addManualLog()" style="font-size:0.9em;">➕ 增加</button>
            <button class="btn-secondary" onclick="openVocabModal()" style="font-size:0.9em;">⚙️ 詞彙</button>
        </div>
    </div>
    <div id="livePreview"></div>
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; border-bottom: 2px solid #f0f0f0; padding-bottom: 8px;">
        <span style="font-weight:bold;">📝 紀錄列表</span>
        <div>
            <button onclick="selectAll()" class="btn-secondary" style="padding: 4px 8px; font-size: 0.8em;">全選</button>
            <button onclick="deleteSelectedLogs()" class="btn-danger" style="padding: 4px 8px; font-size: 0.8em; border: none;">刪除</button>
        </div>
    </div>
    <div id="logArea"></div>
</div>

<div class="bottom-controls">
    <button id="toggleBtn">🎤 點擊開始錄音</button>
    <div style="display:flex; gap:8px; width:100%; max-width:500px;">
        <button onclick="copySelected()" class="action-bar-btn" style="background:#17a2b8;">📋 複製</button>
        <button onclick="shareSelected()" class="action-bar-btn" style="background:#28a745;">📲 分享</button>
        <button onclick="exportSelected()" class="action-bar-btn" style="background:#6c757d;">💾 匯出</button>
    </div>
</div>

<div id="timerEditModal" class="modal">
    <div class="modal-content">
        <h4>⏱️ 修改倒數時間</h4>
        <p style="font-size: 0.85em; color: #666; margin-bottom: 5px;">重新設定指定時間 (如: 14:10)</p>
        <input type="time" id="editExactTimeInput" style="padding: 10px; font-size: 1.4em; border-radius: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; margin-bottom: 15px; text-align: center;">
        <div style="display: flex; flex-direction: column; gap: 10px;">
            <button class="btn-success confirm-btn" style="margin-top:0;" onclick="updateTimerValue()">✅ 確定修改</button>
            <button class="btn-danger confirm-btn" style="margin-top:0; padding:12px;" onclick="stopTimer()">⏹️ 不顯示 (取消警報)</button>
            <button class="btn-secondary" style="padding:12px;" onclick="closeTimerModal()">取消</button>
        </div>
    </div>
</div>

<div id="tagModal" class="modal">
    <div class="modal-content">
        <h4 style="margin-top:0;">🏷️ 標籤設定</h4>
        <p style="text-align:left; font-size:0.8em; margin:5px 0; color:#dc3545; font-weight:bold;">【第一組：手動設定時間】</p>
        <input type="time" id="exactTimeInput" onchange="toggleExactTime(this)" style="padding: 10px; font-size: 1.2em; border-radius: 8px; border: 1px solid #ccc; width: 100%; box-sizing: border-box; margin-bottom: 15px; text-align: center;">

        <div class="tag-grid">
            <button class="tag-btn tag-live" onclick="toggleGroup2(this)">直播</button>
            
            <button class="tag-btn tag-task" onclick="toggleGroup3(this)">側錄</button>
            <button class="tag-btn tag-task" onclick="toggleGroup3(this)">準連</button>
            <button class="tag-btn tag-task" onclick="toggleGroup3(this)">傳帶</button>

            <button class="tag-btn tag-advance" onclick="toggleGroup4(this, 60, '-1分')">-1分</button>
            <button class="tag-btn tag-advance" onclick="toggleGroup4(this, 120, '-2分')">-2分</button>
            <button class="tag-btn tag-advance" onclick="toggleGroup4(this, 180, '-3分')">-3分</button>
            <button class="tag-btn tag-advance" onclick="toggleGroup4(this, 240, '-4分')">-4分</button>
            <button class="tag-btn tag-advance" onclick="toggleGroup4(this, 300, '-5分')">-5分</button>
            <button class="tag-btn tag-advance" onclick="toggleGroup4(this, 600, '-10分')">-10分</button>
            <div style="grid-column: span 2;"></div> <button class="tag-btn tag-time" onclick="toggleGroup5(this, 14400)">4時</button>
            <button class="tag-btn tag-time" onclick="toggleGroup5(this, 10800)">3時</button>
            <button class="tag-btn tag-time" onclick="toggleGroup5(this, 7200)">2時</button>
            <button class="tag-btn tag-time" onclick="toggleGroup5(this, 3600)">1時</button>
            <button class="tag-btn tag-time" onclick="toggleGroup5(this, 1800)">30分</button>
            <button class="tag-btn tag-time" onclick="toggleGroup5(this, 1200)">20分</button>
            <button class="tag-btn tag-time" onclick="toggleGroup5(this, 600)">10分</button>
            <button class="tag-btn tag-time" onclick="toggleGroup5(this, 300)">5分</button>
        </div>
        <button class="btn-success confirm-btn" onclick="applyTags()">✅ 確定</button>
    </div>
</div>

<div id="vocabModal" class="modal">
    <div class="modal-content">
        <h4>📚 詞彙庫</h4>
        <textarea id="vocab" style="width:100%; height:150px; font-size: 1.2em; padding: 10px; border-radius: 8px;"></textarea>
        <div style="display: flex; justify-content: space-between; gap: 5px; margin-top: 15px;">
            <button class="btn-secondary" style="flex:1;" onclick="document.getElementById('fileInput').click()">📥 匯入</button>
            <input type="file" id="fileInput" accept=".txt" style="display:none">
            <button class="btn-secondary" style="flex:1;" onclick="exportVocab()">📤 匯出</button>
            <button class="btn-success" style="flex:1;" onclick="saveVocab()">💾 儲存</button>
        </div>
        <button class="btn-secondary" onclick="closeVocabModal()" style="width:100%; margin-top:10px; background:#e9ecef; color:#333;">關閉視窗</button>
    </div>
</div>

<script>
    // ==========================================
    const GAS_WEBHOOK_URL = 'https://script.google.com/macros/s/AKfycbz4uOd2-F1fa1xTV3ss9skL9QrWasMQRjD6ZSt6nMwmfN2QSI4D7WbqnnXbzklFxCf8/exec';
    // ==========================================

    let logs = JSON.parse(localStorage.getItem('sng_logs')) || [];
    const logArea = document.getElementById('logArea');
    const vocabBox = document.getElementById('vocab');
    
    let currentIdx = null;
    
    // 🌟 五組獨立狀態變數
    let selGroup2 = null; // 單選
    let selGroup3 = [];   // 多選
    let selGroup4 = [];   // 多選 (滿足規則4)
    let selGroup5 = null; // 單選
    let tempEnd = null;

    if(localStorage.getItem('sng_vocab')) vocabBox.value = localStorage.getItem('sng_vocab');
    function generateTaskId() { return 'T_' + Date.now() + '_' + Math.floor(Math.random() * 1000); }

    function sendToGAS(action, taskId, pureText, fullTitle, triggersData) {
        if (!GAS_WEBHOOK_URL || GAS_WEBHOOK_URL.includes('請把你的')) return;
        
        const payload = { action: action, taskId: taskId };
        if (action === 'set') {
            payload.text = pureText; 
            payload.title = fullTitle; 
            payload.triggersData = triggersData || []; 
        }

        fetch(GAS_WEBHOOK_URL, {
            method: 'POST',
            mode: 'no-cors',
            headers: { 'Content-Type': 'text/plain;charset=utf-8' },
            body: JSON.stringify(payload)
        }).catch(e => console.error('傳送失敗:', e));
    }

    const fileInput = document.getElementById('fileInput');
    fileInput.addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(e) { vocabBox.value = e.target.result; alert("✅ 詞彙匯入成功！"); };
        if(e.target.files[0]) reader.readAsText(e.target.files[0]);
        fileInput.value = ''; 
    });
    function exportVocab() { const blob = new Blob([vocabBox.value], {type:"text/plain"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download="SNG_詞彙庫.txt"; a.click(); }
    function saveVocab() { localStorage.setItem('sng_vocab', vocabBox.value); alert("✅ 詞彙已儲存！"); document.getElementById('vocabModal').style.display='none'; }
    function openVocabModal() { document.getElementById('vocabModal').style.display='block'; }
    function closeVocabModal() { document.getElementById('vocabModal').style.display='none'; }

    setInterval(() => {
        const now = Date.now();
        logs.forEach((log, index) => {
            if (log.timerEnd) {
                const diff = Math.floor((log.timerEnd - now) / 1000);
                let newTimerStr = "時間到";
                if (diff > 0) {
                    const h = Math.floor(diff / 3600), m = Math.floor((diff % 3600) / 60), s = diff % 60;
                    newTimerStr = `${h > 0 ? h + ':' : ''}${m < 10 ? '0' + m : m}:${s < 10 ? '0' + s : s}`;
                }
                if (log.displayTimer !== newTimerStr) {
                    log.displayTimer = newTimerStr;
                    const spanElement = document.getElementById(`timer-span-${index}`);
                    if (spanElement) spanElement.innerText = `⏳ ${newTimerStr}`;
                }
            }
        });
    }, 1000);

    // 【規則 7】第一組和第五組不能共存
    function toggleExactTime(input) {
        if(input.value) {
            document.querySelectorAll('.tag-time').forEach(b => b.classList.remove('selected'));
            selGroup5 = null; // 清除第五組
            
            const [h, m] = input.value.split(':');
            const target = new Date();
            target.setHours(parseInt(h), parseInt(m), 0, 0);
            if(target.getTime() <= Date.now()) target.setDate(target.getDate() + 1); 
            tempEnd = target.getTime();
        } else {
            tempEnd = null;
        }
    }

    // 第二組：直播 (單選)
    function toggleGroup2(btn) {
        const txt = btn.innerText;
        if (selGroup2 === txt) {
            selGroup2 = null;
            btn.classList.remove('selected');
        } else {
            selGroup2 = txt;
            document.querySelectorAll('.tag-live').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
    }

    // 第三組：側錄/準連/傳帶 (多選)
    function toggleGroup3(btn) {
        const txt = btn.innerText;
        if (selGroup3.includes(txt)) {
            selGroup3 = selGroup3.filter(t => t !== txt);
            btn.classList.remove('selected');
        } else {
            selGroup3.push(txt);
            btn.classList.add('selected');
        }
    }

    // 第四組：-1分 ~ -10分 (多選，滿足規則4)
    function toggleGroup4(btn, sec, text) {
        if (selGroup4.some(a => a.text === text)) {
            selGroup4 = selGroup4.filter(a => a.text !== text);
            btn.classList.remove('selected');
        } else {
            selGroup4.push({ sec: sec, text: text });
            btn.classList.add('selected');
        }
    }

    // 【規則 7】第五組：倒數時間 (單選，且清除第一組)
    function toggleGroup5(btn, sec) {
        const txt = btn.innerText;
        document.getElementById('exactTimeInput').value = ''; // 清除第一組

        if (selGroup5 === txt) {
            selGroup5 = null;
            tempEnd = null;
            btn.classList.remove('selected');
        } else {
            selGroup5 = txt;
            tempEnd = Date.now() + (sec * 1000);
            document.querySelectorAll('.tag-time').forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }
    }

    function openTagModal(i) {
        currentIdx = i;
        const logTags = logs[i].tags || [];
        
        // 解析舊標籤還原狀態
        selGroup2 = logTags.find(t => t === '直播') || null;
        selGroup3 = logTags.filter(t => ['側錄','準連','傳帶'].includes(t));
        
        selGroup4 = [];
        logTags.filter(t => t.startsWith('-')).forEach(t => {
            let s = 0;
            if (t==='-1分') s=60; else if (t==='-2分') s=120; else if (t==='-3分') s=180; else if (t==='-4分') s=240; else if (t==='-5分') s=300; else if (t==='-10分') s=600;
            if (s>0) selGroup4.push({ sec: s, text: t });
        });
        
        selGroup5 = logTags.find(t => !t.startsWith('-') && !t.includes(':') && (t.includes('時') || t.includes('分'))) || null;
        const exactMatch = logTags.find(t => t.match(/^\d{2}:\d{2}$/));
        
        tempEnd = logs[i].timerEnd;
        document.getElementById('exactTimeInput').value = exactMatch ? exactMatch : '';

        // 【規則 2】檢查是否時間已到
        const isExpired = tempEnd && tempEnd < Date.now();

        document.querySelectorAll('.tag-btn').forEach(btn => {
            const txt = btn.innerText;
            if (txt === '直播') {
                btn.classList.toggle('selected', txt === selGroup2);
            } else if (['側錄','準連','傳帶'].includes(txt)) {
                btn.classList.toggle('selected', selGroup3.includes(txt));
                btn.disabled = isExpired; // 鎖定
            } else if (txt.startsWith('-')) {
                btn.classList.toggle('selected', selGroup4.some(a => a.text === txt));
                btn.disabled = isExpired; // 鎖定
            } else {
                btn.classList.toggle('selected', txt === selGroup5);
            }
        });
        document.getElementById('tagModal').style.display = 'block';
    }

    function applyTags() {
        const wasTicking = !!logs[currentIdx].timerEnd;

        const exactVal = document.getElementById('exactTimeInput').value;
        const timeTag = exactVal ? exactVal : selGroup5; // 取第一組或第五組

        selGroup4.sort((a,b) => b.sec - a.sec);
        const advTexts = selGroup4.map(a => a.text);
        
        logs[currentIdx].tags = [selGroup2, ...selGroup3, timeTag, ...advTexts].filter(t => t);
        logs[currentIdx].timerEnd = tempEnd;
        logs[currentIdx].advances = [...selGroup4]; 
        
        document.getElementById('tagModal').style.display = 'none';
        saveLogs();

        const taskName = logs[currentIdx].tags.join(' ');
        const pureText = logs[currentIdx].text;
        const fullTitle = `[${taskName}] ${pureText}`;

        if (tempEnd) {
            let baseDelay = tempEnd - Date.now(); 
            if (baseDelay > 0) {
                let triggersData = [];
                selGroup4.forEach(adv => {
                    let advDelay = baseDelay - (adv.sec * 1000);
                    // 【規則 3】負的時間無動作（過濾掉已經發生的時間）
                    if (advDelay > 0) triggersData.push({ delayMs: advDelay, label: `[${adv.text}]` });
                });
                triggersData.push({ delayMs: baseDelay, label: "" });
                sendToGAS('set', logs[currentIdx].taskId, pureText, fullTitle, triggersData);
            }
        } else if (!tempEnd && logs[currentIdx].tags.length > 0) {
            // 【規則 5】沒有設定時間但有標籤，不倒數不響TG，但寫入試算表
            sendToGAS('set', logs[currentIdx].taskId, pureText, fullTitle, []);
        } else if (wasTicking && !tempEnd) {
            sendToGAS('cancel_timer', logs[currentIdx].taskId);
        }
    }

    function openTimerEdit(i) { 
        currentIdx = i; 
        const d = logs[i].timerEnd ? new Date(logs[i].timerEnd) : new Date();
        const hh = String(d.getHours()).padStart(2, '0');
        const mm = String(d.getMinutes()).padStart(2, '0');
        document.getElementById('editExactTimeInput').value = `${hh}:${mm}`;
        document.getElementById('timerEditModal').style.display = 'block'; 
    }
    
    // 【規則 6】修改時間標籤替換
    function updateTimerValue() {
        const timeVal = document.getElementById('editExactTimeInput').value;
        if (timeVal) {
            const [h, m] = timeVal.split(':');
            const target = new Date();
            target.setHours(parseInt(h), parseInt(m), 0, 0);
            if(target.getTime() <= Date.now()) target.setDate(target.getDate() + 1); 
            
            logs[currentIdx].timerEnd = target.getTime();
            
            // 刪除舊的時間標籤 (30分、2時 或舊手動時間)，並加入新手動時間標籤
            logs[currentIdx].tags = logs[currentIdx].tags.filter(t => 
                t === '直播' || 
                ['側錄','準連','傳帶'].includes(t) || 
                t.startsWith('-')
            );
            logs[currentIdx].tags.push(timeVal);
            saveLogs();

            let baseDelay = target.getTime() - Date.now();
            if(baseDelay > 0) {
                let triggersData = [];
                let currentAdvances = logs[currentIdx].advances || [];
                currentAdvances.forEach(adv => {
                    let advDelay = baseDelay - (adv.sec * 1000);
                    // 【規則 3】過濾負的時間
                    if (advDelay > 0) triggersData.push({ delayMs: advDelay, label: `[${adv.text}]` });
                });
                triggersData.push({ delayMs: baseDelay, label: "" });

                const taskName = logs[currentIdx].tags.join(' ');
                const pureText = logs[currentIdx].text;
                const fullTitle = `[${taskName}] ${pureText}`;
                sendToGAS('set', logs[currentIdx].taskId, pureText, fullTitle, triggersData);
            }
        }
        closeTimerModal();
    }
    
    function stopTimer() { 
        if (logs[currentIdx].timerEnd) sendToGAS('cancel_timer', logs[currentIdx].taskId); 
        logs[currentIdx].timerEnd = null; 
        logs[currentIdx].displayTimer = null; 
        
        // 移除時間與提前標籤
        logs[currentIdx].tags = logs[currentIdx].tags.filter(t => 
            t === '直播' || ['側錄','準連','傳帶'].includes(t)
        );
        logs[currentIdx].advances = [];

        saveLogs(); 
        closeTimerModal(); 
    }
    
    function closeTimerModal() { document.getElementById('timerEditModal').style.display = 'none'; }

    function addManualLog() {
        logs.push({ taskId: generateTaskId(), time: new Date().toLocaleTimeString('zh-TW', {hour12:false}), text: "", tags: [], timerEnd: null, advances: [], checked: false, isEditing: true });
        saveLogs();
        setTimeout(() => {
            const newIndex = logs.length - 1;
            const inputField = document.getElementById(`edit-${newIndex}`);
            if(inputField) inputField.focus();
        }, 100);
    }

    function deleteSelectedLogs() {
        const hasSelected = logs.some(l => l.checked);
        if (!hasSelected) { alert('請先勾選要刪除紀錄！'); return; }
        if (confirm('確定要刪除勾選紀錄嗎？')) { 
            logs.filter(l => l.checked && l.timerEnd).forEach(l => {
                sendToGAS('delete_task', l.taskId);
            });
            logs = logs.filter(l => !l.checked); 
            saveLogs(); 
        }
    }

    function renderLogs() {
        logArea.innerHTML = '';
        [...logs].reverse().forEach((log, revIdx) => {
            const i = logs.length - 1 - revIdx;
            const item = document.createElement('div');
            item.className = `log-item ${log.checked ? 'selected' : ''}`;
            
            const tags = (log.tags || []).map(t => {
                let cls = 'badge-time';
                if (t === '直播') cls = 'badge-live';
                else if (['側錄','準連','傳帶'].includes(t)) cls = 'badge-task';
                else if (t.startsWith('-')) cls = 'badge-advance';
                return `<span class="badge ${cls}">${t}</span>`;
            }).join('');
            
            const timer = log.displayTimer ? `<span class="log-timer" id="timer-span-${i}" onclick="openTimerEdit(${i})">⏳ ${log.displayTimer}</span>` : '';
            
            if (log.isEditing) {
                item.innerHTML = `<div style="width:100%; display:flex; gap:10px;">
                    <input type="text" id="edit-${i}" class="log-text" style="flex-grow:1; padding:10px; border:2px solid #007bff; border-radius:5px; font-size:1.2em;" value="${log.text}">
                    <button class="btn-success" style="padding:10px 15px;" onclick="saveEdit(${i})">💾 儲存</button>
                </div>`;
            } else {
                item.innerHTML = `
                    <input type="checkbox" class="log-checkbox" onchange="toggleCheck(${i})" ${log.checked ? 'checked' : ''}>
                    <div class="log-content">
                        <div class="log-header"><span class="log-time">${log.time}</span>${timer}</div>
                        <div class="log-text" onclick="toggleCheck(${i})">${log.text}${tags}</div>
                    </div>
                    <div class="log-actions">
                        <button class="icon-btn" onclick="openTagModal(${i})">🏷️</button>
                        <button class="icon-btn" onclick="editLog(${i})">✏️</button>
                    </div>`;
            }
            logArea.appendChild(item);
        });
    }

    function saveLogs() { localStorage.setItem('sng_logs', JSON.stringify(logs)); renderLogs(); }
    function toggleCheck(i) { logs[i].checked = !logs[i].checked; saveLogs(); }
    function selectAll() { const all = logs.every(l => l.checked); logs.forEach(l => l.checked = !all); saveLogs(); }
    function editLog(i) { logs[i].isEditing = true; renderLogs(); }
    function saveEdit(i) { logs[i].text = document.getElementById(`edit-${i}`).value; logs[i].isEditing = false; saveLogs(); }
    
    function copySelected() { const sel = logs.filter(l => l.checked); if(sel.length) navigator.clipboard.writeText(sel.map(l => `${l.text} ${(l.tags||[]).join(' ')}`).join('\n')).then(()=>alert("複製成功")); }
    function shareSelected() { const sel = logs.filter(l => l.checked); if(sel.length && navigator.share) navigator.share({text: sel.map(l => `${l.text} ${(l.tags||[]).join(' ')}`).join('\n')}); }
    function exportSelected() { const sel = logs.filter(l => l.checked); if(!sel.length) return; const text = sel.map(l => `${l.text} ${(l.tags||[]).join(' ')}`).join('\n'); const blob = new Blob([text], {type:"text/plain"}); const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download=`SNG_${Date.now()}.txt`; a.click(); }

    let rec, isRec = false, curTxt = "", timerObj = null;
    if ('webkitSpeechRecognition' in window) {
        rec = new webkitSpeechRecognition();
        rec.continuous = true; rec.interimResults = true; rec.lang = 'zh-TW';
        rec.onresult = (e) => {
            let finalTranscript = ''; let interimTranscript = '';
            for (let i = 0; i < e.results.length; ++i) { if (e.results[i].isFinal) { finalTranscript += e.results[i][0].transcript; } else { interimTranscript += e.results[i][0].transcript; } }
            curTxt = finalTranscript;
            document.getElementById('livePreview').innerText = "🗣️ " + (finalTranscript + interimTranscript || "聽寫中...");
        };
        rec.onend = () => {
            isRec = false; clearTimeout(timerObj); document.getElementById('toggleBtn').classList.remove('active'); document.getElementById('toggleBtn').innerText = '🎤 點擊開始錄音';
            if(!curTxt.trim()) return;
            logs.push({ taskId: generateTaskId(), time: new Date().toLocaleTimeString('zh-TW',{hour12:false}), text: applyDict(curTxt.trim()), tags: [], timerEnd: null, advances: [], checked: false, isEditing: false });
            curTxt = ""; saveLogs();
        };
    }

    document.getElementById('toggleBtn').onclick = () => {
        if(!isRec) { 
            curTxt = ""; rec.start(); isRec = true; document.getElementById('toggleBtn').classList.add('active'); 
            const sec = parseInt(document.getElementById('recordTimerSelect').value);
            if (sec > 0) { document.getElementById('toggleBtn').innerText = `🔴 錄音中 (${sec/1000}秒)...`; timerObj = setTimeout(() => rec.stop(), sec); } 
            else { document.getElementById('toggleBtn').innerText = `🔴 錄音中...`; }
        } else { clearTimeout(timerObj); rec.stop(); }
    };

    function applyDict(txt) {
        let dict = {};
        vocabBox.value.split(/[,，\n]+/).forEach(v => {
            if(v.includes('=')) { let [keys, val] = v.split('='); keys.split('/').forEach(k => { if(k.trim()) dict[k.trim()] = val.trim(); }); } 
            else if(v.trim()) dict[v.trim()] = v.trim();
        });
        Object.keys(dict).sort((a,b) => b.length - a.length).forEach(k => { txt = txt.split(k).join(dict[k]); });
        return txt;
    }

    renderLogs();
</script>
</body>
</html>
