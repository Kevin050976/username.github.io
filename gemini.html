<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 聯網助理 (Gemini 內建搜尋)</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; max-width: 800px; margin: 20px auto; padding: 20px; background: #f0f2f5; color: #333; }
        .card { background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .input-group { margin-bottom: 15px; }
        .input-group label { display: block; font-size: 0.85em; color: #666; margin-bottom: 5px; font-weight: bold; }
        input[type="password"], textarea { width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; font-size: 1em; }
        input[type="password"]:focus, textarea:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.25); }
        .btn-group { display: flex; gap: 10px; margin-bottom: 15px; }
        button { background: #007bff; color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        button:hover { background: #0056b3; }
        button.secondary { background: #6c757d; }
        button.secondary:hover { background: #5a6268; }
        #chatbox { height: 400px; overflow-y: auto; border: 1px solid #eee; padding: 15px; margin-bottom: 15px; background: #fafafa; border-radius: 8px; font-size: 0.95em; line-height: 1.5; white-space: pre-wrap; }
        .status { color: #007bff; font-size: 0.9em; font-weight: bold; margin-bottom: 10px; min-height: 1.2em; }
        .system-msg { color: #888; font-style: italic; }
    </style>
</head>
<body>

<div class="card">
    <h2 style="margin-top: 0;">🤖 專屬 AI 聯網助理 (Gemini 引擎)</h2>
    
    <div class="input-group">
        <label for="geminiKey">Gemini API Key (免費申請，輸入會變成 ***)</label>
        <input type="password" id="geminiKey" placeholder="AIzaSy...">
    </div>

    <div class="btn-group">
        <button class="secondary" onclick="clearKeys()">🗑️ 清除記憶的 Key</button>
        <button class="secondary" onclick="clearChat()">🧹 清除對話紀錄</button>
    </div>

    <div id="status" class="status"></div>
    <div id="chatbox"><span class="system-msg">系統：請輸入 Gemini API Key 並開始對話。支援自動 Google 搜尋！</span>\n</div>
    
    <textarea id="userInput" rows="3" placeholder="請輸入您的問題 (例如: 幫我找一下今天台灣的新聞或是金價)..."></textarea>
    <button onclick="askAI()" style="width: 100%; padding: 15px; font-size: 1.1em;">🚀 送出問題</button>
</div>

<script>
    // --- 網頁載入與密碼記憶邏輯 ---
    window.onload = function() {
        const savedGemini = localStorage.getItem('geminiKey');
        if (savedGemini) document.getElementById('geminiKey').value = savedGemini;
    };

    function saveKeys() {
        const gemini = document.getElementById('geminiKey').value.trim();
        if (gemini) localStorage.setItem('geminiKey', gemini);
    }

    function clearKeys() {
        localStorage.removeItem('geminiKey');
        document.getElementById('geminiKey').value = '';
        updateStatus("API 金鑰已從瀏覽器清除。");
    }

    // --- Gemini 的對話格式跟 Groq 不同，角色分為 user 和 model ---
    let conversationHistory = [];

    // 取得現在時間，偷偷塞給模型，解決日期錯亂的問題
    function getSystemInstruction() {
        const now = new Date().toLocaleString('zh-TW');
        return `你是一個專業的助理。現在的台灣時間是 ${now}。請務必使用繁體中文回答。遇到需要最新資訊的問題，你會自動使用 Google 搜尋工具。`;
    }

    function clearChat() {
        document.getElementById('chatbox').innerHTML = '<span class="system-msg">系統：對話已重置。</span>\n';
        conversationHistory = [];
        updateStatus("對話紀錄已清除。");
    }

    function updateStatus(text) {
        document.getElementById('status').innerText = text;
    }

    function updateChatbox(htmlMessage) {
        const chatbox = document.getElementById('chatbox');
        chatbox.innerHTML += htmlMessage;
        chatbox.scrollTop = chatbox.scrollHeight;
    }

    // --- 核心問答邏輯 (極簡版) ---
    async function askAI() {
        const geminiKey = document.getElementById('geminiKey').value.trim();
        const userInputBox = document.getElementById('userInput');
        const userInput = userInputBox.value.trim();

        if (!geminiKey || !userInput) return alert("請填寫 Gemini API Key 與問題");
        saveKeys(); 

        updateChatbox(`\n👤 **你:** ${userInput}\n`);
        userInputBox.value = ""; 
        updateStatus("Gemini 思考與搜尋中...");

        // 將用戶訊息加入歷史紀錄 (Gemini 格式)
        conversationHistory.push({ role: "user", parts: [{ text: userInput }] });

        try {
            // 構建傳給 Gemini 的資料
            const requestBody = {
                systemInstruction: { parts: [{ text: getSystemInstruction() }] },
                contents: conversationHistory,
                // 這行就是靈魂！開啟 Gemini 內建的 Google 搜尋功能
                tools: [{ googleSearch: {} }] 
            };

            // 使用最新的 Gemini 2.5 Flash 模型
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${geminiKey}`, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const errorData = await response.json();
                throw new Error(errorData.error?.message || `狀態碼 ${response.status}`);
            }

            const data = await response.json();
            
            if (!data.candidates || data.candidates.length === 0) throw new Error("Gemini 回傳空白結果");
            
            const candidate = data.candidates[0];
            const finalAnswer = candidate.content.parts[0].text;
            
            // 判斷 Gemini 這次有沒有動用 Google 搜尋 (看 metadata 裡有沒有 groundingChunks)
            const usedSearch = candidate.groundingMetadata && 
                               candidate.groundingMetadata.groundingChunks && 
                               candidate.groundingMetadata.groundingChunks.length > 0;

            if (usedSearch) {
                updateChatbox(`🤖 **AI (已連網 Google):**\n${finalAnswer}\n`);
            } else {
                updateChatbox(`🤖 **AI:**\n${finalAnswer}\n`);
            }

            // 將模型的回應存入歷史紀錄，讓它有上下文記憶
            conversationHistory.push({ role: "model", parts: [{ text: finalAnswer }] });

        } catch (e) {
            updateChatbox(`\n❌ **[系統錯誤]:** ${e.message}\n(請確認 API Key 是否正確)\n`);
            conversationHistory.pop(); // 發生錯誤時，移除剛剛加入的問題
        }
        
        updateStatus(""); 
    }
</script>

</body>
</html>
