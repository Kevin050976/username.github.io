<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>YouTube 連續播放控制台</title>
    <style>
        body { 
            margin: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            background-color: #000; 
            color: white; 
            display: flex; 
            flex-direction: column; 
            /* 使用 dvh (動態視口高度) 解決 iOS Safari 底端導航列遮擋問題 */
            height: 100dvh; 
            overflow: hidden; 
        }
        /* 影片播放區塊，鎖定 16:9 比例 */
        #video-wrapper {
            width: 100%;
            aspect-ratio: 16 / 9;
            background: #000;
            flex-shrink: 0;
            z-index: 10;
        }
        iframe { 
            width: 100%; 
            height: 100%; 
            border: none; 
        }
        /* 資訊顯示區塊，可上下捲動 */
        #info-section {
            flex-grow: 1;
            padding: 15px;
            /* 關鍵：預留底部按鈕的高度，確保滑到底時文字不會被按鈕蓋住 */
            padding-bottom: 110px;
            background: #111;
            overflow-y: auto;
        }
        #vid-title {
            margin: 0 0 5px 0;
            font-size: 18px;
            line-height: 1.3;
        }
        #vid-channel {
            margin: 0 0 15px 0;
            font-size: 14px;
            color: #aaa;
        }
        #vid-desc {
            background: #222;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            color: #888;
            line-height: 1.5;
            white-space: pre-wrap;
        }
        /* 底部控制列：強制固定 (Fixed) 在畫面最下方 */
        #controls { 
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            height: 90px; 
            background: #1c1c1e; 
            box-sizing: border-box; /* 確保 padding 不會撐破 100% 寬度 */
            padding: 0 15px;
            padding-bottom: env(safe-area-inset-bottom); 
            gap: 15px; 
            z-index: 100;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.5); /* 加上陰影增加層次感 */
        }
        button { 
            flex: 1; 
            height: 55px; 
            font-size: 18px; 
            font-weight: bold;
            cursor: pointer; 
            border: none; 
            border-radius: 12px; 
            background: #0a84ff; 
            color: white; 
            touch-action: manipulation; 
        }
        button:active { background: #0060d1; }
        button:disabled { 
            background: #3a3a3c; 
            color: #8e8e93;
            cursor: not-allowed; 
        }
        #status { 
            font-size: 15px; 
            font-weight: 500;
            color: #ebebf5;
            white-space: nowrap; 
            text-align: center;
            min-width: 80px;
        }
    </style>
</head>
<body>
    <div id="video-wrapper">
        <iframe id="yt-player" allow="autoplay; fullscreen; picture-in-picture"></iframe>
    </div>
    
    <div id="info-section">
        <h3 id="vid-title">載入影片資訊中...</h3>
        <p id="vid-channel">頻道名稱</p>
        <div id="vid-desc">【系統提示】受到跨網域 (CORS) 限制與免授權 API 限制，純前端靜態網頁無法直接抓取 YouTube 影片內文。如需顯示內文，需另外串接 YouTube Data API v3。</div>
    </div>

    <div id="controls">
        <button id="prev-btn" onclick="changeVideo(-1)">◄ 上一部</button>
        <div id="status">等待中</div>
        <button id="next-btn" onclick="changeVideo(1)">下一部 ►</button>
    </div>

    <script>
        let videoIds = [];
        let currentIndex = 0;

        function init() {
            const urlParams = new URLSearchParams(window.location.search);
            const rawText = urlParams.get('text');

            if (rawText) {
                const rawTextDecoded = decodeURIComponent(rawText);
                
                const regExp = /(?:youtu\.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=|live\/|shorts\/)([a-zA-Z0-9_-]{11})/g;
                const matches = [...rawTextDecoded.matchAll(regExp)];
                videoIds = matches.map(match => match[1]);
                videoIds = [...new Set(videoIds)];

                if (videoIds.length > 0) {
                    loadVideo(0); 
                } else {
                    document.getElementById('status').innerText = '無效網址';
                    document.getElementById('vid-title').innerText = '找不到 YouTube 影片';
                }
            } else {
                document.getElementById('status').innerText = '無輸入';
            }
        }

        function loadVideo(index) {
            if (index < 0 || index >= videoIds.length) return;
            currentIndex = index;
            const currentVideoId = videoIds[currentIndex];
            
            const player = document.getElementById('yt-player');
            player.src = `https://www.youtube.com/embed/${currentVideoId}?autoplay=1&playsinline=1`;
            
            document.getElementById('status').innerText = `${currentIndex + 1} / ${videoIds.length}`;
            document.getElementById('prev-btn').disabled = (currentIndex === 0);
            document.getElementById('next-btn').disabled = (currentIndex === videoIds.length - 1);

            document.getElementById('vid-title').innerText = '載入影片資訊中...';
            document.getElementById('vid-channel').innerText = '';

            fetch(`https://www.youtube.com/oembed?url=https://www.youtube.com/watch?v=${currentVideoId}&format=json`)
                .then(response => response.json())
                .then(data => {
                    document.getElementById('vid-title').innerText = data.title;
                    document.getElementById('vid-channel').innerText = data.author_name;
                })
                .catch(error => {
                    document.getElementById('vid-title').innerText = '無法取得標題 (可能是私人或直播限制)';
                });
        }

        function changeVideo(direction) {
            loadVideo(currentIndex + direction);
        }

        init();
    </script>
</body>
</html>
