<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即時訊息看板 - 櫻花粉</title>
  <style>
    /* 整體背景改成極淺的粉色 */
    body { 
      font-family: "微軟正黑體", sans-serif; 
      padding: 20px; 
      background-color: #fff0f5; 
    }
    .board {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 10px rgba(233, 30, 99, 0.1); /* 粉色系陰影 */
      overflow: hidden;
    }
    
    /* 頂部控制列 */
    .header-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    #clock {
      font-size: 1.8em;
      font-weight: bold;
      color: #d81b60; /* 深粉紅字體 */
      background: white;
      padding: 10px 20px;
      border-radius: 8px;
      box-shadow: 0 2px 4px rgba(233, 30, 99, 0.1);
      letter-spacing: 2px;
    }
    .btn-refresh {
      background-color: #f06292; /* 粉紅按鈕 */
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1em;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 2px 4px rgba(233, 30, 99, 0.2);
      transition: background-color 0.2s;
    }
    .btn-refresh:hover { background-color: #e91e63; } /* 滑鼠經過變深粉紅 */
    .btn-refresh:disabled { background-color: #f8bbd0; cursor: not-allowed; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px; text-align: left; line-height: 1.6; }
    
    /* 標題列：柔和的玫瑰粉 */
    th { background-color: #f48fb1; color: white; font-size: 1.1em; }
    
    /* 偶數列：超淺粉底色，做出層次感 */
    tr:nth-child(even) { background-color: #fffafb; }
    tr { border-bottom: 1px solid #fce4ec; }
    tr:hover { background-color: #fce4ec; } /* 滑鼠整列經過的淺粉高光 */
    
    .time { font-weight: bold; color: #880e4f; white-space: nowrap; font-size: 1.1em; }
    
    /* ✨ 訊息格專屬特效 ✨ */
    .message-cell {
      cursor: pointer; /* 滑鼠移過去會變成手指圖案 */
      transition: all 0.3s ease; /* 變色時會有滑順的漸變效果 */
    }
    .message-cell:hover {
      background-color: #f8bbd0; /* 提示這裡可以點擊 */
    }
  </style>
</head>
<body>

  <div class="header-controls">
    <div id="clock">00:00:00</div>
    <button id="refresh-btn" class="btn-refresh" onclick="loadData()">🔄 手動更新</button>
  </div>

  <div class="board">
    <table>
      <thead>
        <tr>
          <th width="12%">時間</th>
          <th width="23%">發送者</th>
          <th width="65%">訊息內容</th>
        </tr>
      </thead>
      <tbody id="data-body">
        <tr><td colspan="3" style="text-align:center; color:#d81b60;">資料載入中，請稍候...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    // 🔴🔴🔴 請把下面這串換成你的 API 網址 🔴🔴🔴
    const API_URL = "在此貼上你的_WEB_APP_網址";

    // --- 功能一：右上角的時鐘 ---
    function updateClock() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('zh-TW', { hour12: false });
      document.getElementById('clock').innerText = timeString;
    }
    setInterval(updateClock, 1000); 
    updateClock(); 

    // --- 功能二：抓取資料並渲染表格 ---
    function loadData() {
      const btn = document.getElementById('refresh-btn');
      btn.innerText = "⏳ 更新中...";
      btn.disabled = true;

      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('data-body');
          tbody.innerHTML = ''; 

          for(let i = 1; i < data.length; i++) {
            const row = data[i];
            const rawTime = row[0];
            const sender = row[1];
            const message = row[2];

            // 處理時間：保留完整的 時:分:秒 (HH:mm:ss)
            let timeOnly = "";
            if (rawTime) {
              const parts = rawTime.split(' ');
              if(parts.length > 1) {
                timeOnly = parts[1]; // 直接拿走整串時間
              } else {
                timeOnly = rawTime;
              }
            }

            const tr = document.createElement('tr');

            // 1. 時間
            const tdTime = document.createElement('td');
            tdTime.className = 'time';
            tdTime.innerText = timeOnly;

            // 2. 發送者
            const tdSender = document.createElement('td');
            tdSender.innerText = sender;

            // 3. 訊息內容 (點擊複製的魔法在這裡)
            const tdMessage = document.createElement('td');
            tdMessage.className = 'message-cell';
            tdMessage.title = '點擊即可複製這段訊息'; // 滑鼠停留在上面會有小提示
            
            // 將 Line 的換行轉成網頁換行
            const formattedMessage = message.replace(/\n/g, '<br>');
            tdMessage.innerHTML = formattedMessage;
            
            // 綁定點擊事件
            tdMessage.onclick = function() {
              // 執行複製 (保留原本沒被改過換行的 message)
              navigator.clipboard.writeText(message).then(() => {
                
                // 變色並加上提示字
                tdMessage.style.backgroundColor = '#f48fb1'; // 變成深一點的粉色
                tdMessage.style.color = 'white';
                tdMessage.innerHTML = '<strong>✅ 已成功複製！</strong><br><br>' + formattedMessage;
                
                // 1.5 秒後恢復原狀
                setTimeout(() => {
                  tdMessage.style.backgroundColor = ''; 
                  tdMessage.style.color = '';
                  tdMessage.innerHTML = formattedMessage; 
                }, 1500);
              });
            };

            tr.appendChild(tdTime);
            tr.appendChild(tdSender);
            tr.appendChild(tdMessage);
            tbody.appendChild(tr);
          }
        })
        .catch(err => {
          document.getElementById('data-body').innerHTML = '<tr><td colspan="3" style="color:red; text-align:center;">載入失敗，請確認網址是否貼對，或重新整理網頁。</td></tr>';
        })
        .finally(() => {
          btn.innerText = "🔄 手動更新";
          btn.disabled = false;
        });
    }

    // --- 功能三：設定每 60 秒自動更新 ---
    setInterval(loadData, 60000); 
    loadData();

  </script>
</body>
</html>
