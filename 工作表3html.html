<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>即時訊息看板</title>
  <style>
    /* 1. 藍色系主介面 */
    body { 
      font-family: "微軟正黑體", sans-serif; 
      padding: 20px; 
      background-color: #eff6ff; /* 極淺的藍色背景 */
    }
    .board {
      background-color: white;
      border-radius: 8px;
      box-shadow: 0 4px 12px rgba(29, 78, 216, 0.15); /* 藍色系陰影 */
      overflow: hidden;
    }
    
    .header-controls {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 15px;
    }
    #clock {
      font-size: 1.8em;
      font-weight: bold;
      color: #1e3a8a; /* 深藍色時鐘字體 */
      background: white;
      padding: 10px 20px;
      border-radius: 8px;
      box-shadow: 0 2px 4px rgba(29, 78, 216, 0.1);
      letter-spacing: 2px;
    }
    .btn-refresh {
      background-color: #2563eb; /* 亮藍色按鈕 */
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1em;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      box-shadow: 0 2px 4px rgba(37, 99, 235, 0.2);
      transition: background-color 0.2s;
    }
    .btn-refresh:hover { background-color: #1d4ed8; } /* 滑鼠經過變深藍 */
    .btn-refresh:disabled { background-color: #93c5fd; cursor: not-allowed; }

    table { width: 100%; border-collapse: collapse; }
    th, td { padding: 15px; text-align: left; line-height: 1.6; }
    
    /* 標題列：沉穩的深藍色 */
    th { background-color: #1e40af; color: white; font-size: 1.1em; }
    
    .time { font-weight: bold; color: #1e3a8a; white-space: nowrap; font-size: 1.1em; }
    
    /* 2. 馬卡龍粉色系 (每一列輪流套用不同的顏色) */
    .row-color-0 { background-color: #ffe4e6; } /* 粉紅 */
    .row-color-0:hover { background-color: #fecdd3; }
    
    .row-color-1 { background-color: #e0f2fe; } /* 粉藍 */
    .row-color-1:hover { background-color: #bae6fd; }
    
    .row-color-2 { background-color: #dcfce7; } /* 粉綠 */
    .row-color-2:hover { background-color: #bbf7d0; }
    
    .row-color-3 { background-color: #fef08a; } /* 粉黃 */
    .row-color-3:hover { background-color: #fde047; }
    
    .row-color-4 { background-color: #f3e8ff; } /* 粉紫 */
    .row-color-4:hover { background-color: #e9d5ff; }

    tr { border-bottom: 1px solid #ffffff; }

    /* 訊息格專屬特效 */
    .message-cell {
      cursor: pointer;
      transition: all 0.2s ease;
    }
    /* 點擊後的變色特效 (統一變成深藍底白字提示) */
    .message-copied {
      background-color: #1e40af !important;
      color: white !important;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <div class="header-controls">
    <div id="clock">00:00:00</div>
    <button id="refresh-btn" class="btn-refresh" onclick="loadData()">🔄 手動更新</button>
  </div>

  <div class="board">
    <table>
      <thead>
        <tr>
          <th width="12%">時間</th>
          <th width="23%">發送者</th>
          <th width="65%">訊息內容</th>
        </tr>
      </thead>
      <tbody id="data-body">
        <tr><td colspan="3" style="text-align:center; color:#1d4ed8;">資料載入中，請稍候...</td></tr>
      </tbody>
    </table>
  </div>

  <script>
    // 🔴🔴🔴 請把下面這串換成你的 API 網址 🔴🔴🔴
    const API_URL = "https://script.google.com/macros/s/AKfycbyJZYfsgqr0CAI-UPpDtG80qmBM_BEXd1n4DXlLJ-9RDk8U26lAUJPNa3ycTLgZ1G3PVA/exec";

    function updateClock() {
      const now = new Date();
      const timeString = now.toLocaleTimeString('zh-TW', { hour12: false });
      document.getElementById('clock').innerText = timeString;
    }
    setInterval(updateClock, 1000); 
    updateClock(); 

    function loadData() {
      const btn = document.getElementById('refresh-btn');
      btn.innerText = "⏳ 更新中...";
      btn.disabled = true;

      fetch(API_URL)
        .then(res => res.json())
        .then(data => {
          const tbody = document.getElementById('data-body');
          tbody.innerHTML = ''; 

          // 用來控制粉色系輪迴的計數器 (排除標題列所以從0開始算)
          let colorIndex = 0;

          for(let i = 1; i < data.length; i++) {
            const row = data[i];
            const rawTime = row[0];
            const sender = row[1];
            const message = row[2];

            // 1. 強制轉換成 24H 格式 (HH:mm:ss) 的超級翻譯機
            let timeOnly = rawTime; // 預設值
            if (rawTime) {
              // 抓取字串裡面的 時間數字
              const match = rawTime.match(/(\d{1,2}):(\d{2})(?::(\d{2}))?/);
              if (match) {
                let h = parseInt(match[1], 10);
                let m = match[2];
                let s = match[3] || "00"; // 如果沒有秒數就補 00
                
                // 判斷是否有下午或 PM
                if ((rawTime.includes('下午') || rawTime.toLowerCase().includes('pm')) && h < 12) {
                  h += 12;
                }
                // 判斷是否有上午或 AM 的 12 點
                if ((rawTime.includes('上午') || rawTime.toLowerCase().includes('am')) && h === 12) {
                  h = 0;
                }
                
                // 組合起來並補零 (例如 9 變成 09)
                timeOnly = h.toString().padStart(2, '0') + ':' + m + ':' + s;
              }
            }

            const tr = document.createElement('tr');
            
            // 替這列套用輪迴的馬卡龍色系 class (0~4)
            tr.className = `row-color-${colorIndex % 5}`;
            colorIndex++;

            const tdTime = document.createElement('td');
            tdTime.className = 'time';
            tdTime.innerText = timeOnly;

            const tdSender = document.createElement('td');
            tdSender.innerText = sender;

            const tdMessage = document.createElement('td');
            tdMessage.className = 'message-cell';
            tdMessage.title = '點擊即可複製這段訊息';
            
            const formattedMessage = message.replace(/\n/g, '<br>');
            tdMessage.innerHTML = formattedMessage;
            
            tdMessage.onclick = function() {
              navigator.clipboard.writeText(message).then(() => {
                // 加上深藍色變色特效
                tdMessage.classList.add('message-copied');
                tdMessage.innerHTML = '✅ 已成功複製！<br><br>' + formattedMessage;
                
                setTimeout(() => {
                  tdMessage.classList.remove('message-copied');
                  tdMessage.innerHTML = formattedMessage; 
                }, 1500);
              });
            };

            tr.appendChild(tdTime);
            tr.appendChild(tdSender);
            tr.appendChild(tdMessage);
            tbody.appendChild(tr);
          }
        })
        .catch(err => {
          document.getElementById('data-body').innerHTML = '<tr><td colspan="3" style="color:red; text-align:center;">載入失敗，請確認網址是否貼對，或重新整理網頁。</td></tr>';
        })
        .finally(() => {
          btn.innerText = "🔄 手動更新";
          btn.disabled = false;
        });
    }

    setInterval(loadData, 60000); 
    loadData();

  </script>
</body>
</html>
