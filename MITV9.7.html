<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LINE 直播鬧鐘工具 V9.7 (MIT穩健橋接版)</title>
    <style>
        body{font-family:"Microsoft JhengHei",sans-serif;max-width:500px;margin:20px auto;padding:20px;background:#f4f7f6}
        h2{text-align:center;color:#333;margin-bottom:10px}
        .system-control{background:#fff3cd;border:2px solid #ffeeba;padding:12px;border-radius:8px;margin-bottom:20px;text-align:center}
        .btn-master{background:#e67e22;color:#fff;border:none;padding:10px 15px;border-radius:8px;font-size:15px;font-weight:bold;cursor:pointer;width:100%;transition:.3s;margin-bottom:8px}
        .btn-master.active{background:#27ae60}
        .btn-test-sound{background:#34495e;color:#fff;border:none;padding:6px 12px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:bold}
        .system-hint{font-size:12px;color:#666;margin-top:8px;line-height:1.4}
        .input-group{display:flex;flex-direction:column;gap:10px;margin-bottom:20px}
        .toolbar{display:flex;justify-content:space-between;align-items:center;background:#fff;padding:8px 10px;border-radius:8px;box-shadow:0 2px 4px rgba(0,0,0,.05)}
        .early-box{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:bold;color:#2c3e50}
        .early-val{color:#e74c3c;font-size:16px;width:20px;text-align:center;display:inline-block}
        .btn-early{background:#ecf0f1;border:none;padding:4px 8px;border-radius:4px;cursor:pointer;font-weight:bold;font-size:14px}
        .tool-btns{display:flex;gap:5px}
        .btn-tool{background:#7f8c8d;color:#fff;border:none;padding:6px 10px;border-radius:6px;font-size:13px;cursor:pointer;font-weight:bold}
        textarea{width:100%;height:120px;padding:12px;border:2px solid #ddd;border-radius:8px;font-size:15px;box-sizing:border-box}
        .button-group-row{display:flex;gap:8px;margin-bottom:5px}
        .btn-add{background:#06C755;color:#fff;border:none;cursor:pointer;padding:12px;border-radius:8px;font-size:16px;font-weight:bold;flex:1.5}
        .btn-sync{background:#3498db;color:#fff;border:none;cursor:pointer;padding:12px;border-radius:8px;font-size:16px;font-weight:bold;flex:1.5}
        .btn-share{background:#27ae60;color:#fff;border:none;cursor:pointer;padding:10px;border-radius:8px;font-size:15px;font-weight:bold;flex:1}
        .btn-sort{background:#3498db;color:#fff;border:none;cursor:pointer;padding:10px;border-radius:8px;font-size:14px;font-weight:bold;flex:1}
        .btn-io{background:#9b59b6;color:#fff;border:none;padding:10px;border-radius:8px;font-size:14px;font-weight:bold;flex:1}
        .btn-danger{background:#e74c3c;color:#fff;border:none;cursor:pointer;padding:10px;border-radius:8px;font-size:14px;font-weight:bold;flex:1}
        .date-header{background:#2c3e50;color:#fff;padding:4px 12px;border-radius:6px;margin-top:15px;margin-bottom:8px;font-size:14px;font-weight:bold;display:inline-block}
        .alarm-list{list-style:none;padding:0;margin:0}
        .alarm-item{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;margin-bottom:12px;border-radius:12px;box-shadow:0 4px 6px rgba(0,0,0,.05);transition:background-color .3s;gap:10px}
        .batch-cb{transform:scale(1.6);margin-right:8px;cursor:pointer;flex-shrink:0;accent-color:#3498db}
        .alarm-info{display:flex;flex-direction:column;gap:6px;flex:1;min-width:0}
        .title-wrapper{display:flex;align-items:center;gap:4px;width:100%}
        .alarm-title{font-size:15px;font-weight:bold;color:#2c3e50;cursor:pointer;text-decoration:underline;text-underline-offset:4px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;text-overflow:ellipsis;word-break:break-all;flex:1}
        .time-control{display:flex;align-items:center;gap:4px}
        .btn-edit-trigger{background:none;border:none;font-size:16px;cursor:pointer;padding:4px;opacity:.8;flex-shrink:0}
        .btn-edit-trigger:hover{opacity:1;transform:scale(1.1)}
        .time-text{color:#e74c3c;font-size:18px;font-weight:bold;width:45px;text-align:center;flex-shrink:0}
        .btn-time-step{background:rgba(255,255,255,.6);border:1px solid #ccc;width:28px;height:28px;border-radius:6px;font-size:16px;font-weight:bold;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
        .alarm-controls{display:flex;align-items:center;gap:10px;flex-shrink:0}
        .nearest-timer{color:#c0392b;font-size:26px;font-weight:900;width:95px;text-align:right;line-height:1;flex-shrink:0}
        .btn-delete{background:none;border:none;color:#7f8c8d;font-size:14px;padding:4px;cursor:pointer;opacity:.8;flex-shrink:0}
        .btn-delete:hover{color:#e74c3c;opacity:1}
        .switch{position:relative;display:inline-block;width:22px;height:40px;flex-shrink:0}
        .switch input{opacity:0;width:0;height:0}
        .slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;transition:.4s;border-radius:22px}
        .slider:before{position:absolute;content:"";height:16px;width:16px;left:3px;bottom:3px;background:#fff;transition:.4s;border-radius:50%}
        input:checked+.slider{background:#06C755}
        input:checked+.slider:before{transform:translateY(-18px)}
        .modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:1000}
        .modal-content{background:#fff;padding:25px;border-radius:15px;text-align:center;width:85%;max-width:350px;box-shadow:0 10px 25px rgba(0,0,0,.5);display:flex;flex-direction:column;max-height:85vh;overflow-y:auto}
        .modal-title{font-size:20px;font-weight:bold;margin-bottom:15px;margin-top:0}
        .modal-input{padding:12px;border-radius:8px;border:2px solid #ddd;font-size:18px;margin-bottom:20px;text-align:center;width:100%;box-sizing:border-box}
        .modal-msg{margin-bottom:20px;line-height:1.5;font-size:16px;white-space:pre-line}
        .end-alarm-box{background:#fff3cd;border:1px solid #ffeeba;padding:12px;border-radius:8px;margin-bottom:15px;display:flex;align-items:center;justify-content:center;gap:8px}
        .end-alarm-box input[type="time"]{padding:6px;border-radius:6px;border:1px solid #ccc;font-size:16px;width:110px}
        .btn-end-alarm{background:#e67e22;color:#fff;border:none;padding:8px 12px;border-radius:6px;font-size:15px;font-weight:bold;cursor:pointer}
        .raw-data-text{font-size:15px;color:#333;background:#f9f9f9;padding:12px;border-radius:8px;border:1px solid #eee;text-align:left;overflow-y:auto;margin-bottom:20px;flex-grow:1;word-break:break-all}
        .modal-buttons{display:flex;gap:10px;margin-top:auto}
        .btn-modal{padding:12px;border-radius:8px;border:none;font-weight:bold;flex:1;cursor:pointer}
        .btn-cancel{background:#eee;color:#666}
        .btn-confirm{background:#3498db;color:#fff}
        .btn-alarm-stop{background:#e74c3c;color:#fff;font-size:18px}
        #loadingOverlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,.85);display:none;flex-direction:column;justify-content:center;align-items:center;z-index:2000;font-size:18px;font-weight:bold;color:#333}
        .spinner{border:5px solid #f3f3f3;border-top:5px solid #3498db;border-radius:50%;width:40px;height:40px;animation:spin 1s linear infinite;margin-bottom:15px}
        @keyframes spin{0%{transform:rotate(0deg)}100%{transform:rotate(360deg)}}
        .btn-weekday{background:#9b59b6;color:#fff;border:none;padding:12px;border-radius:8px;font-size:16px;font-weight:bold;cursor:pointer;width:100%;margin-bottom:8px}
    </style>
</head>
<body onclick="ensureAudioInit()">

    <div id="loadingOverlay">
        <div class="spinner"></div>
        <div id="loadingText">⏳ 正在同步雲端班表...</div>
    </div>

    <audio id="silentAudio" loop src="data:audio/wav;base64,UklGRigAAABXQVZFZm10IBIAAAABAAEARKwAAIhYAQACABAAAABkYXRhAgAAAAEA"></audio>

    <h2>直播鬧鐘設定 ⏰ (V7.6)</h2>
    
    <div class="system-control">
        <button id="masterBtn" class="btn-master" onclick="toggleSystem()">
            1. 點擊啟動防熄屏與背景鬧鐘
        </button><br>
        <button class="btn-test-sound" onclick="testSound()">🎵 測試鈴聲</button>
        <p class="system-hint">💡 跨日後，昨日鬧鐘會自動刪除清空版面。</p>
    </div>
    
    <div class="input-group">
        <div class="toolbar">
            <div class="early-box">
                提早 
                <button class="btn-early" onclick="adjustEarly(-1)">-</button>
                <span class="early-val" id="earlyMinsText">0</span> 分
                <button class="btn-early" onclick="adjustEarly(1)">+</button>
            </div>
            <div class="tool-btns">
                <button class="btn-tool" onclick="pasteFromClipboard()">📋 貼上</button>
                <button class="btn-tool" onclick="wrapBrackets()">➕ 加【 】</button>
            </div>
        </div>
        <textarea id="inputText" placeholder="請在此貼上內容... (支援多行貼上)"></textarea>
        
        <div class="button-group-row">
            <button class="btn-add" onclick="parseAndAdd()">擷取並新增</button>
            <button class="btn-sync" onclick="loadFromCloud(true)">🔄 強制刷新</button>
        </div>
        <div class="button-group-row" style="background:#ecf0f1; padding:8px; border-radius:8px;">
            <button class="btn-tool" style="flex:1;" onclick="selectAll(true)">☑️ 全選</button>
            <button class="btn-tool" style="flex:1;" onclick="selectAll(false)">☐ 清除</button>
            <button class="btn-share" style="flex:2;" onclick="shareSelected()">🚀 複製已選</button>
        </div>
        <div class="button-group-row">
            <button class="btn-sort" id="sortBtn" onclick="toggleSortMode()">依時間排序</button>
            <button class="btn-io" onclick="showImportModal()">📥 匯入</button>
            <button class="btn-danger" onclick="confirmBatchDelete()">🗑️ 刪除</button>
        </div>
    </div>

    <div id="alarmListContainer"></div>

    <div id="importModal" class="modal-overlay">
        <div class="modal-content">
            <h3 class="modal-title">📥 從雲端匯入預設班表</h3>
            <p style="margin-bottom: 15px; font-size:14px; color:#666;">選擇要匯入的星期：</p>
            <button class="btn-weekday" style="background:#3498db;" onclick="fetchTemplate(1)">星期一</button>
            <button class="btn-weekday" style="background:#3498db;" onclick="fetchTemplate(2)">星期二</button>
            <button class="btn-weekday" style="background:#3498db;" onclick="fetchTemplate(3)">星期三</button>
            <button class="btn-weekday" style="background:#3498db;" onclick="fetchTemplate(4)">星期四</button>
            <button class="btn-weekday" style="background:#3498db;" onclick="fetchTemplate(5)">星期五</button>
            <button class="btn-weekday" style="background:#3498db;" onclick="fetchTemplate(6)">星期六</button>
            <button class="btn-weekday" style="background:#e74c3c;" onclick="fetchTemplate(7)">星期日</button>
            <div class="modal-buttons" style="margin-top: 15px;">
                <button class="btn-modal btn-cancel" onclick="closeModal('importModal')">取消</button>
            </div>
        </div>
    </div>

    <div id="infoModal" class="modal-overlay"><div class="modal-content"><h3 class="modal-title" style="color: #2980b9;">📄 完整資訊</h3><div class="end-alarm-box"><span style="font-weight:bold; color:#d35400;">結束鬧鐘</span><input type="time" id="endAlarmTimeInput"><button class="btn-end-alarm" onclick="createEndAlarm()">新增</button></div><div class="raw-data-text" id="infoModalText"></div><button class="btn-modal btn-confirm" onclick="closeModal('infoModal')">關閉</button></div></div>
    <div id="promptModal" class="modal-overlay"><div class="modal-content"><h3 class="modal-title" id="promptTitle">修改資料</h3><input type="text" id="promptInput" class="modal-input"><div class="modal-buttons"><button class="btn-modal btn-cancel" onclick="closeModal('promptModal')">取消</button><button class="btn-modal btn-confirm" id="promptConfirmBtn">確定</button></div></div></div>
    <div id="msgModal" class="modal-overlay"><div class="modal-content"><h3 class="modal-title">提示</h3><div id="msgModalContent" class="modal-msg" style="white-space: pre-line;"></div><button class="btn-modal btn-confirm" onclick="closeModal('msgModal')">我知道了</button></div></div>
    <div id="confirmAllModal" class="modal-overlay"><div class="modal-content"><h3 class="modal-title" id="batchDeleteTitle" style="color:#e74c3c;">⚠️ 刪除確認</h3><p style="margin-bottom:20px;" id="batchDeleteMsg"></p><div class="modal-buttons"><button class="btn-modal btn-cancel" onclick="closeModal('confirmAllModal')">取消</button><button class="btn-modal btn-confirm" style="background:#e74c3c;" onclick="executeBatchDelete()">確定刪除</button></div></div></div>
    <div id="confirmSingleModal" class="modal-overlay"><div class="modal-content"><h3 class="modal-title" style="color:#e74c3c;">⚠️ 確認刪除</h3><p style="margin-bottom:20px;" id="deleteSingleMsg"></p><div class="modal-buttons"><button class="btn-modal btn-cancel" onclick="closeModal('confirmSingleModal')">取消</button><button class="btn-modal btn-confirm" style="background:#e74c3c;" onclick="executeDeleteSingle()">確定刪除</button></div></div></div>
    <div id="alarmModal" class="modal-overlay"><div class="modal-content"><h3 class="modal-title" style="color: #e74c3c;">⏰ 鬧鐘響了！</h3><div id="alarmModalText" style="margin-bottom:20px; line-height:1.5;"></div><button class="btn-modal btn-alarm-stop" onclick="stopAlarm()">關閉鬧鐘</button></div></div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbxcC4qPLGSXcJvA624tcMj5ALANtkifXF4GIPq6r3caDtiEydpjtMCh6yz-IfmjjBHD/exec";

        let audioCtx, wakeLock = null, alarmInterval;
        let isSystemActive = false, alarms = [], sortMode = 0; 
        let currentEditingId = null, singleDeleteId = null, idCounter = 0, lastCheckedDateMD = null; 
        const sortLabels = ["依時間+組別排序", "依時間排序"];

        window.onload = function() {
            lastCheckedDateMD = getTodayMD();
            loadFromCloud(false);
        };

        // ☁️ 讀取今日鬧鐘 (A1儲存格)
        async function loadFromCloud(isManual) {
            if (API_URL.includes("請在這裡貼上")) {
                if (isManual) showMessage("⚠️ 請先填寫 Google API 網址！");
                loadLocalFallback(); return;
            }
            
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            document.getElementById('loadingText').innerText = "⏳ 正在同步雲端進度...";

            try {
                // 加上 ?action=loadCurrent 去拿 A1 的資料
                const response = await fetch(API_URL + "?action=loadCurrent");
                const dataStr = await response.text();
                const parsed = JSON.parse(dataStr);
                
                if (parsed.alarms && parsed.alarms.length > 0) {
                    alarms = parsed.alarms;
                    alarms.forEach(a => { if (a.selected === undefined) a.selected = false; });
                }
                if (parsed.sortMode !== undefined) sortMode = parseInt(parsed.sortMode);
                
                localStorage.setItem('lineAlarmsData_v7', JSON.stringify(alarms));
                localStorage.setItem('lineAlarmsSortMode_v7', sortMode);
                
                if (isManual) {
                    document.getElementById('loadingText').innerText = "✅ 雲端同步完成！";
                    await new Promise(r => setTimeout(r, 800));
                }
            } catch (error) {
                console.error("雲端讀取失敗", error);
                document.getElementById('loadingText').innerText = "⚠️ 網路異常，載入本地備份...";
                await new Promise(r => setTimeout(r, 1000));
                loadLocalFallback();
            }
            overlay.style.display = 'none';
            document.getElementById('sortBtn').innerText = sortLabels[sortMode];
            checkAndHandleDayCrossing(); 
            renderAlarms();
        }

        function loadLocalFallback() {
            const savedAlarms = localStorage.getItem('lineAlarmsData_v7');
            if (savedAlarms) { try { alarms = JSON.parse(savedAlarms); } catch(e){} }
            const savedSort = localStorage.getItem('lineAlarmsSortMode_v7');
            if (savedSort !== null) sortMode = parseInt(savedSort);
        }

        // ==========================================
        // 🚨 這是本次【唯一修改】的地方 🚨
        // 把原本被擋掉的 fetch POST，改成丟給 MIT
        // ==========================================
        function save() {
            const dataToSave = { alarms: alarms, sortMode: sortMode };
            const dataStr = JSON.stringify(dataToSave);
            
            localStorage.setItem('lineAlarmsData_v7', JSON.stringify(alarms));
            localStorage.setItem('lineAlarmsSortMode_v7', sortMode);

            if (window.AppInventor) {
                window.AppInventor.setWebViewString(dataStr);
            }
        }

        function showImportModal() {
            document.getElementById('importModal').style.display = 'flex';
        }

        async function fetchTemplate(dayIndex) {
            if (API_URL.includes("請在這裡貼上")) { showMessage("⚠️ 請先填寫 Google API 網址！"); return; }
            closeModal('importModal');
            
            const overlay = document.getElementById('loadingOverlay');
            overlay.style.display = 'flex';
            document.getElementById('loadingText').innerText = "⏳ 正在下載範本...";

            try {
                // 去拿指定的星期 (day=1代表星期一)
                const res = await fetch(API_URL + "?action=loadTemplate&day=" + dayIndex);
                const data = await res.json();
                
                if (data.template && data.template.trim() !== "") {
                    parseAndAddText(data.template); // 使用解析器加入清單
                } else {
                    showMessage("⚠️ 雲端試算表中，這一天還是空白的喔！\n請先到電腦上把班表填進去。");
                }
            } catch(e) {
                showMessage("❌ 下載失敗，請檢查網路連線。");
            }
            overlay.style.display = 'none';
        }

        // 將解析邏輯獨立出來，給「文字框」跟「雲端範本」共用
        function parseAndAddText(text) {
            ensureAudioInit(); 
            if (!text.trim()) return;
            const lines = text.split('\n'); 
            let addedCount = 0;

            lines.forEach(line => {
                line = line.trim(); 
                if (!line) return;

                const regex = /^(?:(\d{1,2}\/\d{1,2})\s+)?(.*?)\s+(\d{1,2}[:：]\d{2}|\d{3,4})\s*(.*)?$/;
                const match = line.match(regex);
                
                if (match) {
                    let date = match[1]; 
                    let hasExplicitDate = !!date;
                    if (!date) date = getTodayMD();
                    
                    let title = match[2].trim(); 
                    let timeStr = normalizeTime(match[3]);
                    let suffix = match[4] ? match[4].trim() : "開始";

                    let [h, m] = timeStr.split(':').map(Number); 
                    if (h > 24 || m >= 60 || (h === 24 && m > 0)) return;

                    const origTime = timeStr; 
                    const earlyMins = parseInt(document.getElementById('earlyMinsText').innerText); 
                    m -= earlyMins;
                    
                    let dayOffset = 0; 
                    if (h === 24) { h = 0; dayOffset = 1; } 
                    while (m < 0) { m += 60; h -= 1; } 
                    while (h < 0) { h += 24; dayOffset -= 1; }

                    if (dayOffset !== 0) { 
                        let year = new Date().getFullYear(); let dParts = date.split('/'); 
                        let tmpDate = new Date(year, parseInt(dParts[0]) - 1, parseInt(dParts[1])); 
                        tmpDate.setDate(tmpDate.getDate() + dayOffset); 
                        date = `${tmpDate.getMonth() + 1}/${tmpDate.getDate()}`; 
                    }

                    const alarmTime = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`;

                    if (!alarms.some(a => a.date === date && a.title === title && a.alarmTime === alarmTime && a.suffix === suffix)) {
                        alarms.push({ date, title, origTime, alarmTime, raw: encodeURIComponent(line), suffix: suffix, checked: true, selected: false, id: generateId(), hasExplicitDate: hasExplicitDate });
                        addedCount++;
                    }
                }
            });

            if (addedCount > 0) { 
                renderAlarms(); 
                save(); 
                showMessage(`✅ 成功匯入 ${addedCount} 筆鬧鐘！`);
            } else { 
                showMessage("⚠️ 格式辨識失敗或為重複資料，未新增任何項目。"); 
            }
        }

        // 綁定給文字框按鈕用
        function parseAndAdd() {
            const text = document.getElementById('inputText').value;
            if (!text.trim()) return;
            parseAndAddText(text);
            document.getElementById('inputText').value = '';
        }

        // --- UI 控制與其他邏輯 ---
        function toggleSelect(id) { const a = alarms.find(x => x.id === id); if (a) a.selected = !a.selected; save(); renderAlarms(); }
        function selectAll(forceSelect) { alarms.forEach(a => a.selected = forceSelect); renderAlarms(); }
        function shareSelected() { const selectedAlarms = alarms.filter(a => a.selected); if (selectedAlarms.length === 0) { showMessage("⚠️ 請先勾選鬧鐘！"); return; } const shareText = selectedAlarms.map(a => `${a.date} ${a.title} ${a.alarmTime} ${a.suffix}`).join('\n'); navigator.clipboard.writeText(shareText).then(() => { showMessage("✅ 已複製！"); }).catch(err => { showMessage("❌ 複製失敗"); }); }
        function ensureAudioInit() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); }
        function generateId() { idCounter++; return "ID_" + Date.now() + "_" + idCounter; }
        function getTodayMD() { const d = new Date(); return `${d.getMonth() + 1}/${d.getDate()}`; }
        function getDateVal(dStr) { const [m, d] = dStr.split('/').map(Number); return m * 100 + d; }
        
        function checkAndHandleDayCrossing() {
            const todayMD = getTodayMD(); if (lastCheckedDateMD === todayMD) return false;
            const todayVal = getDateVal(todayMD); let changed = false; const originalLength = alarms.length;
            alarms = alarms.filter(a => { if (a.hasExplicitDate) return getDateVal(a.date) >= todayVal; return true; });
            if (alarms.length !== originalLength) changed = true;
            alarms.forEach(a => { if (!a.hasExplicitDate && a.date !== todayMD) { a.date = todayMD; a.rang = false; changed = true; } });
            lastCheckedDateMD = todayMD; if (changed) { renderAlarms(); save(); } return changed;
        }

        function showMessage(msg) { document.getElementById('msgModalContent').innerText = msg; document.getElementById('msgModal').style.display = 'flex'; }
        async function pasteFromClipboard() { try { const text = await navigator.clipboard.readText(); document.getElementById('inputText').value = text; } catch (err) { showMessage("權限限制，請手動貼上。"); } }

        function renderAlarms() {
            applySort(); const container = document.getElementById('alarmListContainer'); container.innerHTML = ''; let lastDate = "";
            alarms.forEach((a) => {
                if (a.date !== lastDate) { const header = document.createElement('div'); header.className = "date-header"; header.innerText = a.date; container.appendChild(header); lastDate = a.date; }
                const li = document.createElement('li'); li.className = 'alarm-item'; li.style.backgroundColor = getBgColor(a.title);
                li.innerHTML = `<input type="checkbox" class="batch-cb" ${a.selected ? 'checked' : ''} onchange="toggleSelect('${a.id}')"><div class="alarm-info"><div class="title-wrapper"><button class="btn-edit-trigger" onclick="openNameEditPrompt('${a.id}')">✏️</button><span class="alarm-title" onclick="showInfoModal('${a.id}')">${a.title} ${a.origTime} ${a.suffix}</span></div><div class="time-control"><button class="btn-edit-trigger" onclick="openTimeEditPrompt('${a.id}')">✏️</button><button class="btn-time-step" onclick="adjustItemTime('${a.id}', -1)">-</button><span class="time-text">${a.alarmTime}</span><button class="btn-time-step" onclick="adjustItemTime('${a.id}', 1)">+</button></div></div><div class="alarm-controls"><div class="nearest-timer" id="timer-${a.id}"></div><label class="switch"><input type="checkbox" ${a.checked ? 'checked' : ''} onchange="toggleAlarm('${a.id}')"><span class="slider"></span></label><button class="btn-delete" onclick="requestDeleteSingle('${a.id}')">🗑️</button></div>`;
                container.appendChild(li);
            });
        }

        function openNameEditPrompt(id) { ensureAudioInit(); const a = alarms.find(x => x.id === id); if (!a) return; currentEditingId = id; const modal = document.getElementById('promptModal'); document.getElementById('promptTitle').innerText = "✏️ 修改鬧鐘名稱"; const input = document.getElementById('promptInput'); input.value = a.title; document.getElementById('promptConfirmBtn').onclick = function() { const newName = input.value.trim(); if (newName) { a.title = newName; closeModal('promptModal'); renderAlarms(); save(); } else { showMessage("❌ 名稱不能為空！"); } }; modal.style.display = 'flex'; }
        function openTimeEditPrompt(id) { ensureAudioInit(); const a = alarms.find(x => x.id === id); if (!a) return; currentEditingId = id; const modal = document.getElementById('promptModal'); document.getElementById('promptTitle').innerText = "✏️ 修改時間"; const input = document.getElementById('promptInput'); input.value = a.alarmTime; document.getElementById('promptConfirmBtn').onclick = function() { const newTime = input.value.trim(); const match = newTime.match(/^(\d{1,2})[.:：](\d{1,2})$/); if (match) { let h = parseInt(match[1]), m = parseInt(match[2]); if (h > 24 || m >= 60 || (h === 24 && m > 0)) { showMessage("❌ 時間格式錯誤！"); return; } let dayOffset = 0; if (h === 24) { h = 0; dayOffset = 1; } if (dayOffset !== 0) { let dParts = a.date.split('/'); let tmpDate = new Date(new Date().getFullYear(), parseInt(dParts[0]) - 1, parseInt(dParts[1])); tmpDate.setDate(tmpDate.getDate() + dayOffset); a.date = `${tmpDate.getMonth() + 1}/${tmpDate.getDate()}`; } a.alarmTime = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`; closeModal('promptModal'); renderAlarms(); save(); } else { showMessage("❌ 時間格式錯誤！"); } }; modal.style.display = 'flex'; }
        function showInfoModal(id) { ensureAudioInit(); const a = alarms.find(x => x.id === id); if (!a) return; currentEditingId = id; document.getElementById('endAlarmTimeInput').value = ""; let rawContent = decodeURIComponent(a.raw || "無原始資訊"); let safeHtml = document.createElement('div'); safeHtml.innerText = rawContent; let htmlText = safeHtml.innerHTML.replace(/(https?:\/\/[^\s]+)/g, `<a href="$1" target="_blank">$1</a>`).replace(/\n/g, '<br>'); document.getElementById('infoModalText').innerHTML = htmlText; document.getElementById('infoModal').style.display = 'flex'; }
        function createEndAlarm() { const timeVal = document.getElementById('endAlarmTimeInput').value; if (!timeVal || currentEditingId === null) return; const base = alarms.find(x => x.id === currentEditingId); if (!base) return; alarms.push({ date: base.date, title: base.title, origTime: timeVal, alarmTime: timeVal, raw: base.raw, suffix: "結束", checked: true, selected: false, id: generateId(), hasExplicitDate: base.hasExplicitDate }); showMessage(`✅ 已新增結束鬧鐘 (${timeVal})！`); renderAlarms(); save(); closeModal('infoModal'); }
        function requestDeleteSingle(id) { const a = alarms.find(x => x.id === id); if (!a) return; singleDeleteId = id; document.getElementById('deleteSingleMsg').innerText = `確定要刪除「${a.title} ${a.origTime}」嗎？`; document.getElementById('confirmSingleModal').style.display = 'flex'; }
        function executeDeleteSingle() { if (singleDeleteId) { alarms = alarms.filter(a => a.id !== singleDeleteId); renderAlarms(); save(); closeModal('confirmSingleModal'); singleDeleteId = null; } }

        async function toggleSystem() { ensureAudioInit(); const btn = document.getElementById('masterBtn'), silentAudio = document.getElementById('silentAudio'); if (isSystemActive) { if (wakeLock !== null) { await wakeLock.release(); wakeLock = null; } silentAudio.pause(); isSystemActive = false; btn.innerText = "1. 點擊啟動防熄屏與背景鬧鐘"; btn.classList.remove('active'); } else { silentAudio.play().catch(e => console.log(e)); isSystemActive = true; if ('wakeLock' in navigator) { try { wakeLock = await navigator.wakeLock.request('screen'); } catch (e) {} } btn.innerText = "✅ 防熄屏與背景鬧鐘已啟動"; btn.classList.add('active'); } }
        function testSound() { ensureAudioInit(); playBeep(); }
        function playBeep() { if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)(); if (audioCtx.state === 'suspended') audioCtx.resume(); const osc = audioCtx.createOscillator(), g = audioCtx.createGain(); osc.connect(g); g.connect(audioCtx.destination); osc.frequency.value = 800; g.gain.value = 0.3; osc.start(); setTimeout(() => osc.stop(), 250); }
        function stopAlarm() { closeModal('alarmModal'); if (alarmInterval) { clearInterval(alarmInterval); alarmInterval = null; } }
        function adjustItemTime(id, delta) { const a = alarms.find(x => x.id === id); if (!a) return; let [h, m] = a.alarmTime.split(':').map(Number); m += delta; if (m >= 60) { m = 0; h = (h + 1) % 24; } else if (m < 0) { m = 59; h = (h - 1 + 24) % 24; } a.alarmTime = `${String(h).padStart(2, '0')}:${String(m).padStart(2, '0')}`; renderAlarms(); save(); }
        function toggleAlarm(id) { const a = alarms.find(x => x.id === id); if (a) a.checked = !a.checked; save(); }
        function toggleSortMode() { sortMode = (sortMode + 1) % 2; document.getElementById('sortBtn').innerText = sortLabels[sortMode]; renderAlarms(); save(); }

        function applySort() { const getMins = (t) => { const [h, m] = t.split(':'); return parseInt(h) * 60 + parseInt(m); }; if (sortMode === 0) { const groupMetadata = {}; alarms.forEach(a => { const groupKey = a.date + "|" + a.title; const mins = getMins(a.alarmTime); if (!groupMetadata[groupKey]) { groupMetadata[groupKey] = { startTime: Infinity, minTime: Infinity }; } if (a.suffix === "開始") { if (mins < groupMetadata[groupKey].startTime) groupMetadata[groupKey].startTime = mins; } if (mins < groupMetadata[groupKey].minTime) groupMetadata[groupKey].minTime = mins; }); alarms.sort((a, b) => { const dateA = getDateVal(a.date), dateB = getDateVal(b.date); if (dateA !== dateB) return dateA - dateB; const gA = groupMetadata[a.date + "|" + a.title], gB = groupMetadata[b.date + "|" + b.title]; const refTimeA = gA.startTime === Infinity ? gA.minTime : gA.startTime; const refTimeB = gB.startTime === Infinity ? gB.minTime : gB.startTime; if (refTimeA !== refTimeB) return refTimeA - refTimeB; if (a.title !== b.title) return a.title.localeCompare(b.title, 'zh-TW'); if (a.suffix !== b.suffix) return a.suffix === "開始" ? -1 : 1; return getMins(a.alarmTime) - getMins(b.alarmTime); }); } else { alarms.sort((a, b) => { const dateDiff = getDateVal(a.date) - getDateVal(b.date); if (dateDiff !== 0) return dateDiff; return getMins(a.alarmTime) - getMins(b.alarmTime); }); } }

        function normalizeTime(t) { let time = t.trim(); if (!time.includes(':') && !time.includes('：')) { if (time.length === 3) time = "0" + time; if (time.length === 4) time = time.substring(0, 2) + ":" + time.substring(2); } else { time = time.replace('：', ':'); const ps = time.split(':'); time = ps[0].padStart(2, '0') + ":" + ps[1].padStart(2, '0'); } return time; }
        function confirmBatchDelete() { const selectedCount = alarms.filter(a => a.selected).length; const titleEl = document.getElementById('batchDeleteTitle'); const msgEl = document.getElementById('batchDeleteMsg'); if (selectedCount > 0) { titleEl.innerText = "⚠️ 批次刪除確認"; msgEl.innerText = `您確定要刪除打勾選取的 ${selectedCount} 個鬧鐘嗎？`; } else { titleEl.innerText = "⚠️ 全部刪除確認"; msgEl.innerText = "目前沒有勾選任何項目。\n您確定要刪除「所有」鬧鐘嗎？此動作無法復原！"; } document.getElementById('confirmAllModal').style.display = 'flex'; }
        function executeBatchDelete() { const hasSelected = alarms.some(a => a.selected); if (hasSelected) { alarms = alarms.filter(a => !a.selected); } else { alarms = []; } renderAlarms(); save(); closeModal('confirmAllModal'); }
        function closeModal(id) { document.getElementById(id).style.display = 'none'; }

        setInterval(() => {
            localStorage.setItem('sng_alarm_heartbeat', Date.now()); checkAndHandleDayCrossing();
            const now = new Date(), nowMD = getTodayMD(); let ringing = [], minDiffSeconds = Infinity;
            alarms.forEach(a => {
                const timerEl = document.getElementById(`timer-${a.id}`); if (timerEl) timerEl.innerText = ''; if (!a.checked) return;
                const [ah, am] = a.alarmTime.split(':').map(Number); const [amth, ady] = a.date.split('/').map(Number); let alarmTarget = new Date(now.getFullYear(), amth - 1, ady, ah, am, 0);
                if (a.date === nowMD) { if (ah === now.getHours() && am === now.getMinutes() && !a.rang) { ringing.push(`${a.title} ${a.suffix}`); a.rang = true; } else if (am !== now.getMinutes()) { a.rang = false; } }
                if (alarmTarget < now) { if (a.hasExplicitDate) return; else alarmTarget.setDate(alarmTarget.getDate() + 1); }
                let diff = Math.floor((alarmTarget - now) / 1000); if (diff >= 0 && diff < minDiffSeconds) { minDiffSeconds = diff; }
            });
            if (minDiffSeconds !== Infinity) {
                const h = Math.floor(minDiffSeconds / 3600), m = Math.floor((minDiffSeconds % 3600) / 60), s = minDiffSeconds % 60; const text = h > 0 ? `${h}時\n${m}分` : (m > 0 ? `${m}分\n${s}秒` : `${s}秒`);
                alarms.forEach(a => { if (!a.checked) return; const [ah, am] = a.alarmTime.split(':').map(Number); const [amth, ady] = a.date.split('/').map(Number); let target = new Date(now.getFullYear(), amth - 1, ady, ah, am, 0); if (target < now && !a.hasExplicitDate) target.setDate(target.getDate() + 1); let diff = Math.floor((target - now) / 1000); if (diff === minDiffSeconds) { const el = document.getElementById(`timer-${a.id}`); if(el) el.innerText = text; } });
            }
            if (ringing.length > 0) { document.getElementById('alarmModalText').innerHTML = "🔔 鬧鐘提醒：<br><br><b>" + ringing.join("</b><br><b>") + "</b>"; document.getElementById('alarmModal').style.display = 'flex'; if (!alarmInterval) { playBeep(); alarmInterval = setInterval(playBeep, 1000); } }
        }, 1000);

        const colors = ['#f8c291', '#82ccdd', '#b8e994', '#f6b93b', '#78e08f', '#60a3bc']; const colorMap = {};
        function getBgColor(name) { if (!colorMap[name]) colorMap[name] = colors[Object.keys(colorMap).length % colors.length]; return colorMap[name]; }
        function adjustEarly(d) { const el = document.getElementById('earlyMinsText'); el.innerText = Math.max(0, parseInt(el.innerText) + d); }
        function wrapBrackets() { const t = document.getElementById('inputText'); const s = t.selectionStart, e = t.selectionEnd; if (s !== e) { t.value = t.value.slice(0, s) + '【' + t.value.slice(s, e) + '】' + t.value.slice(e); } }
    </script>
